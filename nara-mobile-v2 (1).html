<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NARA">
<meta name="theme-color" content="#0f1117">
<title>NARA Mobile</title>

<style>
/* ─── Design Tokens ─── */
:root {
  --bg:        #0f1117;
  --surface:   #181c27;
  --surface2:  #1e2233;
  --border:    #2a2f45;
  --text:      #eef0f7;
  --text2:     #8b92b0;
  --text3:     #555d7a;
  --accent:    #6366f1;
  --accent-l:  rgba(99,102,241,.15);
  --green:     #10b981;
  --green-l:   rgba(16,185,129,.12);
  --red:       #f87171;
  --red-l:     rgba(248,113,113,.12);
  --amber:     #fbbf24;
  --amber-l:   rgba(251,191,36,.12);
  --cyan:      #22d3ee;
  --cyan-l:    rgba(34,211,238,.12);
  --radius:    14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Sarabun', system-ui, sans-serif; font-size: 15px; overscroll-behavior: none; }

/* ─── Layout ─── */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.topbar { 
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 8px;
  padding-top: max(12px, env(safe-area-inset-top, 12px));
  display: flex; align-items: center; gap: 10px;
}
.topbar-logo { 
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent); display: grid; place-items: center;
  font-weight: 900; font-size: 14px; letter-spacing: -0.5px;
  flex-shrink: 0;
}
.topbar-title { font-weight: 700; font-size: 16px; flex: 1; }
.topbar-month { 
  font-size: 12px; color: var(--text2); background: var(--surface2);
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.tab-bar {
  flex-shrink: 0;
  display: flex; background: var(--surface); border-top: 1px solid var(--border);
  padding-bottom: max(var(--safe-bottom), 8px);
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 4px 6px; cursor: pointer; border: none; background: none; color: var(--text3);
  font-family: inherit; font-size: 10px; font-weight: 600; transition: color .15s;
  -webkit-tap-highlight-color: transparent;
}
.tab-btn.active { color: var(--accent); }
.tab-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ─── Cards ─── */
.section { padding: 12px 14px; }
.section + .section { padding-top: 0; }
.section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.card + .card { margin-top: 8px; }

/* ─── Summary Cards ─── */
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.summary-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 14px 12px; display: flex; flex-direction: column; gap: 4px;
}
.summary-card.full { grid-column: 1/-1; }
.sc-label { font-size: 11px; font-weight: 600; color: var(--text2); }
.sc-value { font-size: 20px; font-weight: 800; letter-spacing: -.5px; font-variant-numeric: tabular-nums; }
.sc-value.pos { color: var(--green); }
.sc-value.neg { color: var(--red); }
.sc-sub { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; }

/* ─── P&L List ─── */
.pl-row {
  display: flex; align-items: center; padding: 10px 14px; gap: 8px;
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .1s;
}
.pl-row:last-child { border-bottom: none; }
.pl-row:active { background: var(--surface2); }
.pl-row.topic { background: var(--surface2); }
.pl-row.profit-row { background: var(--accent-l); }
.pl-row.subtotal-row { background: var(--surface2); border-left: 3px solid var(--accent); }
.pl-row-indent { width: 12px; flex-shrink: 0; }
.pl-row-name { flex: 1; font-size: 13.5px; font-weight: 500; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pl-row.topic .pl-row-name { font-weight: 700; font-size: 14px; }
.pl-row.profit-row .pl-row-name { font-weight: 800; color: var(--accent); }
.pl-row.subtotal-row .pl-row-name { font-weight: 700; color: var(--accent); }
.pl-row-val { font-size: 13.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; flex-shrink: 0; }
.pl-row-val.pos { color: var(--green); }
.pl-row-val.neg { color: var(--red); }
.pl-row-val.zero { color: var(--text3); }
.pl-chevron { width: 14px; height: 14px; stroke: var(--text3); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; transition: transform .2s; }
.pl-chevron.open { transform: rotate(90deg); }

/* ─── Branch selector ─── */
.branch-scroll { display: flex; gap: 6px; padding: 0 14px 12px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.branch-scroll::-webkit-scrollbar { display: none; }
.branch-chip {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
  border: 1px solid var(--border); color: var(--text2); background: var(--surface);
  cursor: pointer; white-space: nowrap; user-select: none;
}
.branch-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ─── Cost Center ─── */
.cc-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 8px; overflow: hidden;
}
.cc-header {
  display: flex; align-items: center; padding: 12px 14px; gap: 10px;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.cc-header:active { background: var(--surface2); }
.cc-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--cyan); flex-shrink: 0; }
.cc-name { flex: 1; font-size: 14px; font-weight: 700; }
.cc-code { font-size: 11px; color: var(--text3); }
.cc-total { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--red); flex-shrink: 0; }
.cc-body { padding: 0 14px 12px; border-top: 1px solid var(--border); }
.cc-bar-row { display: flex; gap: 6px; margin-top: 10px; }
.cc-bar-seg { height: 6px; border-radius: 3px; min-width: 3px; }
.cc-bar-seg.direct { background: var(--amber); }
.cc-bar-seg.alloc { background: var(--cyan); }
.cc-stat-row { display: flex; gap: 10px; margin-top: 8px; }
.cc-stat { flex: 1; }
.cc-stat-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; }
.cc-stat-val { font-size: 13px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 1px; }
.cc-stat-val.direct { color: var(--amber); }
.cc-stat-val.alloc { color: var(--cyan); }
.cc-group-list { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.cc-group-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: var(--surface2); border-radius: 8px; }
.cc-group-name { font-size: 12px; color: var(--text2); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 8px; }
.cc-group-val { font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text); flex-shrink: 0; }

/* ─── Empty State ─── */
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 24px; gap: 12px; text-align: center; }
.empty svg { width: 48px; height: 48px; stroke: var(--text3); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--text2); }
.empty-sub { font-size: 13px; color: var(--text3); line-height: 1.5; }
.empty-link { font-size: 13px; color: var(--accent); font-weight: 600; text-decoration: none; }

/* ─── Month Modal ─── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100; display: flex; align-items: flex-end; padding: 0; }
.modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 60vh; overflow-y: auto; padding-bottom: max(var(--safe-bottom),16px); }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 4px; }
.modal-title { text-align: center; font-size: 13px; font-weight: 700; color: var(--text2); padding: 4px 16px 12px; }
.month-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 0 14px 8px; }
.month-btn { padding: 10px 4px; border-radius: 10px; font-size: 13px; font-weight: 600; text-align: center; cursor: pointer; border: 1px solid var(--border); color: var(--text2); background: var(--surface2); }
.month-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.month-btn.future { opacity: .35; pointer-events: none; }

/* ─── Drill Modal ─── */
.drill-modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; display: flex; align-items: flex-end; }
.drill-sheet { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-height: 75vh; display: flex; flex-direction: column; padding-bottom: max(var(--safe-bottom),16px); }
.drill-header { padding: 0 16px 12px; flex-shrink: 0; }
.drill-title { font-size: 15px; font-weight: 800; }
.drill-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.drill-scroll { flex: 1; overflow-y: auto; }
.drill-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 16px; border-bottom: 1px solid var(--border); }
.drill-row:last-child { border-bottom: none; }
.drill-left { flex: 1; padding-right: 12px; }
.drill-code { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 2px; }
.drill-name { font-size: 13px; color: var(--text); }
.drill-grp { font-size: 11px; color: var(--text3); margin-top: 1px; }
.drill-val { font-size: 14px; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--red); flex-shrink: 0; }

/* ─── Loading ─── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 200px; gap: 12px; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Toggle (YTD) ─── */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 14px; }
.toggle-label { font-size: 12px; color: var(--text2); font-weight: 600; }
.toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background .2s; }
.toggle input:checked + .toggle-track { background: var(--accent); }
.toggle-thumb { position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: transform .2s; pointer-events: none; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

/* ─── Sarabun font ─── */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap');
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">N</div>
    <div class="topbar-title">NARA Report</div>
    <div class="topbar-month" id="monthBtn">กำลังโหลด...</div>
  </div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div><span style="color:var(--text3);font-size:13px">กำลังโหลดข้อมูล...</span></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-summary" onclick="switchTab('summary')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      สรุป
    </button>
    <button class="tab-btn" id="tab-pnl" onclick="switchTab('pnl')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      P&amp;L
    </button>
    <button class="tab-btn" id="tab-cc" onclick="switchTab('cc')">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Cost Center
    </button>
  </div>
</div>

<!-- Month Modal -->
<div class="modal-bg" id="monthModal" style="display:none" onclick="closeMonthModal(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">เลือกเดือน</div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<!-- Drill Modal -->
<div class="drill-modal-bg" id="drillModal" style="display:none" onclick="closeDrill(event)">
  <div class="drill-sheet">
    <div class="modal-handle" style="margin-bottom:8px"></div>
    <div class="drill-header">
      <div class="drill-title" id="drillTitle"></div>
      <div class="drill-sub" id="drillSub"></div>
    </div>
    <div class="drill-scroll" id="drillScroll"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  NARA Mobile — Pure Vanilla JS
//  Reads tb_alloc_v9 from localStorage
// ════════════════════════════════════════════════

const MONTHS = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ─── State ───
let state = {
  branches: [], mappings: [], revExclusions: [], expExclusions: [],
  allocExclusions: [], incAsExp: [], plStructure: [], plCustomColumns: [],
  pastedData: null, currentMonthIndex: 0, useRepair: false, dataStartCol: 1,
  departments: [], settingsPin: '', branchTemplates: []
};
let activeTab = 'summary';
let selectedBranch = 'GRAND_TOTAL'; // 'GRAND_TOTAL' or branch code
let ytdMode = false;
let expandedTopics = new Set();
let processedCache = null;
let pnlCache = null;

// ─── Utils ───
function roundTo2(n) { return Math.round(n * 100) / 100; }
function fmt(n) {
  if (n === undefined || n === null || isNaN(n)) return '-';
  const abs = Math.abs(n);
  const s = abs.toLocaleString('th-TH', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  return n < 0 ? `(${s})` : s;
}
function fmtFull(n) {
  if (!n) return '-';
  const abs = Math.abs(n);
  const s = abs.toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return n < 0 ? `(${s})` : s;
}
function cls(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : 'zero'; }
function naturalSort(a, b) {
  return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
}

// ─── Load Data ───
function loadData() {
  try {
    const raw = localStorage.getItem('tb_alloc_v9');
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.branches) state.branches = d.branches;
    if (d.mappings) state.mappings = d.mappings;
    if (d.revExclusions !== undefined) state.revExclusions = d.revExclusions;
    else if (d.excludedCodes) state.revExclusions = d.excludedCodes;
    if (d.expExclusions) state.expExclusions = d.expExclusions;
    if (d.incAsExp) state.incAsExp = d.incAsExp;
    if (d.plStructure) state.plStructure = d.plStructure;
    if (d.plCustomColumns) state.plCustomColumns = d.plCustomColumns;
    if (d.pastedData) state.pastedData = d.pastedData;
    if (d.currentMonthIndex !== undefined) state.currentMonthIndex = d.currentMonthIndex;
    if (d.useRepair !== undefined) state.useRepair = d.useRepair;
    if (d.dataStartCol !== undefined) state.dataStartCol = d.dataStartCol;
    if (d.departments) state.departments = d.departments;
    if (d.allocExclusions) state.allocExclusions = d.allocExclusions;
    return true;
  } catch(e) { return false; }
}

// ─── Process TB Data ───
function processData() {
  if (processedCache) return processedCache;
  const { branches, mappings, revExclusions, expExclusions, incAsExp, pastedData, currentMonthIndex, useRepair, dataStartCol, allocExclusions } = state;
  const empty = {
    tb: [], revenue: { items: [], totals: {}, grand: Array(12).fill(0), branchWise: [] },
    expenses: { items: [], totals: {}, grand: Array(12).fill(0), branchWise: [] },
    allocation: [], missingMappings: []
  };
  branches.forEach(b => { empty.revenue.totals[b] = Array(12).fill(0); empty.expenses.totals[b] = Array(12).fill(0); });
  if (!pastedData) return empty;

  try {
    const mappingMap = {};
    mappings.forEach(m => { mappingMap[m.code] = m.groupName; });

    const lines = pastedData.split('\n');
    const tb = [];
    const missingSet = new Set();
    const missingMappings = [];
    const sortedBranches = [...branches].sort((a, b) => b.length - a.length);

    for (let l = 0; l < lines.length; l++) {
      const line = lines[l];
      if (!line.trim()) continue;
      const cols = line.split('\t');
      if (cols.length < 2 || !cols[0]) continue;
      const fullText = cols.slice(0, dataStartCol).join(' ').trim();
      if (!fullText) continue;

      let branch = 'S000';
      for (const b of sortedBranches) {
        const bReg = new RegExp('\\b' + b.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'gi');
        if (bReg.test(fullText)) { branch = b; break; }
      }

      const codeMatch = fullText.match(/\b\d{3,10}(-\d{1,4})?\b/);
      const accCode = codeMatch ? codeMatch[0] : '';
      const rawDept = accCode.includes('-') ? accCode.split('-')[1] : '';
      const deptCode = rawDept.length === 3 ? rawDept : '';

      let accName = fullText;
      if (accCode) accName = accName.replace(accCode, '').trim();
      for (const b of branches) {
        const bReg = new RegExp('\\b' + b.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&') + '\\b', 'gi');
        accName = accName.replace(bReg, '').trim();
      }
      accName = accName.replace(/\b-?\s*\d{3,4}\b/g, '').trim().replace(/^[\s-:.]+/, '').replace(/[\s-:.]+$/, '');
      if (!accName) accName = fullText;

      const groupName = mappingMap[accCode] || '';
      if (accCode && !mappingMap[accCode] && !missingSet.has(accCode)) {
        missingSet.add(accCode); missingMappings.push({ code: accCode, tbName: accName });
      }

      const rawBal = Array(12);
      for (let i = 0; i < 12; i++) {
        const v = cols[i + dataStartCol] || '0';
        rawBal[i] = parseFloat(String(v).replace(/,/g, '').trim()) || 0;
      }
      const balances = Array(12);
      balances[0] = rawBal[0];
      for (let i = 1; i < 12; i++) balances[i] = rawBal[i] - rawBal[i-1];
      tb.push({ accCode, branch, accName, groupName, balances, deptCode });
    }

    const revTotals = {}, expTotals = {};
    branches.forEach(b => { revTotals[b] = Array(12).fill(0); expTotals[b] = Array(12).fill(0); });
    let revGrand = Array(12).fill(0), expGrand = Array(12).fill(0);
    const revItems = [], expItems = [];
    const revBW = {}, expBW = {};

    function regBW(row, col, tots, grand) {
      if (!col[row.accCode]) {
        col[row.accCode] = { accCode: row.accCode, accName: row.accName, groupName: row.groupName, branchValues: {}, totalBalances: Array(12).fill(0) };
        branches.forEach(b => col[row.accCode].branchValues[b] = Array(12).fill(0));
      }
      const c = col[row.accCode];
      for (let i = 0; i < 12; i++) {
        const v = row.balances[i];
        if (branches.includes(row.branch)) { c.branchValues[row.branch][i] += v; tots[row.branch][i] += v; }
        c.totalBalances[i] += v; grand[i] += v;
      }
    }

    for (const row of tb) {
      const ac = row.accCode;
      if (ac.startsWith('4') && !revExclusions.includes(ac)) { revItems.push(row); regBW(row, revBW, revTotals, revGrand); }
      if ((ac.startsWith('5') || ac.startsWith('6') || incAsExp.includes(ac)) && !expExclusions.includes(ac)) { expItems.push(row); regBW(row, expBW, expTotals, expGrand); }
    }

    // Allocation
    const allocation = [];
    const revTotalsCache = branches.map(b => revTotals[b]);
    for (let m = 0; m <= currentMonthIndex; m++) {
      const monthlyAlloc = {};
      let targetRevBase = 0;
      for (let bi = 0; bi < branches.length; bi++) targetRevBase += revTotalsCache[bi][m];
      if (targetRevBase === 0) targetRevBase = 1;

      for (const exp of expItems) {
        if (exp.branch !== 'S000') continue;
        if (allocExclusions.includes(exp.accCode)) continue;
        const amt = exp.balances[m];
        if (amt === 0) continue;
        const key = exp.accCode + '-' + exp.groupName;
        if (!monthlyAlloc[key]) {
          monthlyAlloc[key] = { code: exp.accCode, name: exp.groupName || 'ไม่ระบุชื่อ', monthIndex: m, total: 0, alloc: {} };
          branches.forEach(b => monthlyAlloc[key].alloc[b] = 0);
        }
        const entry = monthlyAlloc[key];
        let allocSum = 0;
        for (let bi = 0; bi < branches.length - 1; bi++) {
          const b = branches[bi];
          const rev = revTotalsCache[bi][m];
          const a = roundTo2((amt * rev) / targetRevBase);
          entry.alloc[b] = roundTo2(entry.alloc[b] + a);
          allocSum += a;
        }
        const brWithRev = branches.filter((b, i) => revTotalsCache[i][m] !== 0);
        const lastB = brWithRev.length > 0 ? brWithRev[brWithRev.length-1] : branches[branches.length-1];
        entry.alloc[lastB] = roundTo2(entry.alloc[lastB] + roundTo2(amt - allocSum));
        entry.total = roundTo2(entry.total + amt);
      }
      allocation.push(...Object.values(monthlyAlloc));
    }

    const bwSort = (a, b) => naturalSort(a.accCode, b.accCode);
    processedCache = {
      tb, revenue: { items: revItems, totals: revTotals, grand: revGrand, branchWise: Object.values(revBW).sort(bwSort) },
      expenses: { items: expItems, totals: expTotals, grand: expGrand, branchWise: Object.values(expBW).sort(bwSort) },
      allocation, missingMappings
    };
    return processedCache;
  } catch(e) { console.error(e); return empty; }
}

// ─── P&L Calculations ───
function calcPnl(monthIdx) {
  const pd = processData();
  const { plStructure, plCustomColumns, allocExclusions } = state;
  const branches = [...state.branches].sort(naturalSort);
  const keys = branches.concat(plCustomColumns.map(c => c.id));

  const results = { items: {}, topicTypeMapping: {}, totals: { revenue: {}, expense: {}, profit: {} } };
  const initT = obj => { keys.forEach(k => obj[k] = 0); obj['GRAND_TOTAL'] = 0; };
  initT(results.totals.revenue); initT(results.totals.expense); initT(results.totals.profit);

  const visitedIds = new Set();
  function calcRec(item, type) {
    if (visitedIds.has(item.id)) return { direct: {}, allocated: {}, total: {} };
    visitedIds.add(item.id);
    results.topicTypeMapping[item.id] = type;
    const nr = { direct: {}, allocated: {}, total: {} };
    initT(nr.direct); initT(nr.allocated); initT(nr.total);

    if ((item.groups && item.groups.length > 0) || (item.accounts && item.accounts.length > 0) || (item.accBranches && item.accBranches.length > 0)) {
      const srcBW = type === 'revenue' ? pd.revenue.branchWise : pd.expenses.branchWise;
      const abCodes = new Set((item.accBranches || []).map(e => e.code));
      srcBW.forEach(bi => {
        if (abCodes.has(bi.accCode)) return;
        const mg = item.groups && item.groups.includes(bi.groupName);
        const ma = item.accounts && item.accounts.includes(bi.accCode);
        if (mg || ma) {
          branches.forEach(b => {
            if (type === 'expense' && b === 'S000' && !allocExclusions.includes(bi.accCode)) return;
            const raw = bi.branchValues[b] ? bi.branchValues[b][monthIdx] || 0 : 0;
            nr.direct[b] += type === 'revenue' ? -raw : raw;
          });
        }
      });
      if (item.accBranches && item.accBranches.length > 0) {
        item.accBranches.forEach(entry => {
          const bi = (type === 'revenue' ? pd.revenue.branchWise : pd.expenses.branchWise).find(x => x.accCode === entry.code);
          if (!bi) return;
          let tgt = entry.branches.length === 0 ? branches : entry.exclude ? branches.filter(b => !entry.branches.includes(b)) : entry.branches;
          tgt.forEach(b => {
            if (!branches.includes(b)) return;
            if (type === 'expense' && b === 'S000' && !allocExclusions.includes(entry.code)) return;
            const raw = bi.branchValues[b] ? bi.branchValues[b][monthIdx] || 0 : 0;
            nr.direct[b] += type === 'revenue' ? -raw : raw;
          });
        });
      }
    }

    if (type === 'expense') {
      pd.allocation.forEach(ai => {
        if (ai.monthIndex !== monthIdx) return;
        const mg = item.groups && item.groups.includes(ai.name);
        const codeOvr = item.accBranches && item.accBranches.find(e => e.code === ai.code);
        if (codeOvr) {
          let tgt = codeOvr.branches.length === 0 ? branches : codeOvr.exclude ? branches.filter(b => !codeOvr.branches.includes(b)) : codeOvr.branches;
          tgt.forEach(b => { if (branches.includes(b)) nr.allocated[b] = roundTo2(nr.allocated[b] + (ai.alloc[b] || 0)); });
        } else if (mg) {
          branches.forEach(b => nr.allocated[b] = roundTo2(nr.allocated[b] + (ai.alloc[b] || 0)));
        }
      });
    }

    if (item.children && item.children.length > 0) {
      item.children.forEach(c => {
        const cr = calcRec(c, type);
        branches.forEach(b => { nr.direct[b] += cr.direct[b]; nr.allocated[b] += cr.allocated[b]; });
      });
    }
    if (item.lines && item.lines.length > 0) {
      item.lines.forEach(c => {
        const cr = calcRec(c, type);
        branches.forEach(b => { nr.direct[b] += cr.direct[b]; nr.allocated[b] += cr.allocated[b]; });
      });
    }

    let dSum = 0, aSum = 0;
    branches.forEach(b => { nr.total[b] = roundTo2(nr.direct[b] + nr.allocated[b]); dSum += nr.direct[b]; aSum += nr.allocated[b]; });
    nr.direct['GRAND_TOTAL'] = roundTo2(dSum); nr.allocated['GRAND_TOTAL'] = roundTo2(aSum); nr.total['GRAND_TOTAL'] = roundTo2(dSum + aSum);

    plCustomColumns.forEach(col => {
      let d = 0, a = 0;
      col.branches.forEach(b => { d += nr.direct[b]; a += nr.allocated[b]; });
      nr.direct[col.id] = roundTo2(d); nr.allocated[col.id] = roundTo2(a); nr.total[col.id] = roundTo2(d + a);
    });

    results.items[item.id] = nr;
    return nr;
  }

  plStructure.forEach(topic => {
    if (topic.type === 'subtotal') return;
    visitedIds.clear();
    const tt = calcRec(topic, topic.type);
    keys.forEach(k => {
      if (topic.type === 'revenue') results.totals.revenue[k] += tt.total[k];
      else results.totals.expense[k] += tt.total[k];
    });
    if (topic.type === 'revenue') results.totals.revenue['GRAND_TOTAL'] += tt.total['GRAND_TOTAL'];
    else results.totals.expense['GRAND_TOTAL'] += tt.total['GRAND_TOTAL'];
  });

  const allKeys = keys.concat(['GRAND_TOTAL']);
  plStructure.forEach(topic => {
    if (topic.type !== 'subtotal' && topic.type !== 'profit') return;
    const st = { total: {} };
    allKeys.forEach(k => st.total[k] = 0);
    (topic.sourceIds || []).forEach(entry => {
      const sid = typeof entry === 'string' ? entry : entry.id;
      const sign = typeof entry === 'string' ? 1 : (entry.sign || 1);
      const src = results.items[sid];
      if (src) allKeys.forEach(k => st.total[k] = roundTo2(st.total[k] + sign * (src.total[k] || 0)));
    });
    results.items[topic.id] = st;
  });

  allKeys.forEach(k => {
    results.totals.revenue[k] = roundTo2(results.totals.revenue[k]);
    results.totals.expense[k] = roundTo2(results.totals.expense[k]);
    results.totals.profit[k] = roundTo2(results.totals.revenue[k] - results.totals.expense[k]);
  });
  return results;
}

function getPnl() {
  if (pnlCache) return pnlCache;
  pnlCache = calcPnl(state.currentMonthIndex);
  return pnlCache;
}

function getVal(pnl, topicId, branch) {
  const item = pnl.items[topicId];
  if (!item) return 0;
  const k = branch === 'GRAND_TOTAL' ? 'GRAND_TOTAL' : branch;
  return (item.total && item.total[k] !== undefined) ? item.total[k] : 0;
}

// ─── YTD helper ───
function getYtdVal(topicId, branch) {
  let sum = 0;
  for (let m = 0; m <= state.currentMonthIndex; m++) {
    const pnl = calcPnl(m);
    const item = pnl.items[topicId];
    if (item) {
      const k = branch === 'GRAND_TOTAL' ? 'GRAND_TOTAL' : branch;
      sum += (item.total && item.total[k] !== undefined) ? item.total[k] : 0;
    }
  }
  return roundTo2(sum);
}
function getYtdTotals(branch) {
  const k = branch === 'GRAND_TOTAL' ? 'GRAND_TOTAL' : branch;
  let rev = 0, exp = 0;
  for (let m = 0; m <= state.currentMonthIndex; m++) {
    const pnl = calcPnl(m);
    rev += pnl.totals.revenue[k] || 0;
    exp += pnl.totals.expense[k] || 0;
  }
  return { revenue: roundTo2(rev), expense: roundTo2(exp), profit: roundTo2(rev - exp) };
}

  pnlCache = null; // always recalc on render (month/branch change)
  const content = document.getElementById('content');
  document.getElementById('monthBtn').textContent = (ytdMode ? 'YTD ' : '') + MONTHS[state.currentMonthIndex];

  if (!state.pastedData) {
    renderEmpty(content);
    return;
  }
  if (activeTab === 'summary') renderSummary(content);
  else if (activeTab === 'pnl') renderPnl(content);
  else renderCostCenter(content);
}

          <div class="sc-label">กำไรสุทธิ${ytdMode ? ' (YTD)' : ''}</div>
          <div class="sc-value ${cls(profit)}">${fmt(profit)}</div>

    <div class="section" style="padding-top:0">
      <div class="section-label">รายละเอียด P&amp;L</div>
      <div class="card">${topicRows}</div>
    </div>`;
}

function renderPnl(el) {
  const pnl = getPnl();
  const sortedBranches = [...state.branches].sort(naturalSort);
  let branchChips = `<div class="branch-scroll" style="padding-top:12px">
    <div class="branch-chip ${selectedBranch === 'GRAND_TOTAL' ? 'active' : ''}" onclick="selectBranch('GRAND_TOTAL')">รวมทุกสาขา</div>
    ${sortedBranches.map(b => `<div class="branch-chip ${selectedBranch === b ? 'active' : ''}" onclick="selectBranch('${b}')">${b}</div>`).join('')}
  </div>`;

  function renderNode(item, depth = 0) {
    if (!item || !item.id) return '';
    const isSub = item.type === 'subtotal' || item.type === 'profit';
    let val;
    if (ytdMode) val = getYtdVal(item.id, selectedBranch);
    else val = getVal(pnl, item.id, selectedBranch);
    const ds = item.displayNegate ? -1 : 1;
    const display = roundTo2(ds * val);
    const expanded = expandedTopics.has(item.id);
    const hasChildren = !isSub && ((item.children && item.children.length > 0) || (item.lines && item.lines.length > 0));

    let row = `<div class="pl-row ${isSub ? (item.type === 'profit' ? 'profit-row' : 'subtotal-row') : (depth === 0 ? 'topic' : '')}" 
      onclick="${hasChildren ? `toggleExpand('${item.id}')` : ''}" 
      style="padding-left:${14 + depth * 14}px;cursor:${hasChildren ? 'pointer' : 'default'}">
      ${hasChildren ? `<svg class="pl-chevron ${expanded ? 'open' : ''}" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>` : `<div style="width:14px;flex-shrink:0"></div>`}
      <div class="pl-row-name">${isSub ? '= ' : ''}${item.title || ''}</div>
      <div class="pl-row-val ${cls(display)}">${fmt(display)}</div>
    </div>`;

    if (expanded && hasChildren) {
      const children = item.children || item.lines || [];
      row += children.map(c => renderNode(c, depth + 1)).join('');
    }
    return row;
  }

  const rows = state.plStructure.map(t => renderNode(t)).join('');

  el.innerHTML = `

function renderCostCenter(el) {
  const pd = processData();
  const { departments, allocExclusions, currentMonthIndex } = state;
  const sortedBranches = [...state.branches].sort(naturalSort);

  const deptMap = {};
  departments.forEach(d => { deptMap[d.code] = d.name; });

  const deptData = {};
  const unalloc = { groups: {}, directTotal: 0, allocTotal: 0 };

  pd.expenses.items.forEach(row => {
    if (row.branch === 'S000' && !allocExclusions.includes(row.accCode)) return;
    const amt = row.balances[currentMonthIndex] || 0;
    if (amt === 0) return;
    const dc = row.deptCode || '';
    const grp = row.groupName || row.accCode;
    const target = dc ? (deptData[dc] = deptData[dc] || { groups: {}, directTotal: 0, allocTotal: 0 }) : unalloc;
    if (!target.groups[grp]) target.groups[grp] = { direct: 0, alloc: 0, rows: [] };
    target.groups[grp].direct = roundTo2(target.groups[grp].direct + amt);
    target.groups[grp].rows.push({ code: row.accCode, name: row.accName, branch: row.branch, amt });
    target.directTotal = roundTo2(target.directTotal + amt);
  });

  const accToDept = {};
  pd.expenses.items.forEach(row => { if (row.deptCode) accToDept[row.accCode] = row.deptCode; });

  pd.allocation.filter(ai => ai.monthIndex === currentMonthIndex).forEach(ai => {
    const amt = roundTo2(sortedBranches.reduce((s, b) => s + (ai.alloc[b] || 0), 0));
    if (amt === 0) return;
    const grp = ai.name || ai.code;
    const dc = accToDept[ai.code] || accToDept[ai.code.split('-')[0]] || '';
    const target = dc ? (deptData[dc] = deptData[dc] || { groups: {}, directTotal: 0, allocTotal: 0 }) : unalloc;
    if (!target.groups[grp]) target.groups[grp] = { direct: 0, alloc: 0, rows: [] };
    target.groups[grp].alloc = roundTo2(target.groups[grp].alloc + amt);
    target.allocTotal = roundTo2(target.allocTotal + amt);
  });

  const allDepts = Object.keys(deptData).sort();
  const grandTotal = roundTo2(allDepts.reduce((s, dc) => s + deptData[dc].directTotal + deptData[dc].allocTotal, 0) + unalloc.directTotal + unalloc.allocTotal);

  function renderCcCard(dc, data, label) {
    const total = roundTo2(data.directTotal + data.allocTotal);
    const pct = grandTotal > 0 ? (total / grandTotal * 100).toFixed(1) : '0.0';
    const directW = total > 0 ? Math.max(5, (data.directTotal / total * 100)) : 0;
    const allocW = total > 0 ? Math.max(5, (data.allocTotal / total * 100)) : 0;
    const expanded = expandedTopics.has('cc_' + dc);
    const groups = Object.entries(data.groups).sort((a, b) => (b[1].direct + b[1].alloc) - (a[1].direct + a[1].alloc));

    const groupRows = groups.map(([grp, g]) => {
      const t = roundTo2(g.direct + g.alloc);
      return `<div class="cc-group-row">
        <div class="cc-group-name">${grp}</div>
        <div class="cc-group-val">${fmt(t)}</div>
      </div>`;
    }).join('');

    return `<div class="cc-card">
      <div class="cc-header" onclick="toggleExpand('cc_${dc}')">
        <div class="cc-dot"></div>
        <div style="flex:1;min-width:0">
          <div class="cc-name">${label}</div>
          <div class="cc-code">${dc !== '__unalloc' ? dc : ''} · ${pct}%</div>
        </div>
        <div class="cc-total">${fmt(total)}</div>
        <svg style="width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;margin-left:6px;transition:transform .2s;transform:rotate(${expanded ? 90 : 0}deg)" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      ${expanded ? `<div class="cc-body">
        <div class="cc-bar-row">
          <div class="cc-bar-seg direct" style="width:${directW}%"></div>
          <div class="cc-bar-seg alloc" style="width:${allocW}%"></div>
        </div>
        <div class="cc-stat-row">
          <div class="cc-stat"><div class="cc-stat-label">🟡 Direct</div><div class="cc-stat-val direct">${fmt(data.directTotal)}</div></div>
          <div class="cc-stat"><div class="cc-stat-label">🔵 Alloc</div><div class="cc-stat-val alloc">${fmt(data.allocTotal)}</div></div>
        </div>
        <div class="cc-group-list">${groupRows}</div>
      </div>` : ''}
    </div>`;
  }

  const cards = allDepts.map(dc => renderCcCard(dc, deptData[dc], deptMap[dc] || dc)).join('');
  const unallocCard = (unalloc.directTotal !== 0 || unalloc.allocTotal !== 0)
    ? renderCcCard('__unalloc', unalloc, 'ไม่ระบุแผนก') : '';

  el.innerHTML = `
    <div class="section">
      <div class="summary-card" style="flex-direction:row;align-items:center;gap:12px;padding:12px 14px">
        <div>
          <div class="sc-label">ค่าใช้จ่ายรวม</div>
          <div class="sc-value neg" style="font-size:18px">${fmt(grandTotal)}</div>
        </div>
        <div style="margin-left:auto;font-size:12px;color:var(--text3);text-align:right">
          ${allDepts.length} แผนก<br>${MONTHS[currentMonthIndex]}
        </div>
      </div>
    </div>
    <div class="section" style="padding-top:0">
      ${cards}${unallocCard}
      ${!cards && !unallocCard ? '<div class="empty"><div class="empty-title">ไม่มีข้อมูล Cost Center</div></div>' : ''}
    </div>`;
}

// ─── Actions ───
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}
function selectBranch(b) { selectedBranch = b; render(); }
function toggleYtd(v) { ytdMode = v; render(); }
function toggleExpand(id) {
  if (expandedTopics.has(id)) expandedTopics.delete(id);
  else expandedTopics.add(id);
  render();
}

  document.getElementById('monthModal').style.display = 'flex';
}
function closeMonthModal(e) { if (e.target.id === 'monthModal') document.getElementById('monthModal').style.display = 'none'; }

  document.getElementById('monthModal').style.display = 'none';

// Drill modal
function drillTopic(topicId) {
  const topic = findTopic(state.plStructure, topicId);
  if (!topic) return;
  const pd = processData();
  const pnl = getPnl();

  // Gather raw accounts under this topic
  const rows = [];
  function gatherAccounts(item) {
    const srcBW = item.type === 'revenue' ? pd.revenue.branchWise : pd.expenses.branchWise;
    const abCodes = new Set((item.accBranches || []).map(e => e.code));
    srcBW.forEach(bi => {
      const mg = item.groups && item.groups.includes(bi.groupName);
      const ma = item.accounts && item.accounts.includes(bi.accCode);
      if (mg || ma || abCodes.has(bi.accCode)) {
        const k = selectedBranch === 'GRAND_TOTAL' ? null : selectedBranch;
        let amt;
        if (k) amt = bi.branchValues[k] ? bi.branchValues[k][state.currentMonthIndex] || 0 : 0;
        else amt = Object.values(bi.branchValues).reduce((s, arr) => s + (arr[state.currentMonthIndex] || 0), 0);
        if (amt !== 0) rows.push({ code: bi.accCode, name: bi.accName, group: bi.groupName, amt: item.type === 'revenue' ? -amt : amt });
      }
    });
    if (item.children) item.children.forEach(gatherAccounts);
    if (item.lines) item.lines.forEach(gatherAccounts);
  }
  gatherAccounts(topic);
  rows.sort((a, b) => Math.abs(b.amt) - Math.abs(a.amt));

  const val = getVal(pnl, topicId, selectedBranch);
  const ds = topic.displayNegate ? -1 : 1;

  document.getElementById('drillTitle').textContent = topic.title;
  document.getElementById('drillSub').textContent = `${fmt(roundTo2(ds * val))} บาท · ${MONTHS[state.currentMonthIndex]}${selectedBranch !== 'GRAND_TOTAL' ? ' · ' + selectedBranch : ''}`;
  document.getElementById('drillScroll').innerHTML = rows.length
    ? rows.map(r => `<div class="drill-row">
        <div class="drill-left">
          <div class="drill-code">${r.code}</div>
          <div class="drill-name">${r.name}</div>
          ${r.group ? `<div class="drill-grp">${r.group}</div>` : ''}
        </div>
        <div class="drill-val ${cls(r.amt)}">${fmt(r.amt)}</div>
      </div>`).join('')
    : '<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">ไม่มีรายการ</div>';

  document.getElementById('drillModal').style.display = 'flex';
}
function closeDrill(e) { if (e.target.id === 'drillModal') document.getElementById('drillModal').style.display = 'none'; }

function findTopic(structure, id) {
  for (const t of structure) {
    if (t.id === id) return t;
    if (t.children) { const f = findTopic(t.children, id); if (f) return f; }
    if (t.lines) { const f = findTopic(t.lines, id); if (f) return f; }
  }
  return null;
}

// ─── Import JSON ───
function handleImportJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.branches) state.branches = d.branches;
      if (d.mappings) state.mappings = d.mappings;
      if (d.revExclusions !== undefined) state.revExclusions = d.revExclusions;
      else if (d.excludedCodes) state.revExclusions = d.excludedCodes;
      if (d.expExclusions) state.expExclusions = d.expExclusions;
      if (d.incAsExp) state.incAsExp = d.incAsExp;
      if (d.plStructure) state.plStructure = d.plStructure;
      if (d.plCustomColumns) state.plCustomColumns = d.plCustomColumns;
      if (d.pastedData) state.pastedData = d.pastedData;
      if (d.currentMonthIndex !== undefined) state.currentMonthIndex = d.currentMonthIndex;
      if (d.useRepair !== undefined) state.useRepair = d.useRepair;
      if (d.dataStartCol !== undefined) state.dataStartCol = d.dataStartCol;
      if (d.departments) state.departments = d.departments;
      if (d.allocExclusions) state.allocExclusions = d.allocExclusions;
      processedCache = null; pnlCache = null;
      render();
    } catch(err) {
      alert('ไฟล์ JSON ไม่ถูกต้อง: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Init ───
function init() {
  // 1. Try localStorage first
  const ok = loadData();
  if (ok && state.pastedData) { render(); return; }

  // 2. Try preset-data (embedded JSON)
  try {
    const presetEl = document.getElementById('preset-data');
    if (presetEl) {
      const d = JSON.parse(presetEl.textContent);
      if (d.branches) state.branches = d.branches;
      if (d.mappings) state.mappings = d.mappings;
      if (d.revExclusions !== undefined) state.revExclusions = d.revExclusions;
      else if (d.excludedCodes) state.revExclusions = d.excludedCodes;
      if (d.expExclusions) state.expExclusions = d.expExclusions;
      if (d.incAsExp) state.incAsExp = d.incAsExp;
      if (d.plStructure) state.plStructure = d.plStructure;
      if (d.plCustomColumns) state.plCustomColumns = d.plCustomColumns;
      if (d.pastedData) state.pastedData = d.pastedData;
      if (d.currentMonthIndex !== undefined) state.currentMonthIndex = d.currentMonthIndex;
      if (d.useRepair !== undefined) state.useRepair = d.useRepair;
      if (d.dataStartCol !== undefined) state.dataStartCol = d.dataStartCol;
      if (d.departments) state.departments = d.departments;
      if (d.allocExclusions) state.allocExclusions = d.allocExclusions;
      if (state.pastedData) { render(); return; }
    }
  } catch(e) {}

  // 3. Show import screen
  renderImportScreen();
}

function renderImportScreen() {
  document.getElementById('monthBtn').textContent = '-';
  document.getElementById('content').innerHTML = `<div class="empty">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    <div class="empty-title">นำเข้าข้อมูล</div>
    <div class="empty-sub">เปิด NARA → Settings → Save Data (JSON)<br>แล้วนำไฟล์มาเปิดที่นี่</div>
    <label style="margin-top:16px;display:inline-block;background:var(--accent);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer">
      📂 เลือกไฟล์ JSON
      <input type="file" accept=".json" style="display:none" onchange="handleImportJSON(this)">
    </label>
  </div>`;
}

init();
