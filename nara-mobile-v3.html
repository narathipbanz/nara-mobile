<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NARA">
<meta name="theme-color" content="#0d0f1a">
<title>NARA Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══ Design Tokens ═══ */
:root {
  --bg:#0d0f1a; --surface:#151824; --surface2:#1c2033; --surface3:#222640;
  --border:#252a3d; --border2:#2d3350;
  --text:#eef0f9; --text2:#9ba3c0; --text3:#555e7a;
  --accent:#6366f1; --accent2:#818cf8; --accent-l:rgba(99,102,241,.12); --accent-b:rgba(99,102,241,.35);
  --green:#10b981; --green-l:rgba(16,185,129,.1); --green-b:rgba(16,185,129,.3);
  --red:#f87171; --red-l:rgba(248,113,113,.1); --red-b:rgba(248,113,113,.3);
  --amber:#fbbf24; --amber-l:rgba(251,191,36,.1);
  --cyan:#22d3ee; --cyan-l:rgba(34,211,238,.1);
  --violet:#8b5cf6; --cyan2:#06b6d4;
  --r:14px; --r2:10px; --r3:20px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
[data-theme="light"] {
  --bg:#f0f2f8; --surface:#fff; --surface2:#f5f7fc; --surface3:#eef0f8;
  --border:#e2e5f0; --border2:#cdd2e8;
  --text:#0f1629; --text2:#4a5278; --text3:#8b94b8;
  --accent:#4f46e5; --accent2:#6366f1; --accent-l:rgba(79,70,229,.08); --accent-b:rgba(79,70,229,.25);
  --green:#059669; --green-l:rgba(5,150,105,.08); --green-b:rgba(5,150,105,.25);
  --red:#dc2626; --red-l:rgba(220,38,38,.08); --red-b:rgba(220,38,38,.25);
  --amber:#92400e; --amber-l:rgba(146,64,14,.08);
  --cyan:#0e7490; --cyan-l:rgba(14,116,144,.08);
  --violet:#7c3aed; --cyan2:#0891b2;
}

/* ═══ Base ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sarabun',system-ui,sans-serif;font-size:15px;overscroll-behavior:none;transition:background .2s,color .2s}

/* ═══ Layout ═══ */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative}
.topbar{
  flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px 10px;padding-top:max(10px,var(--safe-t));
  display:flex;align-items:center;gap:10px;
}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tab-bar{
  flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:max(var(--safe-b),6px);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 5px;cursor:pointer;border:none;background:none;color:var(--text3);
  font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.02em;transition:color .15s;
}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
.tab-btn.active svg{transform:scale(1.08)}

/* ═══ NARA Logo ═══ */
.nara-logo-wrap{width:38px;height:38px;flex-shrink:0;position:relative}
.logo-title{flex:1;min-width:0}
.logo-name{font-size:16px;font-weight:900;letter-spacing:.02em;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* ═══ Toggle dark/light ═══ */
.theme-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:background .15s;
}
.theme-btn:active{background:var(--surface3)}

/* ═══ Month pill ═══ */
.month-pill{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);
  white-space:nowrap;flex-shrink:0;
}
.month-pill svg{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ═══ Section ═══ */
.section{padding:12px 14px}
.section+.section{padding-top:0}
.sec-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-left:2px}

/* ═══ Cards ═══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card+.card{margin-top:8px}

/* ═══ KPI Cards ═══ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px}
.kpi.full{grid-column:1/-1}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;font-variant-numeric:tabular-nums}
.pos{color:var(--green)} .neg{color:var(--red)} .zer{color:var(--text3)}

/* ═══ Branch chips ═══ */
.branch-row{display:flex;gap:6px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.branch-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--border);color:var(--text2);background:var(--surface);cursor:pointer;white-space:nowrap;transition:all .12s}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:active{opacity:.75}

/* ═══ YTD Toggle ═══ */
.ytd-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px}
.ytd-label{font-size:12px;font-weight:700;color:var(--text2)}
.sw{position:relative;width:42px;height:24px}
.sw input{opacity:0;width:0;height:0}
.sw-track{position:absolute;inset:0;background:var(--border2);border-radius:12px;cursor:pointer;transition:background .2s}
.sw input:checked+.sw-track{background:var(--accent)}
.sw-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw input:checked~.sw-thumb{transform:translateX(18px)}

/* ═══ P&L List ═══ */
.pl-row{display:flex;align-items:center;padding:11px 14px;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;min-height:44px}
.pl-row:last-child{border-bottom:none}
.pl-row:active{background:var(--surface2)}
.pl-row.topic-row{background:var(--surface2)}
.pl-row.profit-row{background:var(--accent-l);border-left:3px solid var(--accent)}
.pl-row.subtotal-row{background:var(--surface2);border-left:3px solid var(--accent2)}
.pl-name{flex:1;font-size:13.5px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-row.topic-row .pl-name{font-weight:800;font-size:14px}
.pl-row.profit-row .pl-name{font-weight:800;color:var(--accent2)}
.pl-row.subtotal-row .pl-name{font-weight:700;color:var(--accent2);font-size:13px}
.pl-val{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0;min-width:80px}
.pl-chev{width:14px;height:14px;flex-shrink:0;stroke:var(--text3);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.pl-chev.open{transform:rotate(90deg)}
.pl-noico{width:14px;flex-shrink:0}

/* ═══ Branch Summary ═══ */
.br-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;min-height:44px}
.br-row:last-child{border-bottom:none}
.br-rank{width:20px;font-size:11px;font-weight:700;color:var(--text3);text-align:center;flex-shrink:0}
.br-code{font-size:13px;font-weight:800;color:var(--accent2);width:50px;flex-shrink:0}
.br-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.br-bar{height:100%;border-radius:3px;transition:width .4s}
.br-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0;min-width:70px}

/* ═══ Cost Center ═══ */
.cc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.cc-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;min-height:52px;transition:background .1s}
.cc-header:active{background:var(--surface2)}
.cc-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-code-tag{font-size:10px;color:var(--text3);margin-top:1px}
.cc-total{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--red);flex-shrink:0}
.cc-chev{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:transform .2s}
.cc-body{padding:10px 14px 14px;border-top:1px solid var(--border)}
.cc-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex;margin-bottom:8px}
.cc-bar-d{height:100%;background:var(--amber);border-radius:3px 0 0 3px}
.cc-bar-a{height:100%;background:var(--cyan)}
.cc-stats{display:flex;gap:12px;margin-bottom:10px}
.cc-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3)}
.cc-stat-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px}
.cc-groups{display:flex;flex-direction:column;gap:4px}
.cc-grp{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface2);border-radius:8px}
.cc-grp-name{font-size:12px;color:var(--text2);flex:1;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-grp-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}

/* ═══ Modal ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding-bottom:max(var(--safe-b),16px)}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 2px}
.modal-title{text-align:center;font-size:13px;font-weight:800;color:var(--text2);padding:4px 16px 12px;letter-spacing:.04em;text-transform:uppercase}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 14px 8px}
.mo-btn{padding:12px 4px;border-radius:12px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface2);font-family:inherit;transition:all .12s}
.mo-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mo-btn:active{opacity:.7}

/* ═══ Drill Modal ═══ */
.drill-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.drill-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:78vh;display:flex;flex-direction:column;padding-bottom:max(var(--safe-b),16px)}
.drill-header{padding:0 16px 12px;flex-shrink:0}
.drill-title{font-size:16px;font-weight:900}
.drill-sub{font-size:12px;color:var(--text3);margin-top:3px}
.drill-list{flex:1;overflow-y:auto}
.drill-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:1px solid var(--border)}
.drill-item:last-child{border-bottom:none}
.drill-left{flex:1;padding-right:12px}
.drill-code{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:2px}
.drill-name{font-size:13px}
.drill-grp{font-size:11px;color:var(--text3);margin-top:1px}
.drill-val-d{font-size:14px;font-weight:900;font-variant-numeric:tabular-nums;flex-shrink:0}

/* ═══ Empty ═══ */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;text-align:center}
.empty svg{width:52px;height:52px;stroke:var(--text3);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.empty-title{font-size:17px;font-weight:800;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.6}

/* ═══ Animations ═══ */
@keyframes nara-spin-cw{to{transform:rotate(360deg)}}
@keyframes nara-scan{to{transform:rotate(360deg)}}
@keyframes nara-shimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.7) drop-shadow(0 0 4px rgba(139,92,246,.6))}}
@keyframes nara-orbit{0%{transform:rotate(0deg) translateX(var(--r)) rotate(0deg) scale(1)}50%{transform:rotate(180deg) translateX(var(--r)) rotate(-180deg) scale(.45);opacity:.35}100%{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg) scale(1)}}
.o0{--r:16px;animation:nara-orbit 6s linear infinite;animation-delay:0s}
.o1{--r:17px;animation:nara-orbit 7s linear infinite;animation-delay:-1.5s}
.o2{--r:16px;animation:nara-orbit 8.5s linear infinite;animation-delay:-3s}
.o3{--r:17px;animation:nara-orbit 9s linear infinite;animation-delay:-4.5s}
.o4{--r:16px;animation:nara-orbit 10s linear infinite;animation-delay:-6s}
.o5{--r:17px;animation:nara-orbit 11s linear infinite;animation-delay:-7.5s}
</style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="nara-logo-wrap" id="logoWrap"></div>
    <div class="logo-title">
      <div class="logo-name">NARA</div>
      <div class="logo-sub">P&L Report</div>
    </div>
    <button class="month-pill" id="monthBtn" onclick="openMonthModal()">
      <span id="monthText">ก.พ.</span>
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-summary" onclick="switchTab('summary')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>สรุป
    </button>
    <button class="tab-btn" id="tab-pnl" onclick="switchTab('pnl')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>P&amp;L
    </button>
    <button class="tab-btn" id="tab-branch" onclick="switchTab('branch')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>สาขา
    </button>
    <button class="tab-btn" id="tab-cc" onclick="switchTab('cc')">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>แผนก
    </button>
  </div>
</div>

<!-- Month Modal -->
<div class="modal-bg" id="monthModal" style="display:none" onclick="if(event.target===this)closeModal('monthModal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">เลือกเดือน</div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<!-- Drill Modal -->
<div class="drill-bg" id="drillModal" style="display:none" onclick="if(event.target===this)closeModal('drillModal')">
  <div class="drill-sheet">
    <div class="modal-handle" style="margin-bottom:8px"></div>
    <div class="drill-header">
      <div class="drill-title" id="drillTitle"></div>
      <div class="drill-sub" id="drillSub"></div>
    </div>
    <div class="drill-list" id="drillList"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// NARA Mobile v3 — Embedded Data Edition
// ════════════════════════════════════════
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

// ─── Embedded Data ───
const D=(()=>{const raw=document.getElementById('nara-data').textContent;return JSON.parse(raw)})();
const BRANCHES=D.branches;
const SORTED_BR=[...BRANCHES].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
const PNL_MONTHS=D.pnl; // array of pnl results per month [0=ม.ค., 1=ก.พ.]
const PL=D.plStructure;
const DEPTS=D.departments;
const EXP_ITEMS=D.expItems;
const ALLOC_CC=D.allocCC;
const MAX_MI=D.currentMonthIndex;

// ─── State ───
let activeTab='summary';
let selBranch='GRAND_TOTAL';
let ytd=false;
let mi=MAX_MI; // current month index (0..MAX_MI)
let expanded=new Set();
let dark=true;

// ─── Formatters ───
function roundTo2(n){return Math.round(n*100)/100}
function fmt(n){
  if(n===undefined||n===null||isNaN(n))return '-';
  const abs=Math.abs(n);
  const s=abs.toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0});
  return n<0?`(${s})`:s;
}
function cls(n){return n>0?'pos':n<0?'neg':'zer'}

// ─── Get P&L value ───
function getVal(topicId,branch){
  const pnl=PNL_MONTHS[mi];
  if(!pnl)return 0;
  const item=pnl.items[topicId];
  if(!item)return 0;
  const k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  return(item.total&&item.total[k]!==undefined)?item.total[k]:0;
}
function getYtdVal(topicId,branch){
  let sum=0;
  for(let m=0;m<=mi;m++){
    const pnl=PNL_MONTHS[m];
    if(!pnl)continue;
    const item=pnl.items[topicId];
    if(!item)continue;
    const k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
    sum+=item.total&&item.total[k]!==undefined?item.total[k]:0;
  }
  return roundTo2(sum);
}
function getTotals(branch){
  const k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  const pnl=PNL_MONTHS[mi];
  if(!pnl)return{revenue:0,expense:0,profit:0};
  return{
    revenue:pnl.totals.revenue[k]||0,
    expense:pnl.totals.expense[k]||0,
    profit:pnl.totals.profit[k]||0
  };
}
function getYtdTotals(branch){
  const k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  let rev=0,exp=0;
  for(let m=0;m<=mi;m++){
    const p=PNL_MONTHS[m];if(!p)continue;
    rev+=p.totals.revenue[k]||0;
    exp+=p.totals.expense[k]||0;
  }
  return{revenue:roundTo2(rev),expense:roundTo2(exp),profit:roundTo2(rev-exp)};
}
function getTopicVal(t){
  const ds=t.displayNegate?-1:1;
  const v=ytd?getYtdVal(t.id,selBranch):getVal(t.id,selBranch);
  return roundTo2(ds*v);
}

// ─── NARA Logo ───
function buildLogo(){
  const bg=dark?'#0d0f1a':'#fff';
  return`<div style="width:38px;height:38px;position:relative;display:flex;align-items:center;justify-content:center">

// ─── Theme ───
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
  document.getElementById('logoWrap').innerHTML=buildLogo();
}

// ─── Month Modal ───
function openMonthModal(){
  const g=document.getElementById('monthGrid');
  g.innerHTML=MONTHS.slice(0,MAX_MI+1).map((m,i)=>
    `<button class="mo-btn${i===mi?' active':''}" onclick="selectMonth(${i})">${m}</button>`
  ).join('');
  document.getElementById('monthModal').style.display='flex';
}
function selectMonth(i){
  mi=i;
  document.getElementById('monthText').textContent=(ytd?'YTD ':'')+MONTHS[mi];
  closeModal('monthModal');
  render();
}
function closeModal(id){document.getElementById(id).style.display='none'}

// ─── Tab ───
function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}
function selectBranch(b){selBranch=b;render()}
function toggleYtd(v){
  ytd=v;
  document.getElementById('monthText').textContent=(ytd?'YTD ':'')+MONTHS[mi];
  render();
}
function toggleExp(id){
  if(expanded.has(id))expanded.delete(id);else expanded.add(id);
  render();
}

// ═══ RENDER ═══
function render(){
  const el=document.getElementById('content');
  if(activeTab==='summary')renderSummary(el);
  else if(activeTab==='pnl')renderPnl(el);
  else if(activeTab==='branch')renderBranch(el);
  else renderCC(el);
}

// ─── Summary ───
function renderSummary(el){
  const t=ytd?getYtdTotals(selBranch):getTotals(selBranch);
  const margin=t.revenue!==0?((t.profit/t.revenue)*100).toFixed(1):'0.0';
  const chipHtml=`<div class="branch-row">
    <div class="chip${selBranch==='GRAND_TOTAL'?' active':''}" onclick="selectBranch('GRAND_TOTAL')">รวมทุกสาขา</div>
    ${SORTED_BR.filter(b=>b!=='S000').map(b=>`<div class="chip${selBranch===b?' active':''}" onclick="selectBranch('${b}')">${b}</div>`).join('')}
  </div>`;
  const topicRows=PL.map(t=>{
    const isSub=t.type==='subtotal'||t.type==='profit';
    const v=getTopicVal(t);
    return`<div class="pl-row ${isSub?(t.type==='profit'?'profit-row':'subtotal-row'):'topic-row'}" onclick="${!isSub?`drillTopic('${t.id}')`:''}" style="cursor:${!isSub?'pointer':'default'}">
      <div class="pl-noico"></div>
      <div class="pl-name">${isSub?'= ':''}<span style="font-weight:${isSub?800:600}">${t.title}</span></div>
      <div class="pl-val ${cls(v)}">${fmt(v)}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="ytd-row">
      <span class="ytd-label">YTD (สะสมถึงเดือนนี้)</span>
      <label class="sw"><input type="checkbox" ${ytd?'checked':''} onchange="toggleYtd(this.checked)"><div class="sw-track"></div><div class="sw-thumb"></div></label>
    </div>
    ${chipHtml}
    <div class="section" style="padding-top:4px">
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-label">รายได้${ytd?' YTD':''}</div><div class="kpi-val pos">${fmt(t.revenue)}</div><div class="kpi-sub">บาท</div></div>
        <div class="kpi"><div class="kpi-label">ค่าใช้จ่าย${ytd?' YTD':''}</div><div class="kpi-val neg">${fmt(t.expense)}</div><div class="kpi-sub">บาท</div></div>
        <div class="kpi full" style="border-left:3px solid ${t.profit>=0?'var(--green)':'var(--red)'}">
          <div class="kpi-label">กำไรสุทธิ${ytd?' YTD':''}</div>
          <div class="kpi-val ${cls(t.profit)}">${fmt(t.profit)}</div>
          <div class="kpi-sub">Margin ${margin}% · ${selBranch==='GRAND_TOTAL'?'รวมทุกสาขา':selBranch}</div>
        </div>
      </div>
    </div>
    <div class="section" style="padding-top:0">
      <div class="sec-label">รายละเอียด P&amp;L</div>
      <div class="card">${topicRows}</div>
    </div>`;
}

// ─── P&L Detail ───
function renderPnl(el){
  const chipHtml=`<div class="branch-row" style="padding-top:10px">
    <div class="chip${selBranch==='GRAND_TOTAL'?' active':''}" onclick="selectBranch('GRAND_TOTAL')">รวมทุกสาขา</div>
    ${SORTED_BR.filter(b=>b!=='S000').map(b=>`<div class="chip${selBranch===b?' active':''}" onclick="selectBranch('${b}')">${b}</div>`).join('')}
  </div>`;

  function nodeHtml(item,depth=0){
    if(!item||!item.id)return'';
    const isSub=item.type==='subtotal'||item.type==='profit';
    const ds=item.displayNegate?-1:1;
    const v=ytd?roundTo2(ds*getYtdVal(item.id,selBranch)):roundTo2(ds*getVal(item.id,selBranch));
    const exp=expanded.has(item.id);
    const kids=[...(item.children||[]),(item.lines||[]),...(item.lines&&!item.children?[]:[])];
    const allkids=(item.children&&item.children.length>0)?item.children:(item.lines&&item.lines.length>0?item.lines:[]);
    const hasKids=!isSub&&allkids.length>0;
    let h=`<div class="pl-row ${isSub?(item.type==='profit'?'profit-row':'subtotal-row'):(depth===0?'topic-row':'')}"
      onclick="${hasKids?`toggleExp('${item.id}')`:(!isSub?`drillTopic('${item.id}')`:'')}"; style="padding-left:${14+depth*12}px;cursor:${hasKids?'pointer':(!isSub?'pointer':'default')}">
      ${hasKids?`<svg class="pl-chev${exp?' open':''}" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>`:`<div class="pl-noico"></div>`}
      <div class="pl-name">${isSub?'= ':''}${item.title||''}</div>
      <div class="pl-val ${cls(v)}">${fmt(v)}</div>
    </div>`;
    if(exp&&hasKids)h+=allkids.map(c=>nodeHtml(c,depth+1)).join('');
    return h;
  }
  const rows=PL.map(t=>nodeHtml(t)).join('');
  el.innerHTML=`
    <div class="ytd-row"><span class="ytd-label">YTD</span>
      <label class="sw"><input type="checkbox" ${ytd?'checked':''} onchange="toggleYtd(this.checked)"><div class="sw-track"></div><div class="sw-thumb"></div></label>
    </div>
    ${chipHtml}
    <div class="section" style="padding-top:8px">
      <div class="card">${rows||'<div class="empty"><div class="empty-sub">ไม่มีโครงสร้าง P&L</div></div>'}</div>
    </div>`;
}

// ─── Branch ───
function renderBranch(el){
  const pnl=PNL_MONTHS[mi];
  const brs=SORTED_BR.filter(b=>b!=='S000');
  let data=brs.map(b=>{
    let rev=0,prof=0;
    if(ytd){const t=getYtdTotals(b);rev=t.revenue;prof=t.profit}
    else{const t=getTotals(b);rev=t.revenue;prof=t.profit}
    return{b,rev,prof};
  }).sort((a,x)=>x.rev-a.rev);
  const maxRev=Math.max(...data.map(d=>Math.abs(d.rev)),1);
  const rows=data.map((d,i)=>{
    const w=Math.max(4,Math.abs(d.rev)/maxRev*100);
    const c=d.rev>=0?'var(--accent)':'var(--red)';
    return`<div class="br-row">
      <div class="br-rank">${i+1}</div>
      <div class="br-code">${d.b}</div>
      <div class="br-bar-wrap"><div class="br-bar" style="width:${w}%;background:${c}"></div></div>
      <div class="br-val ${cls(d.rev)}">${fmt(d.rev)}</div>
    </div>`;
  }).join('');
  const profRows=data.map((d,i)=>{
    const maxP=Math.max(...data.map(x=>Math.abs(x.prof)),1);
    const w=Math.max(4,Math.abs(d.prof)/maxP*100);
    const c=d.prof>=0?'var(--green)':'var(--red)';
    return`<div class="br-row">
      <div class="br-rank">${i+1}</div>
      <div class="br-code">${d.b}</div>
      <div class="br-bar-wrap"><div class="br-bar" style="width:${w}%;background:${c}"></div></div>
      <div class="br-val ${cls(d.prof)}">${fmt(d.prof)}</div>
    </div>`;
  }).join('');
  el.innerHTML=`
    <div class="ytd-row"><span class="ytd-label">YTD</span>
      <label class="sw"><input type="checkbox" ${ytd?'checked':''} onchange="toggleYtd(this.checked)"><div class="sw-track"></div><div class="sw-thumb"></div></label>
    </div>
    <div class="section" style="padding-top:10px">
      <div class="sec-label">รายได้รายสาขา</div>
      <div class="card">${rows}</div>
    </div>
    <div class="section" style="padding-top:0">
      <div class="sec-label">กำไร / ขาดทุน รายสาขา</div>
      <div class="card">${profRows}</div>
    </div>`;
}

// ─── Cost Center ───
function renderCC(el){
  const deptMap={};
  DEPTS.forEach(d=>{deptMap[d.code]=d.name});
  const deptData={};
  const unalloc={groups:{},directTotal:0,allocTotal:0};

  EXP_ITEMS.forEach(r=>{
    if(r.b==='S000')return; // S000 not direct unless in allocCC
    const amt=r.v;
    if(!amt||amt===0)return;
    const dc=r.d||'';
    const grp=r.g||r.c;
    const target=dc?(deptData[dc]=deptData[dc]||{groups:{},directTotal:0,allocTotal:0}):unalloc;
    if(!target.groups[grp])target.groups[grp]={direct:0,alloc:0};
    target.groups[grp].direct=roundTo2(target.groups[grp].direct+amt);
    target.directTotal=roundTo2(target.directTotal+amt);
  });

  ALLOC_CC.forEach(ai=>{
    const amt=roundTo2(SORTED_BR.filter(b=>b!=='S000').reduce((s,b)=>s+(ai.alloc[b]||0),0));
    if(!amt||amt===0)return;
    const grp=ai.name||ai.code;
    // try to find dept from EXP_ITEMS
    const found=EXP_ITEMS.find(r=>r.c===ai.code&&r.d);
    const dc=found?found.d:'';
    const target=dc?(deptData[dc]=deptData[dc]||{groups:{},directTotal:0,allocTotal:0}):unalloc;
    if(!target.groups[grp])target.groups[grp]={direct:0,alloc:0};
    target.groups[grp].alloc=roundTo2(target.groups[grp].alloc+amt);
    target.allocTotal=roundTo2(target.allocTotal+amt);
  });

  const allDepts=Object.keys(deptData).sort();
  const grandTotal=roundTo2(allDepts.reduce((s,dc)=>s+deptData[dc].directTotal+deptData[dc].allocTotal,0)+unalloc.directTotal+unalloc.allocTotal);

  function ccCard(dc,data,label){
    const total=roundTo2(data.directTotal+data.allocTotal);
    if(total===0&&data.directTotal===0&&data.allocTotal===0)return'';
    const pct=grandTotal>0?((Math.abs(total)/Math.abs(grandTotal))*100).toFixed(1):'0.0';
    const dW=total!==0?Math.max(5,(Math.abs(data.directTotal)/Math.abs(total)*100)):0;
    const aW=total!==0?Math.max(5,(Math.abs(data.allocTotal)/Math.abs(total)*100)):0;
    const exp=expanded.has('cc_'+dc);
    const groups=Object.entries(data.groups).sort((a,b)=>Math.abs(b[1].direct+b[1].alloc)-Math.abs(a[1].direct+a[1].alloc));
    const grpHtml=groups.slice(0,expanded.has('cc_all_'+dc)?999:6).map(([grp,g])=>{
      const t=roundTo2(g.direct+g.alloc);
      return`<div class="cc-grp"><div class="cc-grp-name">${grp}</div><div class="cc-grp-val ${cls(t)}">${fmt(t)}</div></div>`;
    }).join('');
    const more=groups.length>6&&!expanded.has('cc_all_'+dc)?`<div style="text-align:center;padding-top:6px;font-size:12px;color:var(--accent);cursor:pointer;font-weight:700" onclick="expanded.add('cc_all_${dc}');render()">ดูเพิ่มอีก ${groups.length-6} รายการ</div>`:'';
    return`<div class="cc-card">
      <div class="cc-header" onclick="toggleExp('cc_${dc}')">
        <div class="cc-dot"></div>
        <div class="cc-info">
          <div class="cc-name">${label}</div>
          <div class="cc-code-tag">${dc!=='__u'?dc:''} · ${pct}%</div>
        </div>
        <div class="cc-total">${fmt(total)}</div>
        <svg class="cc-chev" style="transform:rotate(${exp?90:0}deg)" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      ${exp?`<div class="cc-body">
        <div class="cc-bar-track">
          <div class="cc-bar-d" style="width:${dW}%"></div>
          <div class="cc-bar-a" style="width:${aW}%"></div>
        </div>
        <div class="cc-stats">
          <div><div class="cc-stat-lbl">🟡 Direct</div><div class="cc-stat-val" style="color:var(--amber)">${fmt(data.directTotal)}</div></div>
          <div><div class="cc-stat-lbl">🔵 Alloc</div><div class="cc-stat-val" style="color:var(--cyan)">${fmt(data.allocTotal)}</div></div>
        </div>
        <div class="cc-groups">${grpHtml}${more}</div>
      </div>`:''}
    </div>`;
  }

  const cards=allDepts.map(dc=>ccCard(dc,deptData[dc],deptMap[dc]||dc)).join('');
  const ucard=(unalloc.directTotal!==0||unalloc.allocTotal!==0)?ccCard('__u',unalloc,'ไม่ระบุแผนก'):'';

  el.innerHTML=`
    <div class="section">
      <div class="kpi" style="flex-direction:row;display:flex;align-items:center;gap:16px;padding:12px 14px">
        <div><div class="kpi-label">ค่าใช้จ่ายรวม</div><div class="kpi-val neg" style="font-size:18px">${fmt(grandTotal)}</div></div>
        <div style="margin-left:auto;text-align:right;font-size:11px;color:var(--text3)">${allDepts.length} แผนก<br>${MONTHS[mi]}</div>
      </div>
    </div>
    <div class="section" style="padding-top:0">${cards}${ucard}${!cards&&!ucard?'<div class="empty"><div class="empty-title">ไม่มีข้อมูลแผนก</div></div>':''}</div>`;
}

// ─── Drill ───
function findTopic(structure,id){
  for(const t of structure){
    if(t.id===id)return t;
    const kids=[...(t.children||[]),(t.lines||[])];
    const ak=(t.children&&t.children.length>0)?t.children:(t.lines&&t.lines.length>0?t.lines:[]);
    const f=findTopic(ak,id);if(f)return f;
  }
  return null;
}
function drillTopic(topicId){
  const topic=findTopic(PL,topicId);
  if(!topic)return;
  const pnl=PNL_MONTHS[mi];
  const ds=topic.displayNegate?-1:1;
  const v=ytd?roundTo2(ds*getYtdVal(topicId,selBranch)):roundTo2(ds*getVal(topicId,selBranch));
  document.getElementById('drillTitle').textContent=topic.title;
  document.getElementById('drillSub').textContent=`${fmt(v)} บาท · ${MONTHS[mi]}${selBranch!=='GRAND_TOTAL'?' · '+selBranch:''}`;

  // gather accounts from pnl items
  const rows=[];
  if(pnl&&pnl.items[topicId]){
    const item=pnl.items[topicId];
    // show branch breakdown
    const k=selBranch==='GRAND_TOTAL'?null:selBranch;
    // find child items
    function gatherItems(t){
      if(!t||!t.id)return;
      const res=pnl.items[t.id];
      if(res&&t.type!=='subtotal'&&t.type!=='profit'){
        const childVal=k?(res.total[k]||0):res.total['GRAND_TOTAL']||0;
        if(childVal!==0){
          rows.push({name:t.title,val:roundTo2((t.displayNegate?-1:1)*childVal)});
        }
      }
      const kids=(t.children&&t.children.length>0)?t.children:(t.lines&&t.lines.length>0?t.lines:[]);
      kids.forEach(c=>gatherItems(c));
    }
    const kids=(topic.children&&topic.children.length>0)?topic.children:(topic.lines&&topic.lines.length>0?topic.lines:[]);
    if(kids.length>0)kids.forEach(c=>gatherItems(c));
    else{
      // leaf — show branch breakdown
      SORTED_BR.filter(b=>b!=='S000').forEach(b=>{
        const bv=item.total[b]||0;
        if(bv!==0)rows.push({name:b,val:roundTo2(ds*bv)});
      });
    }
  }
  rows.sort((a,b)=>Math.abs(b.val)-Math.abs(a.val));

  document.getElementById('drillList').innerHTML=rows.length
    ?rows.map(r=>`<div class="drill-item">
        <div class="drill-left"><div class="drill-name">${r.name}</div></div>
        <div class="drill-val-d ${cls(r.val)}">${fmt(r.val)}</div>
      </div>`).join('')
    :'<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">ไม่มีรายการ</div>';
  document.getElementById('drillModal').style.display='flex';
}

// ─── Init ───
function init(){
  document.getElementById('logoWrap').innerHTML=buildLogo();
  document.getElementById('monthText').textContent=MONTHS[mi];
  buildMonthGrid();
  render();
}
function buildMonthGrid(){
  document.getElementById('monthGrid').innerHTML=
    MONTHS.slice(0,MAX_MI+1).map((m,i)=>`<button class="mo-btn${i===mi?' active':''}" onclick="selectMonth(${i})">${m}</button>`).join('');
}
init();
