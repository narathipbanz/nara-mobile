<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NARA">
<meta name="theme-color" content="#0d0f1a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiTkFSQSBSZXBvcnQiLCJzaG9ydF9uYW1lIjoiTkFSQSIsInN0YXJ0X3VybCI6Ii4iLCJkaXNwbGF5Ijoic3RhbmRhbG9uZSIsImJhY2tncm91bmRfY29sb3IiOiIjMGQwZjFhIiwidGhlbWVfY29sb3IiOiIjMGQwZjFhIn0=">
<title>NARA Report</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══ Design Tokens ═══ */
:root {
  --bg:#0d0f1a; --surface:#151824; --surface2:#1c2033; --surface3:#222640;
  --border:#252a3d; --border2:#2d3350;
  --text:#eef0f9; --text2:#9ba3c0; --text3:#555e7a;
  --accent:#6366f1; --accent2:#818cf8; --accent-l:rgba(99,102,241,.12); --accent-b:rgba(99,102,241,.35);
  --green:#10b981; --green-l:rgba(16,185,129,.1); --green-b:rgba(16,185,129,.3);
  --red:#f87171; --red-l:rgba(248,113,113,.1); --red-b:rgba(248,113,113,.3);
  --amber:#fbbf24; --amber-l:rgba(251,191,36,.1);
  --cyan:#22d3ee; --cyan-l:rgba(34,211,238,.1);
  --violet:#8b5cf6; --cyan2:#06b6d4;
  --r:14px; --r2:10px; --r3:20px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
[data-theme="light"] {
  --bg:#f0f2f8; --surface:#fff; --surface2:#f5f7fc; --surface3:#eef0f8;
  --border:#e2e5f0; --border2:#cdd2e8;
  --text:#0f1629; --text2:#4a5278; --text3:#8b94b8;
  --accent:#4f46e5; --accent2:#6366f1; --accent-l:rgba(79,70,229,.08); --accent-b:rgba(79,70,229,.25);
  --green:#059669; --green-l:rgba(5,150,105,.08); --green-b:rgba(5,150,105,.25);
  --red:#dc2626; --red-l:rgba(220,38,38,.08); --red-b:rgba(220,38,38,.25);
  --amber:#92400e; --amber-l:rgba(146,64,14,.08);
  --cyan:#0e7490; --cyan-l:rgba(14,116,144,.08);
  --violet:#7c3aed; --cyan2:#0891b2;
}

/* ═══ Base ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sarabun',system-ui,sans-serif;font-size:15px;overscroll-behavior:none;transition:background .2s,color .2s}

/* ═══ Layout ═══ */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:430px;margin:0 auto;position:relative}
.topbar{
  flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px 10px;padding-top:max(10px,var(--safe-t));
  display:flex;align-items:center;gap:10px;
}
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.tab-bar{
  flex-shrink:0;display:flex;background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:max(var(--safe-b),6px);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px 5px;cursor:pointer;border:none;background:none;color:var(--text3);
  font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.02em;transition:color .15s;
}
.tab-btn.active{color:var(--accent)}
.tab-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:transform .15s}
.tab-btn.active svg{transform:scale(1.08)}

/* ═══ NARA Logo ═══ */
.nara-logo-wrap{width:38px;height:38px;flex-shrink:0;position:relative}
.logo-title{flex:1;min-width:0}
.logo-name{font-size:16px;font-weight:900;letter-spacing:.02em;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* ═══ Toggle dark/light ═══ */
.theme-btn{
  width:36px;height:36px;border-radius:10px;border:1px solid var(--border);
  background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;transition:background .15s;
}
.theme-btn:active{background:var(--surface3)}

/* ═══ Month pill ═══ */
.month-pill{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  background:var(--surface2);border:1px solid var(--border);border-radius:20px;
  cursor:pointer;font-size:12px;font-weight:700;color:var(--text2);
  white-space:nowrap;flex-shrink:0;
}
.month-pill svg{width:12px;height:12px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ═══ Section ═══ */
.section{padding:12px 14px}
.section+.section{padding-top:0}
.sec-label{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;padding-left:2px}

/* ═══ Cards ═══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card+.card{margin-top:8px}

/* ═══ KPI Cards ═══ */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px 14px 12px}
.kpi.full{grid-column:1/-1}
.kpi-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:900;letter-spacing:-.5px;font-variant-numeric:tabular-nums;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:3px;font-variant-numeric:tabular-nums}
.pos{color:var(--green)} .neg{color:var(--red)} .zer{color:var(--text3)}

/* ═══ Branch chips ═══ */
.branch-row{display:flex;gap:6px;overflow-x:auto;padding:0 14px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.branch-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid var(--border);color:var(--text2);background:var(--surface);cursor:pointer;white-space:nowrap;transition:all .12s}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chip:active{opacity:.75}

/* ═══ YTD Toggle ═══ */
.ytd-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 4px}
.ytd-label{font-size:12px;font-weight:700;color:var(--text2)}
.sw{position:relative;width:42px;height:24px}
.sw input{opacity:0;width:0;height:0}
.sw-track{position:absolute;inset:0;background:var(--border2);border-radius:12px;cursor:pointer;transition:background .2s}
.sw input:checked+.sw-track{background:var(--accent)}
.sw-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;pointer-events:none;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw input:checked~.sw-thumb{transform:translateX(18px)}

/* ═══ P&L List ═══ */
.pl-row{display:flex;align-items:center;padding:11px 14px;gap:8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;min-height:44px}
.pl-row:last-child{border-bottom:none}
.pl-row:active{background:var(--surface2)}
.pl-row.topic-row{background:var(--surface2)}
.pl-row.profit-row{background:var(--accent-l);border-left:3px solid var(--accent)}
.pl-row.subtotal-row{background:var(--surface2);border-left:3px solid var(--accent2)}
.pl-name{flex:1;font-size:13.5px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-row.topic-row .pl-name{font-weight:800;font-size:14px}
.pl-row.profit-row .pl-name{font-weight:800;color:var(--accent2)}
.pl-row.subtotal-row .pl-name{font-weight:700;color:var(--accent2);font-size:13px}
.pl-val{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0;min-width:80px}
.pl-chev{width:14px;height:14px;flex-shrink:0;stroke:var(--text3);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .2s}
.pl-chev.open{transform:rotate(90deg)}
.pl-noico{width:14px;flex-shrink:0}

/* ═══ Branch Summary ═══ */
.br-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--border);gap:10px;min-height:44px}
.br-row:last-child{border-bottom:none}
.br-rank{width:20px;font-size:11px;font-weight:700;color:var(--text3);text-align:center;flex-shrink:0}
.br-code{font-size:13px;font-weight:800;color:var(--accent2);width:50px;flex-shrink:0}
.br-bar-wrap{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.br-bar{height:100%;border-radius:3px;transition:width .4s}
.br-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;text-align:right;flex-shrink:0;min-width:70px}

/* ═══ Cost Center ═══ */
.cc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.cc-header{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer;min-height:52px;transition:background .1s}
.cc-header:active{background:var(--surface2)}
.cc-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);flex-shrink:0}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-code-tag{font-size:10px;color:var(--text3);margin-top:1px}
.cc-total{font-size:15px;font-weight:900;font-variant-numeric:tabular-nums;color:var(--red);flex-shrink:0}
.cc-chev{width:14px;height:14px;stroke:var(--text3);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;transition:transform .2s}
.cc-body{padding:10px 14px 14px;border-top:1px solid var(--border)}
.cc-bar-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;display:flex;margin-bottom:8px}
.cc-bar-d{height:100%;background:var(--amber);border-radius:3px 0 0 3px}
.cc-bar-a{height:100%;background:var(--cyan)}
.cc-stats{display:flex;gap:12px;margin-bottom:10px}
.cc-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3)}
.cc-stat-val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:2px}
.cc-groups{display:flex;flex-direction:column;gap:4px}
.cc-grp{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface2);border-radius:8px}
.cc-grp-name{font-size:12px;color:var(--text2);flex:1;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-grp-val{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}

/* ═══ Modal ═══ */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.modal-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:70vh;overflow-y:auto;padding-bottom:max(var(--safe-b),16px)}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 2px}
.modal-title{text-align:center;font-size:13px;font-weight:800;color:var(--text2);padding:4px 16px 12px;letter-spacing:.04em;text-transform:uppercase}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 14px 8px}
.mo-btn{padding:12px 4px;border-radius:12px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;border:1px solid var(--border);color:var(--text2);background:var(--surface2);font-family:inherit;transition:all .12s}
.mo-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.mo-btn:active{opacity:.7}

/* ═══ Drill Modal ═══ */
.drill-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:flex-end;backdrop-filter:blur(2px)}
.drill-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;max-height:78vh;display:flex;flex-direction:column;padding-bottom:max(var(--safe-b),16px)}
.drill-header{padding:0 16px 12px;flex-shrink:0}
.drill-title{font-size:16px;font-weight:900}
.drill-sub{font-size:12px;color:var(--text3);margin-top:3px}
.drill-list{flex:1;overflow-y:auto}
.drill-item{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:1px solid var(--border)}
.drill-item:last-child{border-bottom:none}
.drill-left{flex:1;padding-right:12px}
.drill-code{font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:2px}
.drill-name{font-size:13px}
.drill-grp{font-size:11px;color:var(--text3);margin-top:1px}
.drill-val-d{font-size:14px;font-weight:900;font-variant-numeric:tabular-nums;flex-shrink:0}

/* ═══ Empty / Import ═══ */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;text-align:center}
.empty svg{width:52px;height:52px;stroke:var(--text3);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.empty-title{font-size:17px;font-weight:800;color:var(--text2)}
.empty-sub{font-size:13px;color:var(--text3);line-height:1.6}

.import-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;gap:20px;text-align:center;min-height:100%}
.import-logo{width:80px;height:80px;position:relative;margin-bottom:8px}
.import-title{font-size:22px;font-weight:900;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.import-desc{font-size:13px;color:var(--text3);line-height:1.6;max-width:280px}
.import-btn{
  display:flex;align-items:center;gap:10px;padding:16px 32px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:16px;
  color:#fff;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 20px rgba(99,102,241,.4);transition:transform .12s,box-shadow .12s;
}
.import-btn:active{transform:scale(.96);box-shadow:0 2px 10px rgba(99,102,241,.3)}
.import-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.import-hint{font-size:11px;color:var(--text3);margin-top:4px}
.import-or{font-size:11px;color:var(--text3);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:4px 0}
.import-cached{
  display:flex;align-items:center;gap:8px;padding:12px 20px;
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  color:var(--text2);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  transition:background .12s;
}
.import-cached:active{background:var(--surface2)}
.import-cached svg{width:16px;height:16px;stroke:var(--accent2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.import-error{color:var(--red);font-size:12px;font-weight:700;margin-top:4px;min-height:18px}

/* ═══ Data info bar ═══ */
.data-info{
  display:flex;align-items:center;gap:8px;padding:6px 14px;
  background:var(--surface2);font-size:11px;color:var(--text3);
  border-bottom:1px solid var(--border);
}
.data-info-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.data-info-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.data-info-btn{
  padding:3px 10px;border-radius:8px;border:1px solid var(--border);
  background:none;color:var(--text3);font-family:inherit;font-size:10px;font-weight:700;
  cursor:pointer;flex-shrink:0;
}
.data-info-btn:active{background:var(--surface3)}

/* ═══ Animations ═══ */
@keyframes nara-spin-cw{to{transform:rotate(360deg)}}
@keyframes nara-scan{to{transform:rotate(360deg)}}
@keyframes nara-shimmer{0%,100%{filter:brightness(1)}50%{filter:brightness(1.7) drop-shadow(0 0 4px rgba(139,92,246,.6))}}
@keyframes nara-orbit{0%{transform:rotate(0deg) translateX(var(--r)) rotate(0deg) scale(1)}50%{transform:rotate(180deg) translateX(var(--r)) rotate(-180deg) scale(.45);opacity:.35}100%{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg) scale(1)}}
.o0{--r:16px;animation:nara-orbit 6s linear infinite;animation-delay:0s}
.o1{--r:17px;animation:nara-orbit 7s linear infinite;animation-delay:-1.5s}
.o2{--r:16px;animation:nara-orbit 8.5s linear infinite;animation-delay:-3s}
.o3{--r:17px;animation:nara-orbit 9s linear infinite;animation-delay:-4.5s}
.o4{--r:16px;animation:nara-orbit 10s linear infinite;animation-delay:-6s}
.o5{--r:17px;animation:nara-orbit 11s linear infinite;animation-delay:-7.5s}

/* ═══ Import logo (bigger) ═══ */
@keyframes nara-orbit-lg{0%{transform:rotate(0deg) translateX(var(--r)) rotate(0deg) scale(1)}50%{transform:rotate(180deg) translateX(var(--r)) rotate(-180deg) scale(.45);opacity:.35}100%{transform:rotate(360deg) translateX(var(--r)) rotate(-360deg) scale(1)}}
.lo0{--r:34px;animation:nara-orbit-lg 6s linear infinite;animation-delay:0s}
.lo1{--r:36px;animation:nara-orbit-lg 7s linear infinite;animation-delay:-1.5s}
.lo2{--r:34px;animation:nara-orbit-lg 8.5s linear infinite;animation-delay:-3s}
.lo3{--r:36px;animation:nara-orbit-lg 9s linear infinite;animation-delay:-4.5s}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease-out both}
.fade-in-d1{animation-delay:.1s}
.fade-in-d2{animation-delay:.2s}
.fade-in-d3{animation-delay:.3s}
.fade-in-d4{animation-delay:.4s}
</style>
</head>
<body>
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="nara-logo-wrap" id="logoWrap"></div>
    <div class="logo-title">
      <div class="logo-name">NARA</div>
      <div class="logo-sub">P&amp;L Report</div>
    </div>
    <button class="month-pill" id="monthBtn" onclick="openMonthModal()" style="display:none">
      <span id="monthText"></span>
      <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- Data info bar (hidden until data loaded) -->
  <div class="data-info" id="dataInfo" style="display:none">
    <div class="data-info-dot"></div>
    <div class="data-info-text" id="dataInfoText"></div>
    <button class="data-info-btn" onclick="clearData()">เปลี่ยนข้อมูล</button>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>

  <!-- Tab Bar (hidden until data loaded) -->
  <div class="tab-bar" id="tabBar" style="display:none">
    <button class="tab-btn active" id="tab-summary" onclick="switchTab('summary')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>สรุป
    </button>
    <button class="tab-btn" id="tab-pnl" onclick="switchTab('pnl')">
      <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>P&amp;L
    </button>
    <button class="tab-btn" id="tab-branch" onclick="switchTab('branch')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>สาขา
    </button>
    <button class="tab-btn" id="tab-cc" onclick="switchTab('cc')">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>แผนก

<script>
// ════════════════════════════════════════
// NARA Mobile v4.0 — PWA + Import JSON
// Safari iOS Safe: No nested template

var MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var STORAGE_KEY='nara_mobile_data';

// Data refs (null until loaded)
var D=null, BRANCHES=null, SORTED_BR=null, PNL_MONTHS=null, PL=null;
var DEPTS=null, EXP_ITEMS=null, ALLOC_CC=null, MAX_MI=0;

// State
var activeTab='summary';
var selBranch='GRAND_TOTAL';
var ytd=false;
var mi=0;
var expanded={};
var dark=true;
var dataLoaded=false;

// ─── Utils ───
function r2(n){return Math.round(n*100)/100}
function fmt(n){
  if(n===undefined||n===null||isNaN(n))return'-';
  var abs=Math.abs(n);
  var s=abs.toLocaleString('th-TH',{minimumFractionDigits:0,maximumFractionDigits:0});
  return n<0?'('+s+')':s;
}
function cls(n){return n>0?'pos':n<0?'neg':'zer'}
function esc(s){return String(s).replace(/'/g,'\\x27').replace(/"/g,'&quot;')}

// ─── P&L calc ───
function getVal(topicId, branch){
  var pnl=PNL_MONTHS[mi];
  if(!pnl)return 0;
  var item=pnl.items[topicId];
  if(!item||!item.total)return 0;
  var k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  return item.total[k]||0;
}
function getYtdVal(topicId, branch){
  var sum=0;
  var k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  for(var m=0;m<=mi;m++){
    var pnl=PNL_MONTHS[m];
    if(!pnl)continue;
    var item=pnl.items[topicId];
    if(item&&item.total)sum+=item.total[k]||0;
  }
  return r2(sum);
}
function getTotals(branch){
  var pnl=PNL_MONTHS[mi];
  var k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  if(!pnl)return{revenue:0,expense:0,profit:0};
  return{revenue:pnl.totals.revenue[k]||0,expense:pnl.totals.expense[k]||0,profit:pnl.totals.profit[k]||0};
}
function getYtdTotals(branch){
  var k=branch==='GRAND_TOTAL'?'GRAND_TOTAL':branch;
  var rev=0,exp=0;
  for(var m=0;m<=mi;m++){
    var p=PNL_MONTHS[m];
    if(!p)continue;
    rev+=p.totals.revenue[k]||0;
    exp+=p.totals.expense[k]||0;
  }
  return{revenue:r2(rev),expense:r2(exp),profit:r2(rev-exp)};
}
function topicVal(tp){
  var ds=tp.displayNegate?-1:1;
  var v=ytd?getYtdVal(tp.id,selBranch):getVal(tp.id,selBranch);
  return r2(ds*v);
}

// ─── Logo (small - topbar) ───

    +'<div style="position:absolute;inset:-100%;background:conic-gradient(from 0deg,transparent 0 240deg,#8b5cf6 280deg,#06b6d4 360deg);animation:nara-scan 4s linear infinite;border-radius:50%"></div>'
    +'<div style="position:absolute;inset:1.5px;background:'+bg+';border-radius:50%"></div>'
    +'</div>'
    +'<div style="position:absolute;inset:7px;border:1.5px solid transparent;border-top-color:#8b5cf6;border-radius:50%;animation:nara-scan 2s linear infinite;opacity:.55"></div>'
    +'<div style="position:relative;width:20px;height:20px;background:rgba(30,30,50,.85);border:1px solid rgba(255,255,255,.12);border-radius:6px;display:flex;align-items:center;justify-content:center">'
    +'<span style="font-size:7px;font-weight:900;font-style:italic;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px;animation:nara-shimmer 3s infinite">NARA</span>'
    +'</div>'
    +'<div class="o0" style="position:absolute;width:3px;height:3px;border-radius:50%;background:#8b5cf6;top:50%;left:50%;margin:-1.5px;box-shadow:0 0 5px rgba(139,92,246,.7)"></div>'
    +'<div class="o1" style="position:absolute;width:3px;height:3px;border-radius:50%;background:#06b6d4;top:50%;left:50%;margin:-1.5px;box-shadow:0 0 5px rgba(6,182,212,.7)"></div>'
    +'<div class="o2" style="position:absolute;width:2.5px;height:2.5px;border-radius:50%;background:#8b5cf6;top:50%;left:50%;margin:-1.25px;opacity:.7"></div>'
    +'<div class="o3" style="position:absolute;width:2.5px;height:2.5px;border-radius:50%;background:#06b6d4;top:50%;left:50%;margin:-1.25px;opacity:.7"></div>'

}

// ─── Logo (large - import screen) ───
function buildLogoLg(){
  var bg=dark?'#0d0f1a':'#ffffff';
  return '<div style="width:80px;height:80px;position:relative;display:flex;align-items:center;justify-content:center">'
    +'<div style="position:absolute;inset:0;border:1.5px dashed rgba(200,200,220,.3);border-radius:50%;animation:nara-spin-cw 22s linear infinite"></div>'

    +'<div style="position:absolute;inset:2px;background:'+bg+';border-radius:50%"></div>'

    +'<div style="position:relative;width:40px;height:40px;background:rgba(30,30,50,.85);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;display:flex;align-items:center;justify-content:center">'
    +'<span style="font-size:13px;font-weight:900;font-style:italic;background:linear-gradient(135deg,#c4b5fd,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px;animation:nara-shimmer 3s infinite">NARA</span>'
    +'</div>'
    +'<div class="lo0" style="position:absolute;width:5px;height:5px;border-radius:50%;background:#8b5cf6;top:50%;left:50%;margin:-2.5px;box-shadow:0 0 8px rgba(139,92,246,.7)"></div>'
    +'<div class="lo1" style="position:absolute;width:5px;height:5px;border-radius:50%;background:#06b6d4;top:50%;left:50%;margin:-2.5px;box-shadow:0 0 8px rgba(6,182,212,.7)"></div>'
    +'<div class="lo2" style="position:absolute;width:4px;height:4px;border-radius:50%;background:#8b5cf6;top:50%;left:50%;margin:-2px;opacity:.7"></div>'
    +'<div class="lo3" style="position:absolute;width:4px;height:4px;border-radius:50%;background:#06b6d4;top:50%;left:50%;margin:-2px;opacity:.7"></div>'
    +'</div>';
}

// ─── Theme ───
function toggleTheme(){
  dark=!dark;
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
  document.getElementById('logoWrap').innerHTML=buildLogo();

// ─── Month modal ───
function openMonthModal(){
  if(!dataLoaded)return;
  var g=document.getElementById('monthGrid');
  var h='';
  for(var i=0;i<=MAX_MI;i++){
    h+='<button class="mo-btn'+(i===mi?' active':'')+'" onclick="selMonth('+i+')">'+MONTHS[i]+'</button>';
  }
  g.innerHTML=h;
  document.getElementById('monthModal').style.display='flex';
}
function selMonth(i){
  mi=i;
  document.getElementById('monthText').textContent=(ytd?'YTD ':'')+MONTHS[mi];
  closeModal('monthModal');
  render();
}
function closeModal(id){document.getElementById(id).style.display='none'}

// ─── Tab ───
function switchTab(tab){
  if(!dataLoaded)return;
  activeTab=tab;
  var btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  document.getElementById('tab-'+tab).classList.add('active');

}
function selBr(b){selBranch=b;render()}
function togYtd(v){
  ytd=v;
  document.getElementById('monthText').textContent=(ytd?'YTD ':'')+MONTHS[mi];
  render();
}
function togExp(id){
  expanded[id]=!expanded[id];
  render();
}

// ─── Branch chips HTML ───
function chipHtml(extraStyle){
  var h='<div class="branch-row"'+(extraStyle?' style="'+extraStyle+'"':'')+' id="brChips">';
  h+='<div class="chip'+(selBranch==='GRAND_TOTAL'?' active':'')+'" onclick="selBr(\'GRAND_TOTAL\')">รวมทุกสาขา</div>';
  var brs=SORTED_BR.filter(function(b){return b!=='S000'});
  for(var i=0;i<brs.length;i++){
    var b=brs[i];
    h+='<div class="chip'+(selBranch===b?' active':'')+'" onclick="selBr(\''+b+'\')">'+b+'</div>';
  }
  h+='</div>';
  return h;
}

// ─── YTD toggle HTML ───
function ytdToggle(label){
  return '<div class="ytd-row"><span class="ytd-label">'+(label||'YTD (สะสมถึงเดือนนี้)')+'</span>'
    +'<label class="sw"><input type="checkbox" '+(ytd?'checked':'')+' onchange="togYtd(this.checked)">'
    +'<div class="sw-track"></div><div class="sw-thumb"></div></label></div>';
}

// ════ IMPORT / DATA MANAGEMENT ════

function showImportScreen(){
  var el=document.getElementById('content');
  var hasCached=false;
  try{hasCached=!!localStorage.getItem(STORAGE_KEY);}catch(e){}

  var h='<div class="import-screen">';
  h+='<div class="import-logo fade-in">'+buildLogoLg()+'</div>';
  h+='<div class="import-title fade-in fade-in-d1">NARA Report</div>';
  h+='<div class="import-desc fade-in fade-in-d2">นำเข้าข้อมูล P&amp;L จากไฟล์ JSON<br>ที่ Export จาก NARA TB Allocator</div>';
  h+='<button class="import-btn fade-in fade-in-d3" onclick="document.getElementById(\'fileInput\').click()">';
  h+='<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
  h+='Import JSON</button>';
  h+='<div class="import-hint fade-in fade-in-d3">รองรับไฟล์ .json (key: tb_alloc_v9)</div>';

  if(hasCached){
    h+='<div class="import-or fade-in fade-in-d4">หรือ</div>';
    h+='<button class="import-cached fade-in fade-in-d4" onclick="loadCachedData()">';
    h+='<svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>';
    h+='ใช้ข้อมูลล่าสุด</button>';
  }

  h+='<div class="import-error" id="importError"></div>';
  h+='</div>';
  el.innerHTML=h;
}

function handleFileImport(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var raw=JSON.parse(e.target.result);
      var data=null;
      // Try tb_alloc_v9 key first
      if(raw.tb_alloc_v9){
        data=raw.tb_alloc_v9;
      } else if(raw.branches&&raw.plStructure){
        // Direct NARA format
        data=raw;
      } else {
        // Try to find tb_alloc_v9 inside the object
        var keys=Object.keys(raw);
        for(var i=0;i<keys.length;i++){
          var k=keys[i];
          if(k.indexOf('tb_alloc')===0&&raw[k]&&raw[k].branches){
            data=raw[k];
            break;
          }
        }
      }
      if(!data||!data.branches||!data.plStructure){
        showImportError('ไม่พบข้อมูล NARA ในไฟล์นี้ (ต้องมี branches, plStructure)');
        return;
      }
      // Save to localStorage
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(ex){}
      loadData(data);
    }catch(ex){
      showImportError('ไฟล์ JSON ไม่ถูกต้อง: '+ex.message);
    }
  };
  reader.readAsText(file);
  input.value='';
}

function loadCachedData(){
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(!raw){showImportError('ไม่พบข้อมูลที่บันทึกไว้');return;}
    var data=JSON.parse(raw);
    loadData(data);
  }catch(ex){
    showImportError('ข้อมูลที่บันทึกไว้เสียหาย');
  }
}

function loadData(data){
  D=data;
  BRANCHES=D.branches;
  SORTED_BR=D.branches.slice().sort(function(a,b){return a.localeCompare(b,undefined,{numeric:true})});
  PNL_MONTHS=D.pnl||[];
  PL=D.plStructure;
  DEPTS=D.departments||[];
  EXP_ITEMS=D.expItems||[];
  ALLOC_CC=D.allocCC||[];
  MAX_MI=D.currentMonthIndex||0;
  mi=MAX_MI;
  selBranch='GRAND_TOTAL';
  ytd=false;
  expanded={};
  activeTab='summary';
  dataLoaded=true;

  // Show UI
  document.getElementById('monthBtn').style.display='flex';
  document.getElementById('monthText').textContent=MONTHS[mi];
  document.getElementById('tabBar').style.display='flex';
  document.getElementById('dataInfo').style.display='flex';

  var brCount=BRANCHES.filter(function(b){return b!=='S000'}).length;
  document.getElementById('dataInfoText').textContent=brCount+' สาขา · '+MONTHS[0]+'-'+MONTHS[MAX_MI]+' · '+(PNL_MONTHS.length||MAX_MI+1)+' เดือน';

  // Reset tab buttons
  var btns=document.querySelectorAll('.tab-btn');
  for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  document.getElementById('tab-summary').classList.add('active');

  render();
}

function clearData(){
  if(!confirm('ต้องการเปลี่ยนข้อมูลใหม่?'))return;
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  D=null;BRANCHES=null;SORTED_BR=null;PNL_MONTHS=null;PL=null;
  DEPTS=null;EXP_ITEMS=null;ALLOC_CC=null;
  dataLoaded=false;
  document.getElementById('monthBtn').style.display='none';
  document.getElementById('tabBar').style.display='none';
  document.getElementById('dataInfo').style.display='none';
  showImportScreen();
}

function showImportError(msg){
  var el=document.getElementById('importError');
  if(el)el.textContent=msg;
}

// ════ RENDER ════
function render(){
  if(!dataLoaded)return;
  var el=document.getElementById('content');
  if(activeTab==='summary')renderSummary(el);
  else if(activeTab==='pnl')renderPnl(el);
  else if(activeTab==='branch')renderBranch(el);
  else renderCC(el);
}

// ─── Summary ───
function renderSummary(el){
  var tot=ytd?getYtdTotals(selBranch):getTotals(selBranch);
  var margin=tot.revenue!==0?((tot.profit/tot.revenue)*100).toFixed(1):'0.0';
  var h=ytdToggle('YTD (สะสมถึงเดือนนี้)');
  h+=chipHtml();
  h+='<div class="section" style="padding-top:4px"><div class="kpi-grid">';
  h+='<div class="kpi"><div class="kpi-label">รายได้'+(ytd?' YTD':'')+'</div><div class="kpi-val pos">'+fmt(tot.revenue)+'</div><div class="kpi-sub">บาท</div></div>';
  h+='<div class="kpi"><div class="kpi-label">ค่าใช้จ่าย'+(ytd?' YTD':'')+'</div><div class="kpi-val neg">'+fmt(tot.expense)+'</div><div class="kpi-sub">บาท</div></div>';
  h+='<div class="kpi full" style="border-left:3px solid '+(tot.profit>=0?'var(--green)':'var(--red)')+'"><div class="kpi-label">กำไรสุทธิ'+(ytd?' YTD':'')+'</div>';
  h+='<div class="kpi-val '+cls(tot.profit)+'">'+fmt(tot.profit)+'</div>';
  h+='<div class="kpi-sub">Margin '+margin+'% · '+(selBranch==='GRAND_TOTAL'?'รวมทุกสาขา':selBranch)+'</div></div>';
  h+='</div></div>';
  h+='<div class="section" style="padding-top:0"><div class="sec-label">รายละเอียด P&amp;L</div><div class="card">';
  for(var i=0;i<PL.length;i++){
    var tp=PL[i];
    var isSub=tp.type==='subtotal'||tp.type==='profit';
    var v=topicVal(tp);
    var rc=isSub?(tp.type==='profit'?'profit-row':'subtotal-row'):'topic-row';
    var oc=isSub?'':'onclick="drillTopic(\''+esc(tp.id)+'\')"';
    h+='<div class="pl-row '+rc+'" '+oc+' style="cursor:'+(isSub?'default':'pointer')+'">';
    h+='<div class="pl-noico"></div>';
    h+='<div class="pl-name">'+(isSub?'= ':'')+'<span style="font-weight:'+(isSub?800:600)+'">'+tp.title+'</span></div>';
    h+='<div class="pl-val '+cls(v)+'">'+fmt(v)+'</div></div>';
  }
  h+='</div></div>';
  el.innerHTML=h;
}

// ─── P&L ───
function plNodeHtml(item, depth){
  if(!item||!item.id)return'';
  var isSub=item.type==='subtotal'||item.type==='profit';
  var ds=item.displayNegate?-1:1;
  var v=ytd?r2(ds*getYtdVal(item.id,selBranch)):r2(ds*getVal(item.id,selBranch));
  var exp=!!expanded[item.id];
  var kids=item.children&&item.children.length>0?item.children:(item.lines&&item.lines.length>0?item.lines:[]);
  var hasKids=!isSub&&kids.length>0;
  var rc='pl-row '+(isSub?(item.type==='profit'?'profit-row':'subtotal-row'):(depth===0?'topic-row':''));
  var oc=hasKids?'onclick="togExp(\''+esc(item.id)+'\')"':(!isSub?'onclick="drillTopic(\''+esc(item.id)+'\')"':'');
  var cur=hasKids||!isSub?'pointer':'default';
  var pl=14+depth*12;
  var chev=hasKids?('<svg class="pl-chev'+(exp?' open':'')+'" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>'):'<div class="pl-noico"></div>';
  var h='<div class="'+rc+'" '+oc+' style="padding-left:'+pl+'px;cursor:'+cur+'">';
  h+=chev;
  h+='<div class="pl-name">'+(isSub?'= ':'')+(item.title||'')+'</div>';
  h+='<div class="pl-val '+cls(v)+'">'+fmt(v)+'</div></div>';
  if(exp&&hasKids){
    for(var i=0;i<kids.length;i++)h+=plNodeHtml(kids[i],depth+1);
  }
  return h;
}
function renderPnl(el){
  var h=ytdToggle('YTD');
  h+=chipHtml('padding-top:10px');
  h+='<div class="section" style="padding-top:8px"><div class="card">';
  for(var i=0;i<PL.length;i++)h+=plNodeHtml(PL[i],0);
  h+='</div></div>';
  el.innerHTML=h;
}

// ─── Branch ───
function renderBranch(el){
  var brs=SORTED_BR.filter(function(b){return b!=='S000'});
  var data=[];
  for(var i=0;i<brs.length;i++){
    var b=brs[i];
    var tot=ytd?getYtdTotals(b):getTotals(b);
    data.push({b:b,rev:tot.revenue,prof:tot.profit});
  }
  data.sort(function(a,x){return x.rev-a.rev});
  var maxRev=1;
  for(var i=0;i<data.length;i++)if(Math.abs(data[i].rev)>maxRev)maxRev=Math.abs(data[i].rev);
  var h=ytdToggle('YTD');
  h+='<div class="section" style="padding-top:10px"><div class="sec-label">รายได้รายสาขา</div><div class="card">';
  for(var i=0;i<data.length;i++){
    var d=data[i];
    var w=Math.max(4,Math.abs(d.rev)/maxRev*100);
    var c=d.rev>=0?'var(--accent)':'var(--red)';
    h+='<div class="br-row">';
    h+='<div class="br-rank">'+(i+1)+'</div>';
    h+='<div class="br-code">'+d.b+'</div>';
    h+='<div class="br-bar-wrap"><div class="br-bar" style="width:'+w+'%;background:'+c+'"></div></div>';
    h+='<div class="br-val '+cls(d.rev)+'">'+fmt(d.rev)+'</div></div>';
  }
  h+='</div></div>';
  var maxP=1;
  var profData=data.slice().sort(function(a,x){return x.prof-a.prof});
  for(var i=0;i<profData.length;i++)if(Math.abs(profData[i].prof)>maxP)maxP=Math.abs(profData[i].prof);
  h+='<div class="section" style="padding-top:0"><div class="sec-label">กำไร / ขาดทุน รายสาขา</div><div class="card">';
  for(var i=0;i<profData.length;i++){
    var d=profData[i];
    var w=Math.max(4,Math.abs(d.prof)/maxP*100);
    var c=d.prof>=0?'var(--green)':'var(--red)';
    h+='<div class="br-row">';
    h+='<div class="br-rank">'+(i+1)+'</div>';
    h+='<div class="br-code">'+d.b+'</div>';
    h+='<div class="br-bar-wrap"><div class="br-bar" style="width:'+w+'%;background:'+c+'"></div></div>';
    h+='<div class="br-val '+cls(d.prof)+'">'+fmt(d.prof)+'</div></div>';
  }
  h+='</div></div>';
  el.innerHTML=h;
}

// ─── Cost Center ───
function renderCC(el){
  var deptMap={};
  for(var i=0;i<DEPTS.length;i++)deptMap[DEPTS[i].code]=DEPTS[i].name;
  var deptData={};
  var unalloc={groups:{},directTotal:0,allocTotal:0};
  for(var i=0;i<EXP_ITEMS.length;i++){
    var r=EXP_ITEMS[i];
    if(r.b==='S000')continue;
    var amt=r.v;if(!amt||amt===0)continue;
    var dc=r.d||'';var grp=r.g||r.c;
    var target=dc?(deptData[dc]=deptData[dc]||{groups:{},directTotal:0,allocTotal:0}):unalloc;
    if(!target.groups[grp])target.groups[grp]={direct:0,alloc:0};
    target.groups[grp].direct=r2(target.groups[grp].direct+amt);
    target.directTotal=r2(target.directTotal+amt);
  }
  var a2d={};
  for(var i=0;i<EXP_ITEMS.length;i++){var r=EXP_ITEMS[i];if(r.d)a2d[r.c]=r.d}
  for(var i=0;i<ALLOC_CC.length;i++){
    var ai=ALLOC_CC[i];
    var brs=SORTED_BR.filter(function(b){return b!=='S000'});
    var amt=0;for(var j=0;j<brs.length;j++)amt+=ai.alloc[brs[j]]||0;
    amt=r2(amt);if(!amt||amt===0)continue;
    var grp=ai.name||ai.code;
    var dc=a2d[ai.code]||'';
    var target=dc?(deptData[dc]=deptData[dc]||{groups:{},directTotal:0,allocTotal:0}):unalloc;
    if(!target.groups[grp])target.groups[grp]={direct:0,alloc:0};
    target.groups[grp].alloc=r2(target.groups[grp].alloc+amt);
    target.allocTotal=r2(target.allocTotal+amt);
  }
  var allDepts=Object.keys(deptData).sort();
  var grandTotal=r2(allDepts.reduce(function(s,dc){return s+deptData[dc].directTotal+deptData[dc].allocTotal},0)+unalloc.directTotal+unalloc.allocTotal);
  var h='<div class="section"><div class="kpi" style="display:flex;flex-direction:row;align-items:center;gap:16px;padding:12px 14px">';
  h+='<div><div class="kpi-label">ค่าใช้จ่ายรวม</div><div class="kpi-val neg" style="font-size:18px">'+fmt(grandTotal)+'</div></div>';
  h+='<div style="margin-left:auto;text-align:right;font-size:11px;color:var(--text3)">'+allDepts.length+' แผนก<br>'+MONTHS[mi]+'</div>';
  h+='</div></div><div class="section" style="padding-top:0">';
  function ccCard(dc,dat,label){
    var total=r2(dat.directTotal+dat.allocTotal);
    var pct=grandTotal?((Math.abs(total)/Math.abs(grandTotal))*100).toFixed(1):'0.0';
    var dW=total?Math.max(5,(Math.abs(dat.directTotal)/Math.abs(total)*100)):0;
    var aW=total?Math.max(5,(Math.abs(dat.allocTotal)/Math.abs(total)*100)):0;
    var exp=!!expanded['cc_'+dc];
    var groups=Object.keys(dat.groups).sort(function(a,b){return Math.abs(dat.groups[b].direct+dat.groups[b].alloc)-Math.abs(dat.groups[a].direct+dat.groups[a].alloc)});
    var ch='<div class="cc-card"><div class="cc-header" onclick="togExp(\'cc_'+esc(dc)+'\')">';
    ch+='<div class="cc-dot"></div>';
    ch+='<div class="cc-info"><div class="cc-name">'+label+'</div><div class="cc-code-tag">'+(dc!=='__u'?dc:'')+' · '+pct+'%</div></div>';
    ch+='<div class="cc-total">'+fmt(total)+'</div>';
    ch+='<svg class="cc-chev" style="transform:rotate('+(exp?90:0)+'deg)" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
    ch+='</div>';
    if(exp){
      ch+='<div class="cc-body">';
      ch+='<div class="cc-bar-track"><div class="cc-bar-d" style="width:'+dW+'%"></div><div class="cc-bar-a" style="width:'+aW+'%"></div></div>';
      ch+='<div class="cc-stats"><div><div class="cc-stat-lbl">Direct</div><div class="cc-stat-val" style="color:var(--amber)">'+fmt(dat.directTotal)+'</div></div>';
      ch+='<div><div class="cc-stat-lbl">Alloc</div><div class="cc-stat-val" style="color:var(--cyan)">'+fmt(dat.allocTotal)+'</div></div></div>';
      ch+='<div class="cc-groups">';
      var limit=expanded['cca_'+dc]?groups.length:6;
      for(var gi=0;gi<Math.min(limit,groups.length);gi++){
        var grp=groups[gi];var g=dat.groups[grp];var t2=r2(g.direct+g.alloc);
        ch+='<div class="cc-grp"><div class="cc-grp-name">'+grp+'</div><div class="cc-grp-val '+cls(t2)+'">'+fmt(t2)+'</div></div>';
      }
      if(groups.length>6&&!expanded['cca_'+dc])ch+='<div style="text-align:center;padding-top:6px;font-size:12px;color:var(--accent);cursor:pointer;font-weight:700" onclick="togExp(\'cca_'+esc(dc)+'\')">ดูเพิ่ม '+(groups.length-6)+' รายการ</div>';
      ch+='</div></div>';
    }
    ch+='</div>';
    return ch;
  }
  for(var i=0;i<allDepts.length;i++){
    var dc=allDepts[i];
    var d2=deptData[dc];
    var tot2=r2(d2.directTotal+d2.allocTotal);
    if(tot2!==0)h+=ccCard(dc,d2,deptMap[dc]||dc);
  }
  if(r2(unalloc.directTotal+unalloc.allocTotal)!==0)h+=ccCard('__u',unalloc,'ไม่ระบุแผนก');
  h+='</div>';
  el.innerHTML=h;
}

// ─── Drill ───
function findTopic(structure,id){
  for(var i=0;i<structure.length;i++){
    var t=structure[i];
    if(t.id===id)return t;
    var kids=t.children&&t.children.length>0?t.children:(t.lines&&t.lines.length>0?t.lines:[]);
    if(kids.length>0){var f=findTopic(kids,id);if(f)return f;}
  }
  return null;
}
function drillTopic(topicId){
  var topic=findTopic(PL,topicId);
  if(!topic)return;
  var ds=topic.displayNegate?-1:1;
  var v=ytd?r2(ds*getYtdVal(topicId,selBranch)):r2(ds*getVal(topicId,selBranch));
  document.getElementById('drillTitle').textContent=topic.title;
  document.getElementById('drillSub').textContent=fmt(v)+' บาท · '+MONTHS[mi]+(selBranch!=='GRAND_TOTAL'?' · '+selBranch:'');
  var pnl=PNL_MONTHS[mi];
  var rows=[];
  var kids=topic.children&&topic.children.length>0?topic.children:(topic.lines&&topic.lines.length>0?topic.lines:[]);
  if(kids.length>0){
    for(var i=0;i<kids.length;i++){
      var c=kids[i];if(!c||!c.id)continue;
      var res=pnl&&pnl.items[c.id];
      if(!res)continue;
      var k=selBranch==='GRAND_TOTAL'?'GRAND_TOTAL':selBranch;
      var cv=(c.displayNegate?-1:1)*(res.total&&res.total[k]||0);
      if(cv!==0)rows.push({name:c.title||c.id,val:r2(cv)});
    }
  } else {
    var brs=SORTED_BR.filter(function(b){return b!=='S000'});
    var item=pnl&&pnl.items[topicId];
    if(item&&item.total){
      for(var i=0;i<brs.length;i++){
        var b=brs[i];var bv=item.total[b]||0;
        if(bv!==0)rows.push({name:b,val:r2(ds*bv)});
      }
    }
  }
  rows.sort(function(a,b){return Math.abs(b.val)-Math.abs(a.val)});
  var h='';
  if(rows.length===0){h='<div style="padding:24px;text-align:center;color:var(--text3);font-size:13px">ไม่มีรายการ</div>';}
  else{for(var i=0;i<rows.length;i++){var rr=rows[i];h+='<div class="drill-item"><div class="drill-left"><div class="drill-name">'+rr.name+'</div></div><div class="drill-val-d '+cls(rr.val)+'">'+fmt(rr.val)+'</div></div>';}}
  document.getElementById('drillList').innerHTML=h;
  document.getElementById('drillModal').style.display='flex';
}

// ─── Init ───
function init(){
  document.getElementById('logoWrap').innerHTML=buildLogo();
  // Try loading cached data first
  try{
    var cached=localStorage.getItem(STORAGE_KEY);
    if(cached){
      var data=JSON.parse(cached);
      if(data&&data.branches&&data.plStructure){
        loadData(data);
        return;
      }
    }
  }catch(e){}
  // No cached data — show import screen
  showImportScreen();
}
init();

</script>
