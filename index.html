                                            <p className="text-slate-500 font-bold mt-2 uppercase tracking-widest text-sm">รายงานประมวลผลตามโครงสร้างที่คุณกำหนดเอง</p>
                                        </div>
                                        <div className="flex items-center gap-6">
                                            <div className="flex bg-[#0d1321] p-2 rounded-2xl border border-white/5">
                                                <button onClick={() => setShowGrandTotal(!showGrandTotal)} className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all ${showGrandTotal ? 'bg-indigo-500 text-white' : 'text-slate-500 hover:text-white'}`}>GRAND TOTAL</button>
                                                <div className="w-px bg-white/5 mx-2"></div>
                                                <select value={plTotalPosition} onChange={e => setPlTotalPosition(e.target.value)} className="bg-transparent text-[10px] font-black text-slate-400 outline-none cursor-pointer uppercase px-2">
                                                    <option value="top">TOP SUM</option>
                                                    <option value="bottom">BOTTOM SUM</option>
                                                    <option value="both">BOTH SUM</option>
                                                </select>
                                            </div>
                                            <button
                                                onClick={() => { setYtdMode(!ytdMode); setCollapsedMonths(new Set()); }}
                                                className={`px-8 py-5 rounded-[2rem] font-black shadow-xl hover:-translate-y-1 transition-all flex items-center gap-3 border ${ytdMode ? 'bg-amber-500 text-slate-900 border-amber-400' : 'bg-white/5 text-slate-400 border-white/10 hover:text-white'}`}
                                            >
                                                <Icon name="calendar-range" size={20} /> {ytdMode ? 'YTD ON' : 'YTD OFF'}
                                            </button>
                                            <button onClick={handleExportPnLExcel} disabled={!pastedData || plStructure.length === 0} className={`bg-emerald-500 text-slate-900 px-8 py-5 rounded-[2rem] font-black shadow-2xl hover:-translate-y-2 transition-all flex items-center gap-3 active:scale-95 ${(!pastedData || plStructure.length === 0) ? 'opacity-40 cursor-not-allowed hover:translate-y-0' : ''}`}>
                                                <Icon name="download" size={20} /> Export Excel
                                            </button>
                                        </div>
                                    </div>

                                    {pastedData && plStructure.length > 0 && (() => {
                                        const mi = currentMonthIndex;
                                        const tbRevTotal = processedData.revenue.grand[mi] || 0;
                                        const tbExpTotal = processedData.expenses.grand[mi] || 0;
                                        const pnlRevTotal = roundTo2(plStructure.filter(t=>t.type==='revenue').reduce((s,t)=>s+(pnlCalculations.items[t.id]?.total?.GRAND_TOTAL||0),0));
                                        const pnlExpTotal = roundTo2(plStructure.filter(t=>t.type==='expense').reduce((s,t)=>s+(pnlCalculations.items[t.id]?.total?.GRAND_TOTAL||0),0));
                                        const revDiff = roundTo2(Math.abs(tbRevTotal) - pnlRevTotal);
                                        const expDiff = roundTo2(tbExpTotal - pnlExpTotal);
                                        if (Math.abs(revDiff) < 0.01 && Math.abs(expDiff) < 0.01) return null;

                                        const fmt = v => Math.abs(v).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});

                                        return (
                                            <div className="glass rounded-[2rem] border border-orange-500/30 bg-orange-500/[0.03] overflow-hidden mb-6">
                                                <button onClick={()=>setReconOpen(p=>!p)} className="w-full flex items-center gap-3 px-6 py-4 hover:bg-white/[0.02] transition-all" style={{background:'transparent',borderRadius:0,boxShadow:'none',transform:'none'}}>
                                                    <div className="p-2 bg-orange-500/20 rounded-xl text-orange-400 flex-shrink-0"><Icon name="alert-triangle" size={15}/></div>
                                                    <div className="flex-1 text-left">
                                                        <p className="text-sm font-black text-white">ยอด P&L ไม่ตรงกับ TB Ledger</p>
                                                        <p className="text-[11px] text-slate-400 mt-0.5">
                                                            {Math.abs(revDiff)>=0.01 && `รายได้ต่างกัน ${fmt(revDiff)} บาท`}
                                                            {Math.abs(revDiff)>=0.01 && Math.abs(expDiff)>=0.01 && '  ·  '}
                                                            {Math.abs(expDiff)>=0.01 && `ค่าใช้จ่ายต่างกัน ${fmt(expDiff)} บาท`}
                                                        </p>
                                                    </div>
                                                    <span style={{display:'inline-flex',transform:reconOpen?'rotate(180deg)':'rotate(0deg)',transition:'transform 0.28s cubic-bezier(0.34,1.56,0.64,1)',color:'var(--text3)'}}><Icon name="chevron-down" size={16}/></span>
                                                </button>
                                                {reconOpen && (
                                                    <div className="px-6 pb-5 warn-panel-in border-t border-white/5">
                                                        <div className="grid grid-cols-2 gap-3 mt-4">
                                                            {Math.abs(revDiff)>=0.01 && (
                                                                <div className="bg-white/5 rounded-xl p-3 space-y-1.5">
                                                                    <p className="text-[9px] font-black text-orange-400 uppercase tracking-widest">รายได้ต่างกัน</p>
                                                                    <p className="text-base font-black text-white font-mono">{fmt(revDiff)}</p>
                                                                    <div className="text-[10px] text-slate-500 space-y-0.5">
                                                                        <div className="flex justify-between"><span>TB</span><span className="font-mono">{fmt(Math.abs(tbRevTotal))}</span></div>
                                                                        <div className="flex justify-between"><span>P&L</span><span className="font-mono">{fmt(pnlRevTotal)}</span></div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {Math.abs(expDiff)>=0.01 && (
                                                                <div className="bg-white/5 rounded-xl p-3 space-y-1.5">
                                                                    <p className="text-[9px] font-black text-orange-400 uppercase tracking-widest">ค่าใช้จ่ายต่างกัน</p>
                                                                    <p className="text-base font-black text-white font-mono">{fmt(expDiff)}</p>
                                                                    <div className="text-[10px] text-slate-500 space-y-0.5">
                                                                        <div className="flex justify-between"><span>TB</span><span className="font-mono">{fmt(tbExpTotal)}</span></div>
                                                                        <div className="flex justify-between"><span>P&L</span><span className="font-mono">{fmt(pnlExpTotal)}</span></div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })()}

                                    <div className="glass rounded-[4rem] overflow-hidden shadow-2xl border border-white/5">
                                        <div style={{overflow:"auto",maxHeight:"calc(100vh - 240px)",minHeight:400}}>
                                            <table className="w-full text-sm text-left border-collapse">
                                                <thead className="bg-[#0d1321] text-slate-500 text-[10px] font-black uppercase tracking-widest sticky top-0 z-20">
                                                    {ytdMode && ytdCalculations ? (
                                                        <>
                                                        {/* Row 1: Month group headers */}
                                                        <tr>
                                                            <th className="px-12 py-4 bg-[#0d1321] sticky left-0 z-30 min-w-[300px] border-b border-white/5" rowSpan={2}>รายการ</th>
                                                            {ytdCalculations.map(({ monthIndex, label }) => {
                                                                const isCollapsed = collapsedMonths.has(monthIndex);
                                                                const colCount = isCollapsed ? 1 : sortedBranches.length + (showGrandTotal ? 1 : 0) + plCustomColumns.length;
                                                                return (
                                                                    <th key={monthIndex} colSpan={colCount}
                                                                        className="px-4 py-3 text-center border-b border-white/5 border-l border-white/5 cursor-pointer hover:bg-white/5 transition-colors"
                                                                        onClick={() => setCollapsedMonths(prev => { const n = new Set(prev); n.has(monthIndex) ? n.delete(monthIndex) : n.add(monthIndex); return n; })}
                                                                    >
                                                                        <span className="flex items-center justify-center gap-2 text-amber-400">
                                                                            <Icon name={collapsedMonths.has(monthIndex) ? 'chevron-right' : 'chevron-down'} size={12} />
                                                                            {label}
                                                                        </span>
                                                                    </th>
                                                                );
                                                            })}
                                                            {/* YTD total */}
                                                            <th colSpan={sortedBranches.length + (showGrandTotal ? 1 : 0)} className="px-4 py-3 text-center border-b border-indigo-500/20 border-l border-indigo-500/20 text-indigo-400">
                                                                รวม YTD
                                                            </th>
                                                        </tr>
                                                        {/* Row 2: Branch headers per month */}
                                                        <tr>
                                                            {ytdCalculations.map(({ monthIndex }) => {
                                                                const isCollapsed = collapsedMonths.has(monthIndex);
                                                                if (isCollapsed) return (
                                                                    <th key={monthIndex} className="px-4 py-3 text-center border-b border-white/5 border-l border-white/5 text-slate-600 italic">...</th>
                                                                );
                                                                return (
                                                                    <React.Fragment key={monthIndex}>
                                                                        {showGrandTotal && <th className="px-6 py-3 text-right border-b border-indigo-500/20 border-l border-white/5 text-indigo-400 min-w-[130px]" style={{position:'sticky',top:0,background:'var(--surface2)',zIndex:10}}>TOTAL</th>}
                                                                        {sortedBranches.map(b => <th key={b} className="px-6 py-3 text-right border-b border-white/5 min-w-[120px]">{b}</th>)}
                                                                        {plCustomColumns.map(col => <th key={col.id} className="px-6 py-3 text-right border-b border-pink-500/10 text-pink-400 min-w-[120px]">{col.title}</th>)}
                                                                    </React.Fragment>
                                                                );
                                                            })}
                                                            {/* YTD branch headers */}
                                                            {showGrandTotal && <th className="px-6 py-3 text-right border-b border-indigo-500/20 border-l border-indigo-500/20 text-indigo-400 min-w-[130px]" style={{position:'sticky',top:0,background:'var(--surface2)',zIndex:10}}>TOTAL</th>}
                                                            {sortedBranches.map(b => <th key={b} className="px-6 py-3 text-right border-b border-indigo-500/10 border-l border-indigo-500/10 text-indigo-300 min-w-[120px]">{b}</th>)}
                                                        </tr>
                                                        </>
                                                    ) : (
                                                        <tr>
                                                            <th className="px-12 py-8 min-w-[300px] border-b border-white/5" style={{position:'sticky',top:0,left:0,zIndex:30,background:'var(--surface2)'}}>รายการ</th>
                                                            {showGrandTotal && (
                                                                <th className="px-8 py-8 text-right min-w-[150px] border-b border-indigo-500/20 text-indigo-400 pnl-grand-total-col" style={{position:'sticky',top:0,left:'300px',zIndex:25,boxShadow:'2px 0 5px rgba(0,0,0,0.3)',background:'var(--accent-l)'}}>GRAND TOTAL (All Branches)</th>
                                                            )}
                                                            {sortedBranches.map(b => (
                                                                <th key={b} className="px-8 py-8 text-right min-w-[150px] border-b border-white/5">{b}</th>
                                                            ))}
                                                            {plCustomColumns.map(col => (
                                                                <th key={col.id} className="px-8 py-8 text-right min-w-[150px] text-pink-400 bg-pink-500/5 border-b border-pink-500/10">{col.title}</th>
                                                            ))}
                                                        </tr>
                                                    )}
                                                </thead>
                                                <tbody className="divide-y divide-white/5">
                                                    {(() => {
                                                        const renderRow = (item, depth = 0) => {
                                                            // --- SUBTOTAL ROW ---
                                                            // --- SUBTOTAL/PROFIT ROW (non-YTD) ---
                                                            if ((item.type === 'subtotal' || item.type === 'profit') && !(ytdMode && ytdCalculations)) {
                                                                const res = pnlCalculations.items[item.id] || { total: {} };
                                                                const rowCls = item.lineStyle === 'double' ? 'pnl-summary-row-double' : 'pnl-summary-row';
                                                                const isProfit = item.type === 'profit';
                                                                const titleCls = isProfit ? 'text-emerald-300 border-emerald-500/60' : 'text-amber-300 border-amber-500/40';
                                                                const valCls = isProfit ? 'text-emerald-200' : 'text-amber-200';
                                                                const gtCls = isProfit ? 'text-emerald-300' : 'text-amber-300';
                                                                const ds = item.displayNegate ? -1 : 1;
                                                                return (
                                                                    <tr key={item.id} className={`${rowCls} ${isProfit ? 'bg-emerald-950/30' : 'bg-slate-900/80'}`}>
                                                                        <td className={`py-5 sticky left-0 z-10 bg-[#080c14] font-black px-12 uppercase tracking-wide text-xs border-l-4 ${titleCls}`}>
                                                                            {isProfit && <Icon name="bar-chart-2" size={12} className="inline mr-1.5"/>}{item.title || 'ยอดรวม'}
                                                                        </td>
                                                                        {showGrandTotal && (
                                                                            <td className={`px-8 py-5 text-right font-mono font-black ${gtCls} pnl-grand-total-col shadow-[2px_0_5px_rgba(0,0,0,0.3)]`} style={{position:'sticky',left:'300px',zIndex:5,background:'var(--accent-l)'}}>
                                                                                {(ds*(res.total['GRAND_TOTAL'] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                            </td>
                                                                        )}
                                                                        {sortedBranches.map(b => (
                                                                            <td key={b} className={`px-8 py-5 text-right font-mono font-black ${(ds*(res.total[b] || 0)) < 0 ? 'text-red-400' : valCls}`}>
                                                                                {(ds*(res.total[b] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                            </td>
                                                                        ))}
                                                                        {plCustomColumns.map(col => (
                                                                            <td key={col.id} className="px-8 py-5 text-right font-mono font-black text-pink-400 bg-pink-500/10">
                                                                                {(ds*(res.total[col.id] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                            </td>
                                                                        ))}
                                                                    </tr>
                                                                );
                                                            }
                                                            // --- END SUBTOTAL/PROFIT ROW (non-YTD) ---

                                                            // --- YTD ROW ---
                                                            if (ytdMode && ytdCalculations) {
                                                                // YTD subtotal/profit row — uses ytdCalculations per month
                                                                if (item.type === 'subtotal' || item.type === 'profit') {
                                                                    const rowCls = item.lineStyle === 'double' ? 'pnl-summary-row-double' : 'pnl-summary-row';
                                                                    const isProfit = item.type === 'profit';
                                                                    const titleCls = isProfit ? 'text-emerald-300 border-emerald-500/60' : 'text-amber-300 border-amber-500/40';
                                                                    const valCls = isProfit ? 'text-emerald-200' : 'text-amber-200';
                                                                    const allK = sortedBranches.concat(plCustomColumns.map(c => c.id)).concat(['GRAND_TOTAL']);
                                                                    // Compute YTD total for subtotal row (sum across all months)
                                                                    const ytdStRes = { total: {} };
                                                                    const ds = item.displayNegate ? -1 : 1;
                                                                    allK.forEach(k => ytdStRes.total[k] = 0);
                                                                    ytdCalculations.forEach(({ results }) => {
                                                                        const allK2 = sortedBranches.concat(plCustomColumns.map(c => c.id)).concat(['GRAND_TOTAL']);
                                                                        const monthSt = { total: {} };
                                                                        allK2.forEach(k => monthSt.total[k] = 0);
                                                                        (item.sourceIds || []).forEach(entry => {
                                                                            const sid = typeof entry === 'string' ? entry : entry.id;
                                                                            const sign = typeof entry === 'string' ? 1 : (entry.sign || 1);
                                                                            const src = results.items[sid];
                                                                            if (src) allK2.forEach(k => monthSt.total[k] = roundTo2(monthSt.total[k] + sign * (src.total[k] || 0)));
                                                                        });
                                                                        allK.forEach(k => ytdStRes.total[k] = roundTo2(ytdStRes.total[k] + (monthSt.total[k] || 0)));
                                                                    });
                                                                    return (
                                                                        <tr key={item.id} className={`${rowCls} ${isProfit ? 'bg-emerald-950/30' : 'bg-slate-900/80'}`}>
                                                                            <td className={`py-5 sticky left-0 z-10 bg-[#080c14] font-black px-12 uppercase tracking-wide text-xs border-l-4 ${titleCls}`}>{isProfit && <Icon name="bar-chart-2" size={12} className="inline mr-1.5"/>}{item.title || 'ยอดรวม'}</td>
                                                                            {ytdCalculations.map(({ monthIndex, results }) => {
                                                                                const isCollapsed = collapsedMonths.has(monthIndex);
                                                                                const stRes = { total: {} };
                                                                                allK.forEach(k => stRes.total[k] = 0);
                                                                                (item.sourceIds || []).forEach(entry => {
                                                                                    const sid = typeof entry === 'string' ? entry : entry.id;
                                                                                    const sign = typeof entry === 'string' ? 1 : (entry.sign || 1);
                                                                                    const src = results.items[sid];
                                                                                    if (src) allK.forEach(k => stRes.total[k] = roundTo2(stRes.total[k] + sign * (src.total[k] || 0)));
                                                                                });
                                                                                if (isCollapsed) return <td key={monthIndex} className="px-4 py-5 text-center text-slate-700 border-l border-white/5">…</td>;
                                                                                return (
                                                                                    <React.Fragment key={monthIndex}>
                                                                                        {showGrandTotal && <td className="px-6 py-5 text-right font-mono font-black text-emerald-300 border-l border-white/5">{(ds*(stRes.total['GRAND_TOTAL'] || 0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>}
                                                                                        {sortedBranches.map(b => <td key={b} className={`px-6 py-5 text-right font-mono font-black ${(ds*(stRes.total[b]||0)) < 0 ? 'text-red-400' : valCls}`}>{(ds*(stRes.total[b] || 0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                                        {plCustomColumns.map(col => <td key={col.id} className="px-6 py-5 text-right font-mono font-black text-pink-400 bg-pink-500/10">{(ds*(stRes.total[col.id] || 0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                                    </React.Fragment>
                                                                                );
                                                                            })}
                                                                            {/* YTD total columns for subtotal/profit */}
                                                                            {showGrandTotal && <td className={`px-6 py-5 text-right font-mono font-black border-l border-indigo-500/20 bg-indigo-500/10 ${isProfit ? 'text-emerald-300' : 'text-amber-300'}`}>{(ds*(ytdStRes.total['GRAND_TOTAL'] || 0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>}
                                                                            {sortedBranches.map(b => <td key={b} className={`px-6 py-5 text-right font-mono font-black border-l border-indigo-500/10 bg-indigo-500/5 ${(ds*(ytdStRes.total[b]||0)) < 0 ? 'text-red-400' : (isProfit ? 'text-emerald-200' : 'text-amber-200')}`}>{(ds*(ytdStRes.total[b] || 0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                            {plCustomColumns.map(col => <td key={col.id} className="px-6 py-5 text-right font-mono font-black text-pink-400 bg-pink-500/10">{(ds*(ytdStRes.total[col.id] || 0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                        </tr>
                                                                    );
                                                                }

                                                                const isTopic = depth === 0;
                                                                const hasChildren = (item.children && item.children.length > 0) || (item.lines && item.lines.length > 0);
                                                                const itemTotalPos = item.totalPosition || plTotalPosition;
                                                                const isTotalTop = (itemTotalPos === 'top' || itemTotalPos === 'both');
                                                                const ds = item.displayNegate ? -1 : 1; // display sign multiplier

                                                                // compute YTD sum per branch
                                                                const ytdSum = {};
                                                                const allBranchKeys = sortedBranches.concat(plCustomColumns.map(c => c.id)).concat(['GRAND_TOTAL']);
                                                                allBranchKeys.forEach(k => ytdSum[k] = 0);
                                                                ytdCalculations.forEach(({ results }) => {
                                                                    const r = results.items[item.id] || { total: {} };
                                                                    allBranchKeys.forEach(k => ytdSum[k] = roundTo2(ytdSum[k] + (r.total[k] || 0)));
                                                                });

                                                                return (
                                                                    <React.Fragment key={item.id}>
                                                                        <tr
                                                                            className={`${isTopic ? 'bg-slate-900/90' : 'hover:bg-white/5'} transition-all cursor-pointer group${depth > 0 ? ' accordion-row' : ''}`}
                                                                            onClick={() => setExpandedLines(prev => prev.includes(item.id) ? prev.filter(x => x !== item.id) : [...prev, item.id])}
                                                                        >
                                                                            <td className={`py-6 sticky left-0 z-10 bg-[#080c14] border-l-4 ${isTopic ? 'border-indigo-500 font-black text-white px-12 uppercase tracking-widest' : 'border-transparent font-bold text-slate-300'}`} style={{ paddingLeft: isTopic ? undefined : `${(depth * 2) + 4}rem` }}>
                                                                                <div className="flex items-center gap-3">
                                                                                    {hasChildren && <div className={`transition-transform duration-300 ${expandedLines.includes(item.id) ? 'rotate-90' : ''}`}><Icon name="chevron-right" size={14} className="text-indigo-500" /></div>}
                                                                                    <span className="hover:text-indigo-300 hover:underline cursor-pointer transition-colors" onClick={e => { e.stopPropagation(); setDrillModal({ item }); }}>{item.title}</span>
                                                                                </div>
                                                                            </td>
                                                                            {ytdCalculations.map(({ monthIndex, results }) => {
                                                                                const r = results.items[item.id] || { total: {} };
                                                                                const isCollapsed = collapsedMonths.has(monthIndex);
                                                                                if (isCollapsed) return <td key={monthIndex} className="px-4 py-6 text-center text-slate-700 border-l border-white/5">…</td>;
                                                                                return (
                                                                                    <React.Fragment key={monthIndex}>
                                                                                        {showGrandTotal && <td className={`px-6 py-6 text-right font-mono border-l border-white/5 ${isTopic ? 'font-black text-indigo-400' : 'text-indigo-300 opacity-80'}`}>{(isTotalTop || !hasChildren) ? (ds*(r.total['GRAND_TOTAL'] || 0)).toLocaleString(undefined,{minimumFractionDigits:2}) : ''}</td>}
                                                                                        {sortedBranches.map(b => <td key={b} className={`px-6 py-6 text-right font-mono ${isTopic ? 'font-black text-slate-400' : 'text-slate-400 opacity-80'}`}>{(isTotalTop || !hasChildren) ? (ds*(r.total[b] || 0)).toLocaleString(undefined,{minimumFractionDigits:2}) : ''}</td>)}
                                                                                        {plCustomColumns.map(col => <td key={col.id} className={`px-6 py-6 text-right font-mono ${isTopic ? 'font-black text-pink-400 bg-pink-500/10' : 'text-pink-300 bg-pink-500/5'}`}>{(isTotalTop || !hasChildren) ? (ds*(r.total[col.id] || 0)).toLocaleString(undefined,{minimumFractionDigits:2}) : ''}</td>)}
                                                                                    </React.Fragment>
                                                                                );
                                                                            })}
                                                                            {/* YTD total columns */}
                                                                            {showGrandTotal && <td className={`px-6 py-6 text-right font-mono border-l border-indigo-500/20 ${isTopic ? 'font-black text-indigo-400 bg-indigo-500/10' : 'text-indigo-300 bg-indigo-500/5'}`}>{(isTotalTop || !hasChildren) ? (ds*(ytdSum['GRAND_TOTAL'] || 0)).toLocaleString(undefined,{minimumFractionDigits:2}) : ''}</td>}
                                                                            {sortedBranches.map(b => <td key={b} className={`px-6 py-6 text-right font-mono border-l border-indigo-500/10 ${isTopic ? 'font-black text-indigo-300 bg-indigo-500/5' : 'text-indigo-200 opacity-70'}`}>{(isTotalTop || !hasChildren) ? (ds*(ytdSum[b] || 0)).toLocaleString(undefined,{minimumFractionDigits:2}) : ''}</td>)}
                                                                        </tr>
                                                                        {expandedLines.includes(item.id) && item.children && item.children.map(child => renderRow(child, depth + 1))}
                                                                        {expandedLines.includes(item.id) && item.lines && item.lines.map(line => renderRow(line, depth + 1))}
                                                                        {/* YTD isTotalBottom row */}
                                                                        {((itemTotalPos === 'bottom' || itemTotalPos === 'both') && hasChildren) && expandedLines.includes(item.id) && (
                                                                            <tr className={item.lineStyle === 'double' ? 'pnl-summary-row-double' : 'pnl-summary-row'}>
                                                                                <td className={`py-5 sticky left-0 z-10 bg-[#080c14] font-black text-indigo-400 px-12 uppercase tracking-tight text-xs border-l-4 border-indigo-500/40`} style={{ paddingLeft: isTopic ? undefined : `${(depth * 2) + 4}rem` }}>
                                                                                    <div className="flex items-center gap-3">
                                                                                        <div className="w-8 h-px bg-indigo-500/30"></div>
                                                                                        {item.summaryLabel || `รวม ${item.title}`}
                                                                                    </div>
                                                                                </td>
                                                                                {ytdCalculations.map(({ monthIndex, results }) => {
                                                                                    const r = results.items[item.id] || { total: {} };
                                                                                    const isCollapsed = collapsedMonths.has(monthIndex);
                                                                                    if (isCollapsed) return <td key={monthIndex} className="px-4 py-5 text-center text-slate-700 border-l border-white/5">…</td>;
                                                                                    return (
                                                                                        <React.Fragment key={monthIndex}>
                                                                                            {showGrandTotal && <td className="px-6 py-5 text-right font-mono font-black text-indigo-400 pnl-grand-total-col border-l border-white/5">{(r.total['GRAND_TOTAL'] || 0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>}
                                                                                            {sortedBranches.map(b => <td key={b} className="px-6 py-5 text-right font-mono font-black text-slate-200 border-t border-white/5">{(r.total[b] || 0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                                            {plCustomColumns.map(col => <td key={col.id} className="px-6 py-5 text-right font-mono font-black text-pink-400 bg-pink-500/10">{(r.total[col.id] || 0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                                        </React.Fragment>
                                                                                    );
                                                                                })}
                                                                                {showGrandTotal && <td className="px-6 py-5 text-right font-mono font-black text-indigo-400 bg-indigo-500/10 border-l border-indigo-500/20">{(ytdSum['GRAND_TOTAL'] || 0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>}
                                                                                {sortedBranches.map(b => <td key={b} className="px-6 py-5 text-right font-mono font-black text-indigo-300 bg-indigo-500/5 border-l border-indigo-500/10">{(ytdSum[b] || 0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>)}
                                                                            </tr>
                                                                        )}
                                                                    </React.Fragment>
                                                                );
                                                            }
                                                            // --- END YTD ROW ---

                                                            const isTopic = depth === 0;
                                                            const res = pnlCalculations.items[item.id] || { total: {} };
                                                            const hasChildren = (item.children && item.children.length > 0) || (item.lines && item.lines.length > 0);
                                                            const ds = item.displayNegate ? -1 : 1;
                                                            
                                                            // Per-item total configuration (None, Top, Bottom, Both)
                                                            const itemTotalPos = item.totalPosition || (plTotalPosition === 'both' ? 'both' : plTotalPosition);
                                                            const isTotalTop = (itemTotalPos === 'top' || itemTotalPos === 'both');
                                                            const isTotalBottom = (itemTotalPos === 'bottom' || itemTotalPos === 'both') && hasChildren;
                                                            
                                                            // Border style (Single vs Double)
                                                            const rowStyleClass = item.lineStyle === 'double' ? 'pnl-summary-row-double' : 'pnl-summary-row';

                                                            return (
                                                                <React.Fragment key={item.id}>
                                                                    <tr 
                                                                        className={`${isTopic ? 'bg-slate-900/90' : 'hover:bg-white/5'} transition-all cursor-pointer group${depth > 0 ? ' accordion-row' : ''}`}
                                                                        onClick={() => setExpandedLines(prev => prev.includes(item.id) ? prev.filter(x => x !== item.id) : [...prev, item.id])}
                                                                    >
                                                                        <td className={`py-6 sticky left-0 z-10 bg-[#080c14] border-l-4 ${isTopic ? 'border-indigo-500 font-black text-white px-12 uppercase tracking-widest' : 'border-transparent font-bold text-slate-300'}`} style={{ paddingLeft: isTopic ? undefined : `${(depth * 2) + 4}rem` }}>
                                                                            <div className="flex items-center gap-3">
                                                                                {hasChildren && (
                                                                                    <div className={`transition-transform duration-300 ${expandedLines.includes(item.id) ? 'rotate-90' : ''}`}>
                                                                                        <Icon name="chevron-right" size={14} className="text-indigo-500" />
                                                                                    </div>
                                                                                )}
                                                                                <div className="flex flex-col">
                                                                                    <span
                                                                                        className="hover:text-indigo-300 hover:underline cursor-pointer transition-colors"
                                                                                        onClick={e => { e.stopPropagation(); setDrillModal({ item }); }}
                                                                                    >{item.title}</span>
                                                                                    {isTopic && (isTotalTop) && (
                                                                                        <span className="text-[9px] text-slate-500 font-black tracking-widest mt-1 opacity-50">(TOP TOTAL)</span>
                                                                                    )}
                                                                                </div>
                                                                            </div>
                                                                        </td>
                                                                        {showGrandTotal && (
                                                                            <td className={`px-8 py-6 text-right font-mono font-black pnl-grand-total-col shadow-[2px_0_5px_rgba(0,0,0,0.3)] ${isTopic ? 'text-indigo-400' : 'text-indigo-300'}`} style={{position:'sticky',left:'300px',zIndex:5,background:'var(--accent-l)'}}>
                                                                                {(isTotalTop || !hasChildren) ? (ds*(res.total['GRAND_TOTAL'] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : ''}
                                                                            </td>
                                                                        )}
                                                                        {sortedBranches.map(b => (
                                                                            <td key={b} className={`px-8 py-6 text-right font-mono ${isTopic ? 'font-black text-slate-400' : 'text-slate-400 opacity-80'}`}>
                                                                                {(isTotalTop || !hasChildren) ? (ds*(res.total[b] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : ''}
                                                                            </td>
                                                                        ))}
                                                                        {plCustomColumns.map(col => (
                                                                            <td key={col.id} className={`px-8 py-6 text-right font-mono font-black ${isTopic ? 'text-pink-400 bg-pink-500/10' : 'text-pink-300 bg-pink-500/5'}`}>
                                                                                {(isTotalTop || !hasChildren) ? (ds*(res.total[col.id] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : ''}
                                                                            </td>
                                                                        ))}
                                                                    </tr>
                                                                    
                                                                    {/* Drill-down if manually expanded and has groups */}
                                                                    {expandedLines.includes(item.id) && item.groups && item.groups.length > 0 && (
                                                                        <tr className="bg-[#05080c]">
                                                                            <td colSpan={1 + (showGrandTotal ? 1 : 0) + sortedBranches.length + plCustomColumns.length} className="px-20 py-8">
                                                                                <div className="rounded-3xl overflow-hidden border border-white/10 bg-[#0d1321]/50 p-1">
                                                                                    <div className="overflow-x-auto">
                                                                                        <table className="w-full text-[10px] min-w-[1200px] pnl-drilldown-table">
                                                                                            <thead className="bg-[#161d2b] text-slate-500 font-black uppercase tracking-widest">
                                                                                                <tr>
                                                                                                    <th style={{ width: '260px' }} className="px-6 py-4 text-left border-r border-b border-white/5 sticky-col-1 sticky-header bg-[#161d2b]">Grouping Item / Branch Details</th>
                                                                                                    <th style={{ width: '140px' }} className="px-6 py-4 text-right text-indigo-400 bg-indigo-500/20 sticky-col-2 sticky-header border-r border-b border-white/5 shadow-[4px_0_8px_rgba(0,0,0,0.5)]">GRAND TOTAL<br/><span className="text-[8px] opacity-70">(Direct + Alloc)</span></th>

                                                                                                        <th key={b} className="px-6 py-4 text-right border-l border-white/5">
                                                                                                            {b}
                                                                                                            <div className="flex justify-end gap-2 text-[8px] mt-1">
                                                                                                                <span className="text-emerald-400">DIR</span>
                                                                                                                <span className="text-slate-600">/</span>
                                                                                                                <span className="text-orange-400">ALL</span>
                                                                                                            </div>
                                                                                                        </th>
                                                                                                    ))}
                                                                                                </tr>
                                                                                            </thead>
                                                                                            <tbody className="divide-y divide-white/5">
                                                                                                                                                                {(() => {
                                                                                                    const isRev = (item.type === 'revenue' || pnlCalculations.topicTypeMapping?.[item.id] === 'revenue');
                                                                                                    const source = isRev ? processedData.revenue.branchWise : processedData.expenses.branchWise;
                                                                                                    const ds = item.displayNegate ? -1 : 1;
                                                                                                    
                                                                                                    // Combine all unique accounts belonging to any group in this item
                                                                                                    const accountsMap = {};
                                                                                                    
                                                                                                    // Get from Direct source
                                                                                                    source.filter(it => item.groups.includes(it.groupName)).forEach(it => {
                                                                                                        if (!accountsMap[it.accCode]) accountsMap[it.accCode] = { code: it.accCode, name: it.accName, groupName: it.groupName };
                                                                                                    });
                                                                                                    
                                                                                                    // Get from Allocated source
                                                                                                    processedData.allocation.filter(it => it.monthIndex === currentMonthIndex && item.groups.includes(it.name)).forEach(it => {
                                                                                                        if (!accountsMap[it.code]) accountsMap[it.code] = { code: it.code, name: it.tbName, groupName: it.name };
                                                                                                    });

                                                                                                    return Object.values(accountsMap).sort((a,b) => a.code.localeCompare(b.code)).map(acc => {
                                                                                                        const branchStats = {};
                                                                                                        let totalDirect = 0;
                                                                                                        let totalAlloc = 0;
                                                                                                        
                                                                                                        sortedBranches.forEach(b => {
                                                                                                            branchStats[b] = { direct: 0, alloc: 0 };
                                                                                                        });

                                                                                                        // Direct
                                                                                                        source.filter(it => it.accCode === acc.code).forEach(it => {
                                                                                                            sortedBranches.forEach(b => {
                                                                                                                const val = (it.branchValues[b][currentMonthIndex] || 0);
                                                                                                                branchStats[b].direct += val;
                                                                                                                totalDirect += val;
                                                                                                            });
                                                                                                        });

                                                                                                        // Allocated
                                                                                                        processedData.allocation.filter(it => it.monthIndex === currentMonthIndex && it.code === acc.code).forEach(it => {
                                                                                                            sortedBranches.forEach(b => {
                                                                                                                const val = (it.alloc[b] || 0);
                                                                                                                branchStats[b].alloc += val;
                                                                                                                totalAlloc += val;
                                                                                                            });
                                                                                                        });

                                                                                                        return (
                                                                                                            <tr key={acc.code} className="hover:bg-white/[0.03] transition-colors group/row">
                                                                                                                <td style={{ width: '260px' }} className="px-6 py-4 border-r border-b border-white/5 sticky-col-1 bg-[#111827] group-hover/row:bg-[#1a2333] transition-colors">
                                                                                                                    <div className="font-mono font-black text-indigo-400 text-[9px]">{acc.code}</div>
                                                                                                                    <div className="font-bold text-slate-300 leading-tight truncate">{acc.name}</div>
                                                                                                                    <div className="text-[8px] text-slate-600 uppercase mt-1">Group: {acc.groupName}</div>
                                                                                                                </td>
                                                                                                                <td style={{ width: '140px' }} className="px-6 py-4 text-right font-mono font-black text-white bg-[#111827] text-xs sticky-col-2 border-r border-b border-white/10 group-hover/row:bg-[#1f2937] transition-colors shadow-[4px_0_8px_rgba(0,0,0,0.5)]">
                                                                                                                    {(ds*roundTo2(totalDirect + totalAlloc)).toLocaleString(undefined, {minimumFractionDigits:2})}
                                                                                                                </td>
                                                                                                                {sortedBranches.map(b => (
                                                                                                                    <td key={b} style={{ width: '140px' }} className="px-6 py-4 text-right font-mono border-l border-b border-white/5">
                                                                                                                        <div className="flex flex-col">
                                                                                                                            <span className={branchStats[b].direct !== 0 ? "text-emerald-400 font-bold" : "text-slate-700"}>
                                                                                                                                {(ds*branchStats[b].direct).toLocaleString(undefined, {minimumFractionDigits:2})}
                                                                                                                            </span>
                                                                                                                            <span className={branchStats[b].alloc !== 0 ? "text-orange-400 font-bold" : "text-slate-700"}>
                                                                                                                                {(ds*branchStats[b].alloc).toLocaleString(undefined, {minimumFractionDigits:2})}
                                                                                                                            </span>
                                                                                                                        </div>
                                                                                                                    </td>
                                                                                                                ))}
                                                                                                            </tr>
                                                                                                        );
                                                                                                    });
                                                                                                })()}
                                                                                            </tbody>
                                                                                        </table>
                                                                                    </div>
                                                                                </div>
                                                                            </td>
                                                                        </tr>
                                                                    )}

                                                                    {/* Recursive children */}
                                                                    {expandedLines.includes(item.id) && item.children && item.children.map(child => renderRow(child, depth + 1))}
                                                                    {expandedLines.includes(item.id) && item.lines && item.lines.map(line => renderRow(line, depth + 1))}

                                                                    {isTotalBottom && expandedLines.includes(item.id) && (
                                                                        <tr className={`${rowStyleClass} transition-colors shadow-inner`}>
                                                                            <td className={`py-6 sticky left-0 z-10 bg-[#080c14] font-black text-indigo-400 px-12 uppercase tracking-tight text-xs border-l-4 border-indigo-500/40`} style={{ paddingLeft: isTopic ? undefined : `${(depth * 2) + 4}rem` }}>
                                                                                <div className="flex items-center gap-3">
                                                                                    <div className="w-8 h-px bg-indigo-500/30"></div>
                                                                                    {item.summaryLabel || `รวม ${item.title}`}
                                                                                </div>
                                                                            </td>
                                                                            {showGrandTotal && (
                                                                                <td className={`px-8 py-6 text-right font-mono font-black text-white pnl-grand-total-col shadow-[2px_0_5px_rgba(0,0,0,0.5)] border-t border-indigo-500/10`} style={{position:'sticky',left:'300px',zIndex:5,background:'var(--accent-l)'}}>
                                                                                    {(ds*(res.total['GRAND_TOTAL'] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                                </td>
                                                                            )}
                                                                            {sortedBranches.map(b => (
                                                                                <td key={b} className="px-8 py-6 text-right font-mono font-black text-slate-200 border-t border-white/5">
                                                                                    {(ds*(res.total[b] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                                </td>
                                                                            ))}
                                                                            {plCustomColumns.map(col => (
                                                                                <td key={col.id} className="px-8 py-6 text-right font-mono font-black text-pink-400 bg-pink-500/10 border-t border-pink-500/10">
                                                                                    {(ds*(res.total[col.id] || 0)).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}
                                                                                </td>
                                                                            ))}
                                                                        </tr>
                                                                    )}
                                                                </React.Fragment>
                                                            );
                                                        };
                                                        
                                                        return (
                                                            <>
                                                                {deferredPlStructure.map(topic => renderRow(topic))}

                                                            </>
                                                        );
                                                    })()}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div style={{display: activeTab==='cost-center' ? 'block' : 'none'}}>
                                <CostCenterTab departments={departments} processedData={processedData} currentMonthIndex={currentMonthIndex} sortedBranches={sortedBranches} handleExportCostCenter={handleExportCostCenter} allocExclusions={allocExclusions} />
                            </div>

                            <div style={{display: activeTab==='settings' && isSettingsUnlocked ? 'block' : 'none'}}>
                                <div className="space-y-6">

                                    {/* Sub-tab Navigation */}
                                    <div style={{display:'flex',gap:6,padding:4,background:'var(--surface2)',borderRadius:16,border:'1px solid var(--border)',width:'fit-content'}}>
                                        {[
                                            {id:'org',    label:'โครงสร้างองค์กร',     icon:'building-2'},
                                            {id:'rules',  label:'กฎการปันส่วน',        icon:'sliders'},
                                            {id:'pnl',    label:'ผัง P&L & Mapping',   icon:'layout-list'},
                                            {id:'backup', label:'จัดการไฟล์ & ข้อมูล', icon:'database'},
                                        ].map(t => (
                                            <button key={t.id} onClick={()=>{ setSettingsTab(t.id); setMappingPage(1); }}
                                                style={{
                                                    display:'flex', alignItems:'center', gap:6,
                                                    padding:'10px 18px', borderRadius:12,
                                                    fontSize:11, fontWeight:800,
                                                    border:'none', cursor:'pointer',
                                                    background: settingsTab===t.id ? 'var(--accent)' : 'transparent',
                                                    color: settingsTab===t.id ? '#fff' : 'var(--text3)',
                                                    boxShadow: settingsTab===t.id ? '0 4px 12px rgba(99,102,241,0.3)' : 'none',
                                                    transition:'all 0.18s',
                                                }}>
                                                <Icon name={t.icon} size={13}/> {t.label}
                                            </button>
                                        ))}
                                    </div>

                                    {settingsTab === 'org' && (
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10 animate-in">
                                        {/* Manage Branches */}
                                        <div className="glass p-10 rounded-[3.5rem] space-y-8">
                                            <div className="flex items-center gap-4"><div className="p-3 bg-emerald-500/10 rounded-2xl"><Icon name="plus" className="text-emerald-400" /></div><h3 className="text-xl font-black text-white uppercase tracking-widest font-display">จัดการรหัสสาขา</h3></div>
                                            <div className="flex gap-4">
                                                <input value={newBranchInput} onChange={e=>setNewBranchInput(e.target.value.toUpperCase())} onKeyDown={e=>{if(e.key==='Enter'&&newBranchInput.trim()){setBranches([...branches,newBranchInput.trim().toUpperCase()]);setNewBranchInput('');}}} className="flex-1 bg-[#0d1321] border border-white/10 rounded-2xl px-8 py-5 font-black outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all font-mono text-white" placeholder="เช่น S005" />
                                                <button onClick={()=>{if(newBranchInput.trim()){setBranches([...branches,newBranchInput.trim().toUpperCase()]);setNewBranchInput('');}}} className="bg-emerald-500 text-slate-900 px-10 py-5 rounded-2xl font-black shadow-xl hover:-translate-y-1 active:scale-95 transition-all">เพิ่ม</button>
                                            </div>
                                            <div className="flex flex-wrap gap-4 max-h-40 overflow-y-auto font-mono">
                                                {sortedBranches.map(b=><div key={b} className="bg-white/5 px-6 py-4 rounded-2xl border border-white/5 flex items-center gap-6 font-mono font-black text-slate-400"><span>{b}</span><ConfirmDeleteButton onConfirm={()=>{ if(isBranchInUse(b)){showToast(`ไม่อนุญาต: สาขา '${b}' กำลังถูกอ้างอิงในโครงสร้างงบ P&L หรือคอลัมน์รวม กรุณาปลดการเชื่อมโยงก่อน`,'error');return;} setBranches(branches.filter(x=>x!==b));}} /></div>)}
                                            </div>
                                            
                                            {/* Data Start Column Setting */}
                                            <div className="pt-8 border-t border-white/5 mt-8">
                                                <div className="flex items-center gap-4 mb-4"><div className="p-3 bg-blue-500/10 rounded-2xl"><Icon name="columns" className="text-blue-400" /></div><h3 className="text-lg font-black text-white uppercase tracking-widest font-display">ตำแหน่งคอลัมน์เริ่มต้น (มกราคม)</h3></div>
                                                <div className="flex items-center gap-6">
                                                    <input type="number" value={dataStartCol} onChange={e=>setDataStartCol(parseInt(e.target.value)||0)} className="w-32 bg-[#0d1321] border border-white/10 rounded-2xl px-6 py-4 font-black outline-none focus:ring-2 focus:ring-blue-500/50 transition-all font-mono text-white text-center" />
                                                    <p className="text-xs text-slate-500 font-bold leading-relaxed">ระบุลำดับคอลัมน์ใน Excel ที่เป็นเดือนมกราคม <br/>(ปกติคือ 1 ถ้า Account Code อยู่คอลัมน์ 0)</p>
                                                </div>
                                            </div>
                                        </div>

                                    {/* Departments Management */}
                                    <div className="glass p-10 rounded-[3.5rem] space-y-8">
                                        <div className="flex items-center gap-4">
                                            <div className="p-3 bg-cyan-500/10 rounded-2xl"><Icon name="layers" className="text-cyan-400" /></div>
                                            <h3 className="text-xl font-black text-white uppercase tracking-widest font-display flex items-center">จัดการรหัสแผนก (Cost Center)<HelpTooltip text="แผนกที่ต้องการให้ระบบนำค่าใช้จ่ายทางตรงและค่าใช้จ่ายปันส่วนมาลงบัญชี" /></h3>
                                        </div>
                                        <div className="flex gap-4">
                                            <input value={newDeptCode} onChange={e => setNewDeptCode(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newDeptCode.trim()&&newDeptName.trim()&&!departments.find(d=>d.code===newDeptCode.trim())){setDepartments([...departments,{code:newDeptCode.trim(),name:newDeptName.trim()}].sort((a,b)=>a.code.localeCompare(b.code)));setNewDeptCode('');setNewDeptName('');}}} placeholder="รหัส เช่น 220" className="w-28 bg-[#0d1321] border border-white/10 rounded-2xl px-5 py-4 font-black outline-none focus:ring-2 focus:ring-cyan-500/50 font-mono text-white text-sm" />
                                            <input value={newDeptName} onChange={e => setNewDeptName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newDeptCode.trim()&&newDeptName.trim()&&!departments.find(d=>d.code===newDeptCode.trim())){setDepartments([...departments,{code:newDeptCode.trim(),name:newDeptName.trim()}].sort((a,b)=>a.code.localeCompare(b.code)));setNewDeptCode('');setNewDeptName('');}}} placeholder="ชื่อแผนก เช่น แผนกธุรการ (Admin)" className="flex-1 bg-[#0d1321] border border-white/10 rounded-2xl px-5 py-4 font-black outline-none focus:ring-2 focus:ring-cyan-500/50 text-white text-sm" />
                                            <button onClick={() => {
                                                if (!newDeptCode.trim() || !newDeptName.trim()) return;
                                                if (departments.find(d => d.code === newDeptCode.trim())) return;
                                                setDepartments([...departments, { code: newDeptCode.trim(), name: newDeptName.trim() }].sort((a,b) => a.code.localeCompare(b.code)));
                                                setNewDeptCode(''); setNewDeptName('');
                                            }} className="bg-cyan-500 text-slate-900 px-8 py-4 rounded-2xl font-black hover:-translate-y-1 transition-all">เพิ่ม</button>
                                        </div>
                                        <div className="max-h-64 overflow-y-auto rounded-3xl border border-white/5 bg-[#0d1321]/30">
                                            {departments.length === 0 ? (

                                            ) : departments.map((d, i) => (
                                                <div key={d.code} className="flex items-center justify-between px-6 py-3 border-b border-white/5 last:border-0 hover:bg-white/5 transition-colors group">
                                                    <div className="flex items-center gap-4">
                                                        <span className="font-mono font-black text-cyan-400 text-sm w-12">{d.code}</span>
                                                        <span className="text-slate-300 text-sm font-bold">{d.name}</span>
                                                    </div>
                                                    <ConfirmDeleteButton onConfirm={() => setDepartments(departments.filter((_, idx) => idx !== i))} className="opacity-0 group-hover:opacity-100" />
                                                </div>
