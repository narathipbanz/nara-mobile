                                                                                                title: m.tbName,
                                                                                                accounts: [m.code],
                                                                                                children: []
                                                                                            });
                                                                                        });
                                                                                        startTransition(() => setPlStructure(next));
                                                                                    }
                                                                                }}
                                                                                className="bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded-full text-[10px] font-black flex items-center gap-2 hover:bg-indigo-500 hover:text-white transition-all border border-indigo-500/30"
                                                                            >
                                                                                <Icon name="split" size={10}/> แตกรายการย่อยตามบัญชี ({mappings.filter(m => m.groupName === item.groups[0]).length})
                                                                            </button>
                                                                        )}
                                                                    </div>
                                                                )}

                                                                {/* Recursive Children Setup */}
                                                                <div className="space-y-4">
                                                                    {item.children && item.children.map((child, cIdx) => renderSettingsNode(child, [...path, cIdx], depth + 1))}
                                                                    {item.lines && item.lines.map((line, lIdx) => renderSettingsNode(line, [...path, lIdx], depth + 1))}
                                                                    
                                                                    <button 
                                                                        onClick={() => {
                                                                            const next = JSON.parse(JSON.stringify(plStructure));
                                                                            let target = next[path[0]];
                                                                            for(let i=1; i<path.length; i++) target = (target.children || target.lines)[path[i]];
                                                                            
                                                                            // Standardize to use 'children' for all sub-items moving forward
                                                                            if (!target.children) target.children = [];
                                                                            target.children.push({ id: `c_${Date.now()}_${Math.random()}`, title: 'รายการชื่อใหม่...', groups: [], children: [] });
                                                                            
                                                                            startTransition(() => setPlStructure(next));
                                                                        }} 
                                                                        className="w-full text-[10px] font-black text-indigo-400/80 hover:text-white uppercase tracking-widest flex items-center justify-center gap-3 px-6 py-4 bg-indigo-500/5 hover:bg-indigo-500/20 border border-dashed border-indigo-500/20 rounded-2xl transition-all"
                                                                    >
                                                                        <Icon name="plus" size={14} /> เพิ่มรายการย่อย
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        );
                                                    };
                                                    return renderSettingsNode(topic);
                                                })}
                                                <button onClick={() => {
                                                    startTransition(() => setPlStructure([...plStructure, { id: `t_${Date.now()}`, title: 'หัวข้อหลักใหม่', type: 'revenue', children: [] }]));
                                                }} className="w-full py-8 border-2 border-dashed border-white/10 rounded-[3rem] text-slate-500 font-black uppercase tracking-widest hover:border-indigo-500/40 hover:text-indigo-400 hover:bg-indigo-500/5 transition-all flex items-center justify-center gap-4">
                                                    <Icon name="plus" size={24} /> เพิ่มหัวข้อหลัก
                                                </button>
                                                <button onClick={() => {
                                                    startTransition(() => setPlStructure([...plStructure, { id: `st_${Date.now()}`, title: 'ยอดรวมใหม่', type: 'subtotal', sourceIds: [], lineStyle: 'single' }]));
                                                }} className="w-full py-8 border-2 border-dashed border-amber-500/20 rounded-[3rem] text-amber-500/60 font-black uppercase tracking-widest hover:border-amber-500/50 hover:text-amber-400 hover:bg-amber-500/5 transition-all flex items-center justify-center gap-4">
                                                    <Icon name="sigma" size={24} /> เพิ่มบรรทัดยอดรวม
                                                </button>
                                                <button onClick={() => {
                                                    startTransition(() => setPlStructure([...plStructure, { id: `pl_${Date.now()}`, title: 'กำไร / ขาดทุน', type: 'profit', sourceIds: [], lineStyle: 'double' }]));
                                                }} className="w-full py-8 border-2 border-dashed border-emerald-500/20 rounded-[3rem] text-emerald-500/60 font-black uppercase tracking-widest hover:border-emerald-500/50 hover:text-emerald-400 hover:bg-emerald-500/5 transition-all flex items-center justify-center gap-4">
                                                    <Icon name="trending-up" size={24} /> เพิ่มบรรทัด Profit / Loss
                                                </button>
                                            </div>
                                        </div>
                                        <div className="glass p-10 rounded-[3.5rem] space-y-8">
                                            <div className="flex items-center gap-4"><div className="p-3 bg-pink-500/10 rounded-2xl"><Icon name="columns" className="text-pink-400" /></div><h3 className="text-xl font-black text-white uppercase tracking-widest font-display">จัดการคอลัมน์รวมสาขา (Custom Columns)</h3></div>
                                            <div className="space-y-4">
                                                {plCustomColumns.map((col, idx) => {
                                                    const missingBranches = col.branches.filter(b => !branches.includes(b));
                                                    return (
                                                    <div key={col.id} className="bg-white/5 rounded-2xl p-6 border border-white/5 space-y-4 group">
                                                        <div className="flex justify-between items-center">
                                                            <input 
                                                                value={col.title} 
                                                                onChange={(e) => {
                                                                    const next = [...plCustomColumns];
                                                                    next[idx].title = e.target.value;
                                                                    setPlCustomColumns(next);
                                                                }}
                                                                className="bg-transparent font-black text-white outline-none border-b border-transparent focus:border-pink-500/50 transition-all flex-1"
                                                            />
                                                            <ConfirmDeleteButton onConfirm={() => setPlCustomColumns(plCustomColumns.filter((_, i) => i !== idx))} className="opacity-0 group-hover:opacity-100" />
                                                        </div>
                                                        {missingBranches.length > 0 && (
                                                            <div className="flex items-center gap-2 text-[11px] text-amber-400 bg-amber-500/10 px-3 py-2 rounded-xl border border-amber-500/20">
                                                                <Icon name="alert-triangle" size={12}/>
                                                                สาขา {missingBranches.join(', ')} ไม่มีในระบบแล้ว — ยอดจะเป็น 0
                                                            </div>
                                                        )}
                                                        <div className="flex flex-wrap gap-2">
                                                            {col.branches.map((b, bIdx) => (
                                                                <div key={bIdx} className={`px-3 py-1 rounded-full text-[10px] font-black flex items-center gap-2 ${!branches.includes(b) ? 'bg-red-500/10 text-red-400' : 'bg-pink-500/10 text-pink-400'}`}>
                                                                    {b}
                                                                    <button onClick={() => {
                                                                        const next = [...plCustomColumns];
                                                                        next[idx].branches.splice(bIdx, 1);
                                                                        setPlCustomColumns(next);
                                                                    }} className="hover:text-red-500 text-lg leading-none">×</button>
                                                                </div>
                                                            ))}
                                                            <select 
                                                                value="" 
                                                                onChange={(e) => {
                                                                    if (!e.target.value) return;
                                                                    const next = [...plCustomColumns];
                                                                    if (!next[idx].branches.includes(e.target.value)) {
                                                                        next[idx].branches.push(e.target.value);
                                                                        setPlCustomColumns(next);
                                                                    }
                                                                }}
                                                                className="bg-white/5 text-[10px] font-black text-slate-500 px-3 py-1 rounded-full outline-none cursor-pointer"
                                                            >
                                                                <option value="">+ เพิ่มสาขา</option>
                                                                {sortedBranches.map(b => <option key={b} value={b}>{b}</option>)}
                                                            </select>
                                                        </div>
                                                    </div>
                                                    );
                                                })}
                                                <button onClick={() => setPlCustomColumns([...plCustomColumns, { id: `c_${Date.now()}`, title: 'คอลัมน์รวมใหม่', branches: [] }])} className="w-full py-4 bg-pink-500/10 border border-pink-500/20 rounded-2xl text-[10px] font-black text-pink-400 uppercase tracking-widest hover:bg-pink-500/20 transition-all">เพิ่มคอลัมน์รวมสาขา</button>
                                            </div>
                                        </div>
                                    <div className="glass rounded-[3.5rem] overflow-hidden shadow-2xl">
                                        <div className="px-10 py-10 border-b border-white/5 flex justify-between items-center bg-white/5">
                                            <div>
                                                <h3 className="text-2xl font-black text-white uppercase tracking-tight font-display">ระบบจับคู่บัญชีแสดงงบ (Grouping)</h3>
                                                <p className="text-slate-500 text-xs font-bold mt-1 uppercase tracking-wider">นำเข้าไฟล์ Excel เพื่อตั้งชื่อกลุ่มบัญชีที่ต้องการให้แสดงในงบ</p>
                                            </div>
                                            <div className="flex items-center gap-3">
                                                {prevMappings !== null && (
                                                    <button onClick={() => { setMappings(prevMappings); setPrevMappings(null); showToast('ย้อนกลับ Mapping สำเร็จ'); }} className="flex items-center gap-2 px-5 py-3 rounded-2xl font-black text-xs border border-amber-500/30 bg-amber-500/10 text-amber-400 hover:bg-amber-500/20 transition-all">
                                                        <Icon name="rotate-ccw" size={14}/> Undo
                                                    </button>
                                                )}
                                                <label className="bg-white/5 text-white px-8 py-4 rounded-2xl font-black border border-white/10 hover:bg-white/10 transition-all cursor-pointer flex items-center gap-3">
                                                    <Icon name="upload" size={18} /> Import Mapping Excel
                                                    <input type="file" onChange={handleMappingFileUpload} className="hidden" />
                                                </label>
                                            </div>
                                        </div>

                                        {pastedData && mappings.length > 0 && (() => {
                                            const tbCodes = new Set(processedData.tb.map(r => r.accCode));
                                            const notInTb = mappings.filter(m => !tbCodes.has(m.code) && ['4','5','6'].includes(m.code[0]));
                                            if (!notInTb.length) return null;
                                            const show = expandedNotInTb ? notInTb : notInTb.slice(0, 20);
                                            return (
                                                <div className="mx-10 mt-6 glass rounded-2xl p-5 border border-blue-500/30 bg-blue-500/[0.03] flex gap-4 items-start">
                                                    <div className="p-2 bg-blue-500/20 rounded-xl text-blue-400 flex-shrink-0"><Icon name="search" size={16}/></div>
                                                    <div className="flex-1 min-w-0">
                                                        <p className="text-sm font-black text-white mb-1">พบ {notInTb.length} รหัส (รายได้/ค่าใช้จ่าย) ใน Mapping ที่ไม่มีใน TB ไฟล์ปัจจุบัน</p>
                                                        <p className="text-[11px] text-slate-400 mb-3">อาจเป็นรหัสที่ไม่มีธุรกรรมในงวดนี้ หรือรหัสผิด</p>
                                                        <div className="flex flex-wrap gap-2">
                                                            {show.map(m => (
                                                                <span key={m.code} className="bg-blue-500/10 border border-blue-500/20 text-blue-300 px-3 py-1 rounded-xl text-[10px] font-black" title={m.tbName}>{m.code}</span>
                                                            ))}
                                                        </div>
                                                        {notInTb.length > 20 && (
                                                            <button onClick={() => setExpandedNotInTb(!expandedNotInTb)} className="mt-3 text-[11px] font-black text-blue-400 hover:text-white transition-colors">
                                                                {expandedNotInTb ? '▲ ย่อรายการ' : `▼ ดูทั้งหมด ${notInTb.length} รายการ`}
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })()}
                                        <div className="px-10 py-4 border-b border-white/5 bg-[#0d1321]/30">
                                            <div className="flex items-center gap-3 bg-white/5 border border-white/10 rounded-2xl px-4 py-2.5 max-w-md">
                                                <Icon name="search" size={14} className="text-slate-500 flex-shrink-0"/>
                                                <input type="text" placeholder="ค้นหารหัสบัญชี, ชื่อบัญชี หรือกลุ่ม..."
                                                    value={mappingSearch}
                                                    onChange={e => { setMappingSearch(e.target.value); setMappingPage(1); }}
                                                    className="bg-transparent text-white text-sm w-full outline-none placeholder-slate-600 font-bold"/>
                                                {mappingSearch && (
                                                    <button onClick={() => { setMappingSearch(''); setMappingPage(1); }} className="text-slate-500 hover:text-white transition-colors flex-shrink-0">
                                                        <Icon name="x" size={13}/>
                                                    </button>
                                                )}
                                            </div>
                                            {mappingSearch && <p className="text-[10px] text-slate-500 font-bold mt-2 px-1">พบ {filteredMappings.length} รายการ</p>}
                                        </div>
                                        <div className="overflow-x-auto max-h-[500px]">
                                            <table className="w-full text-sm text-left">
                                                <thead className="bg-[#0d1321] text-slate-500 text-[10px] font-black uppercase tracking-widest sticky top-0 z-10">
                                                    <tr><th className="px-12 py-6">ลำดับ</th><th className="px-12 py-6">รหัสบัญชี</th><th className="px-12 py-6">ชื่อตาม TB</th><th className="px-12 py-6">ชื่อที่แสดงในงบ (Group)</th><th className="px-12 py-6 text-center">จัดการ</th></tr>
                                                </thead>
                                                <tbody className="divide-y divide-white/5">
                                                    {filteredMappings.length === 0 ?
                                                        <tr><td colSpan="5" className="px-12 py-24 text-center text-slate-600 font-bold italic uppercase tracking-widest">{mappingSearch ? 'ไม่พบรายการที่ค้นหา' : 'กรุณานำเข้าตารางจับคู่บัญชี (Mapping)'}</td></tr> :
                                                        filteredMappings.slice((mappingPage-1)*PAGE_SIZE, mappingPage*PAGE_SIZE).map((m,i) => (
                                                            editingMapping === m.code ? (
                                                                <tr key={m.code} className="bg-indigo-500/[0.06] border-l-2 border-indigo-500/50">
                                                                    <td className="px-12 py-3 font-mono text-slate-400 text-xs">{(mappingPage-1)*PAGE_SIZE+i+1}</td>
                                                                    <td className="px-12 py-3 font-mono font-black text-indigo-300">{m.code}</td>
                                                                    <td className="px-6 py-3">
                                                                        <input type="text" value={editForm.tbName}
                                                                            onChange={e => setEditForm({...editForm, tbName: e.target.value})}
                                                                            className="w-full bg-white/10 border border-white/20 rounded-lg px-3 py-1.5 text-sm text-white outline-none focus:border-indigo-400 font-bold transition-colors"/>
                                                                    </td>
                                                                    <td className="px-6 py-3">
                                                                        <input type="text" value={editForm.groupName}
                                                                            onChange={e => setEditForm({...editForm, groupName: e.target.value})}
                                                                            disabled={isMappingInUse(m.code, m.groupName)}
                                                                            title={isMappingInUse(m.code, m.groupName) ? 'ไม่สามารถแก้ไขชื่อกลุ่มได้ เนื่องจากถูกใช้งานใน P&L' : ''}
                                                                            className={`w-full bg-white/10 border border-white/20 rounded-lg px-3 py-1.5 text-sm text-white outline-none focus:border-indigo-400 font-bold transition-colors ${isMappingInUse(m.code, m.groupName) ? 'opacity-40 cursor-not-allowed' : ''}`}/>
                                                                    </td>
                                                                    <td className="px-6 py-3 text-center">
                                                                        <div className="flex items-center justify-center gap-2">
                                                                            <button onClick={() => handleSaveMappingEdit(m.code)}
                                                                                className="px-3 py-1.5 bg-emerald-500 text-slate-900 rounded-lg text-xs font-black hover:bg-emerald-400 transition-colors flex items-center gap-1">
                                                                                <Icon name="check" size={12}/> บันทึก
                                                                            </button>
                                                                            <button onClick={() => setEditingMapping(null)}
                                                                                className="px-3 py-1.5 bg-white/10 text-slate-400 rounded-lg text-xs font-black hover:bg-white/20 transition-colors flex items-center gap-1">
                                                                                <Icon name="x" size={12}/> ยกเลิก
                                                                            </button>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            ) : (
                                                                <tr key={m.code} className="hover:bg-white/[0.02] transition-colors group">
                                                                    <td className="px-12 py-4 font-mono text-slate-300">{(mappingPage-1)*PAGE_SIZE+i+1}</td>
                                                                    <td className="px-12 py-4 font-mono font-black text-slate-300">{m.code}</td>
                                                                    <td className="px-12 py-4 font-bold text-slate-500 group-hover:text-slate-400 transition-colors uppercase">{m.tbName}</td>
                                                                    <td className="px-12 py-4 font-black text-emerald-400 uppercase">{m.groupName}</td>
                                                                    <td className="px-12 py-4 text-center">
                                                                        <div className="flex items-center justify-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                                                            <button onClick={() => { setEditingMapping(m.code); setEditForm({ tbName: m.tbName, groupName: m.groupName }); }}
                                                                                className="text-slate-500 hover:text-indigo-400 transition-colors p-1" title="แก้ไข">
                                                                                <Icon name="pencil" size={14}/>
                                                                            </button>
                                                                            <ConfirmDeleteButton onConfirm={()=>{ if(isMappingInUse(m.code,m.groupName)){showToast(`ไม่อนุญาต: กลุ่มบัญชี '${m.groupName}' กำลังถูกใช้งานในโครงสร้างงบ P&L กรุณาปลดการเชื่อมโยงก่อน`,'error');return;} setMappings(mappings.filter(item=>item.code!==m.code)); setMappingPage(1); }} />
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            )
                                                        ))
                                                    }
                                                </tbody>
                                            </table>
                                        </div>
                                        {filteredMappings.length > PAGE_SIZE && (
                                            <Pagination total={filteredMappings.length} current={mappingPage} size={PAGE_SIZE} onPageChange={setMappingPage} scrollRef={mainScrollRef} />
                                        )}
                                    </div>
                                        </div>
                                    )}

                                    {settingsTab === 'backup' && (
                                        <div className="space-y-10 animate-in">
                                    <div className="glass rounded-[3.5rem] overflow-hidden shadow-2xl p-10 space-y-8">
                                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                            <div>
                                                <h3 className="text-2xl font-black text-white uppercase tracking-tight font-display">การจัดการข้อมูล (Data Management)</h3>
                                                <p className="text-slate-500 text-xs font-bold mt-1 uppercase tracking-wider">จัดการไฟล์ข้อมูลแยกส่วนเพื่อเก็บใน OneDrive หรือ Backup ระบบ</p>
                                            </div>
                                            <div className="flex flex-wrap gap-4">
                                                <button onClick={handleExportDataJSON} className="glass-emerald text-emerald-400 px-6 py-4 rounded-2xl font-black border border-emerald-500/20 hover:bg-emerald-500/10 transition-all flex items-center gap-3">
                                                    <Icon name="save" size={18} /> Save Data (JSON)
                                                </button>
                                                <label className="bg-emerald-500 text-slate-900 px-6 py-4 rounded-2xl font-black shadow-xl hover:-translate-y-1 transition-all cursor-pointer flex items-center gap-3">
                                                    <Icon name="folder-open" size={18} /> Load Data (JSON)
                                                    <input type="file" onChange={handleImportDataJSON} accept=".json" className="hidden" />
                                                </label>
                                                <button onClick={handleExportApp} className="bg-white/5 text-white px-6 py-4 rounded-2xl font-black border border-white/10 hover:bg-white/10 transition-all flex items-center gap-3">
                                                    <Icon name="external-link" size={18} /> Export App (.html)
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                        </div>
                                    )}

                                </div>
                            </div>
                        </div>
                        {showTopBtn && (
                            <button onClick={() => mainScrollRef.current.scrollTo({top: 0, behavior: 'smooth'})} className="fixed bottom-8 right-8 p-4 bg-indigo-500 text-white rounded-full shadow-[0_8px_30px_rgba(99,102,241,0.4)] hover:-translate-y-2 hover:shadow-[0_12px_40px_rgba(99,102,241,0.6)] transition-all z-50 animate-in fade-in">
                                <Icon name="arrow-up" size={24} />
                            </button>
                        )}
                        </main>
                    </div>
                </div>
            );
        }

        // ── GLOBAL RIPPLE ──
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;
            const rect = btn.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height) * 2.2;
            const x = e.clientX - rect.left - size / 2;
            const y = e.clientY - rect.top  - size / 2;
            const wave = document.createElement('span');
            wave.className = 'ripple-wave';
            wave.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;position:absolute;`;
            if (!btn.style.position || btn.style.position === 'static') btn.style.position = 'relative';
            btn.style.overflow = 'hidden';
            btn.appendChild(wave);
            wave.addEventListener('animationend', () => wave.remove(), { once: true });
        }, true);

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
