            const handleExportCostCenter = () => {
                setIsProcessing(true);
                setTimeout(() => {
                try {
                    if (!window.XLSX) return;
                    const wb = XLSX.utils.book_new();
                    const deptMap = {};
                    departments.forEach(d => { deptMap[d.code] = d.name; });
                    const numFmt = '#,##0.00_);(#,##0.00)';
                    const redStyle = { font: { color: { rgb: 'FF0000' }, bold: true } };

                    // Build lookup maps
                    const accToName = {}, accToGroup = {}, accToDeptEx = {};
                    (processedData.expenses.items || []).forEach(r => {
                        if (!accToName[r.accCode]) { accToName[r.accCode] = r.accName; accToGroup[r.accCode] = r.groupName; }
                        if (r.deptCode && !accToDeptEx[r.accCode]) accToDeptEx[r.accCode] = r.deptCode;
                    });

                    // Build per-month data: deptCode -> grp -> accCode -> branch -> {direct, alloc}
                    const buildMonth = (m) => {
                        const data = {};
                        const addEntry = (dc, grp, code, branch, type, amt) => {
                            if (!data[dc]) data[dc] = {};
                            if (!data[dc][grp]) data[dc][grp] = {};
                            if (!data[dc][grp][code]) data[dc][grp][code] = {};
                            if (!data[dc][grp][code][branch]) data[dc][grp][code][branch] = {direct:0, alloc:0};
                            data[dc][grp][code][branch][type] = roundTo2(data[dc][grp][code][branch][type] + amt);
                        };
                        (processedData.expenses.items || []).forEach(row => {
                            if (row.branch === 'S000' && !allocExclusions.includes(row.accCode)) return;
                            const amt = row.balances[m] || 0;
                            if (amt === 0) return;
                            const dc = row.deptCode || '__unalloc';
                            const grp = row.groupName || row.accCode;
                            addEntry(dc, grp, row.accCode, row.branch, 'direct', amt);
                        });
                        (processedData.allocation || []).filter(ai => ai.monthIndex === m).forEach(ai => {
                            const dc = accToDeptEx[ai.code] || accToDeptEx[ai.code.split('-')[0]] || '__unalloc';
                            const grp = ai.name || ai.code;
                            sortedBranches.forEach(b => {
                                const amt = ai.alloc[b] || 0;
                                if (amt === 0) return;
                                addEntry(dc, grp, ai.code, b, 'alloc', amt);
                            });
                        });
                        return data;
                    };

                    // Sum helper: branch vals for a code entry
                    const sumBranch = (branchMap, type) => sortedBranches.map(b => roundTo2((branchMap[b] && branchMap[b][type]) || 0));
                    const sumAll = (branchMap) => {
                        const d = sumBranch(branchMap, 'direct'), a = sumBranch(branchMap, 'alloc');
                        return [...sortedBranches.flatMap((_,i) => [d[i], a[i], roundTo2(d[i]+a[i])]),
                                roundTo2(d.reduce((s,v)=>s+v,0)), roundTo2(a.reduce((s,v)=>s+v,0)),
                                roundTo2(d.reduce((s,v)=>s+v,0)+a.reduce((s,v)=>s+v,0))];
                    };

                    // Aggregate branchMap from multiple entries
                    const mergeBranchMaps = (maps) => {
                        const merged = {};
                        maps.forEach(bm => {
                            sortedBranches.forEach(b => {
                                if (!merged[b]) merged[b] = {direct:0, alloc:0};
                                if (bm[b]) { merged[b].direct = roundTo2(merged[b].direct + (bm[b].direct||0)); merged[b].alloc = roundTo2(merged[b].alloc + (bm[b].alloc||0)); }
                            });
                        });
                        return merged;
                    };

                    // Apply numFmt
                    const applyFmt = (ws, startCol) => {
                        const range = XLSX.utils.decode_range(ws['!ref']);
                        for (let R = range.s.r; R <= range.e.r; R++) {
                            for (let C = startCol; C <= range.e.c; C++) {
                                const addr = XLSX.utils.encode_cell({r:R, c:C});
                                if (ws[addr] && typeof ws[addr].v === 'number') ws[addr].z = numFmt;
                            }
                        }
                    };

                    // Apply red bold to header row
                    const applyRedHeader = (ws, rowIdx) => {
                        const range = XLSX.utils.decode_range(ws['!ref']);
                        for (let C = range.s.c; C <= range.e.c; C++) {
                            const addr = XLSX.utils.encode_cell({r: rowIdx, c: C});
                            if (ws[addr]) ws[addr].s = redStyle;
                        }
                    };

                    // Build branch header cols
                    const branchCols = sortedBranches.flatMap(b => [`${b}-ทางตรง`, `${b}-ปันส่วน`, `${b}-รวม`]);
                    const totalCols = ['รวม-ทางตรง', 'รวม-ปันส่วน', 'รวมทั้งหมด'];
                    const baseHeader = ['ระดับ', 'รหัสบัญชี', 'ชื่อบัญชี / แผนก', 'กลุ่มบัญชี'];
                    const numStartCol = 4;

                    // Build monthly rows with branch breakdown
                    const buildMonthRows = (data) => {
                        const rows = [];
                        const allDepts = Object.keys(data).sort((a,b) => a==='__unalloc'?1:b==='__unalloc'?-1:a.localeCompare(b));
                        allDepts.forEach(dc => {
                            const deptLabel = dc === '__unalloc' ? 'ไม่ระบุแผนก' : (deptMap[dc] ? `${dc} - ${deptMap[dc]}` : dc);
                            const deptMerged = mergeBranchMaps(Object.values(data[dc]).flatMap(codes => Object.values(codes)));
                            rows.push(['แผนก', '', deptLabel, '', ...sumAll(deptMerged)]);
                            Object.keys(data[dc]).sort().forEach(grp => {
                                const grpMerged = mergeBranchMaps(Object.values(data[dc][grp]));
                                rows.push(['  หมวด', '', grp, '', ...sumAll(grpMerged)]);
                                Object.keys(data[dc][grp]).sort().forEach(code => {
                                    const accName = accToName[code] || code;
                                    const accGrp = accToGroup[code] || grp;
                                    rows.push(['  รายบัญชี', code, accName, accGrp, ...sumAll(data[dc][grp][code])]);
                                });
                            });
                        });
                        // Grand total
                        const grandMerged = mergeBranchMaps(Object.values(data).flatMap(grps => Object.values(grps).flatMap(codes => Object.values(codes))));
                        rows.push(['รวมทั้งหมด', '', '', '', ...sumAll(grandMerged)]);
                        return rows;
                    };

                    // Monthly sheets
                    const allMonthData = [];
                    for (let m = 0; m <= currentMonthIndex; m++) {
                        const data = buildMonth(m);
                        allMonthData.push({m, data});
                        const header = [...baseHeader, ...branchCols, ...totalCols];
                        const wsData = [[`รายงานต้นทุนต่อแผนก (Cost Center) - ${MONTHS[m]}`], [], header, ...buildMonthRows(data)];
                        const ws = XLSX.utils.aoa_to_sheet(wsData);
                        ws['!cols'] = [{wch:12},{wch:16},{wch:40},{wch:30}, ...sortedBranches.flatMap(()=>[{wch:16},{wch:16},{wch:16}]), {wch:16},{wch:16},{wch:16}];
                        applyFmt(ws, numStartCol);
                        applyRedHeader(ws, 2);
                        XLSX.utils.book_append_sheet(wb, ws, MONTHS[m]);
                    }

                    // Summary sheet
                    const allDeptCodes = [...new Set(allMonthData.flatMap(({data}) => Object.keys(data)))].sort((a,b) => a==='__unalloc'?1:b==='__unalloc'?-1:a.localeCompare(b));
                    const allGrpsByDept = {}, allAccsByDeptGrp = {};
                    allMonthData.forEach(({data}) => {
                        Object.keys(data).forEach(dc => {
                            if (!allGrpsByDept[dc]) allGrpsByDept[dc] = new Set();
                            Object.keys(data[dc]).forEach(grp => {
                                allGrpsByDept[dc].add(grp);
                                const key = `${dc}||${grp}`;
                                if (!allAccsByDeptGrp[key]) allAccsByDeptGrp[key] = new Set();
                                Object.keys(data[dc][grp]).forEach(code => allAccsByDeptGrp[key].add(code));
                            });
                        });
                    });

                    const monthBranchCols = allMonthData.flatMap(({m}) => sortedBranches.flatMap(b => [`${b} ${MONTHS[m]}-ทางตรง`, `${b} ${MONTHS[m]}-ปันส่วน`, `${b} ${MONTHS[m]}-รวม`]));
                    const ytdBranchCols = sortedBranches.flatMap(b => [`${b} รวมทั้งปี-ทางตรง`, `${b} รวมทั้งปี-ปันส่วน`, `${b} รวมทั้งปี-รวม`]);
                    const summaryHeader = [...baseHeader, ...monthBranchCols, ...ytdBranchCols, 'รวมทั้งปี-ทางตรง', 'รวมทั้งปี-ปันส่วน', 'รวมทั้งปี'];
                    const summaryRows = [summaryHeader];

                    const getMonthBranchVals = (getBranchMap) => {
                        return allMonthData.flatMap(({m, data}) => {
                            const bm = getBranchMap(m, data);
                            return sortedBranches.flatMap(b => {
                                const d = roundTo2((bm[b] && bm[b].direct) || 0);
                                const a = roundTo2((bm[b] && bm[b].alloc) || 0);
                                return [d, a, roundTo2(d+a)];
                            });
                        });
                    };
                    const getYtdBranchVals = (monthVals) => {
                        const perBranch = sortedBranches.map((_, bi) => {
                            const dVals = allMonthData.map((_,mi) => monthVals[mi * sortedBranches.length * 3 + bi * 3] || 0);
                            const aVals = allMonthData.map((_,mi) => monthVals[mi * sortedBranches.length * 3 + bi * 3 + 1] || 0);
                            const ytdD = roundTo2(dVals.reduce((s,v)=>s+v,0));
                            const ytdA = roundTo2(aVals.reduce((s,v)=>s+v,0));
                            return [ytdD, ytdA, roundTo2(ytdD+ytdA)];
                        });
                        return perBranch.flat();
                    };
                    const getGrandYtd = (ytdBranchVals) => {
                        let tD=0, tA=0;
                        sortedBranches.forEach((_,i) => { tD=roundTo2(tD+ytdBranchVals[i*3]); tA=roundTo2(tA+ytdBranchVals[i*3+1]); });
                        return [tD, tA, roundTo2(tD+tA)];
                    };

                    allDeptCodes.forEach(dc => {
                        const deptLabel = dc === '__unalloc' ? 'ไม่ระบุแผนก' : (deptMap[dc] ? `${dc} - ${deptMap[dc]}` : dc);
                        const deptMV = getMonthBranchVals((m, data) => mergeBranchMaps(Object.values(data[dc]||{}).flatMap(codes => Object.values(codes))));
                        const deptYtd = getYtdBranchVals(deptMV);
                        summaryRows.push(['แผนก','',deptLabel,'', ...deptMV, ...deptYtd, ...getGrandYtd(deptYtd)]);

                        [...allGrpsByDept[dc]].sort().forEach(grp => {
                            const grpMV = getMonthBranchVals((m, data) => mergeBranchMaps(Object.values((data[dc]&&data[dc][grp])||{})));
                            const grpYtd = getYtdBranchVals(grpMV);
                            summaryRows.push(['  หมวด','',grp,'', ...grpMV, ...grpYtd, ...getGrandYtd(grpYtd)]);

                            const key = `${dc}||${grp}`;
                            [...allAccsByDeptGrp[key]].sort().forEach(code => {
                                const accName = accToName[code] || code;
                                const accGrp = accToGroup[code] || grp;
                                const accMV = getMonthBranchVals((m, data) => (data[dc]&&data[dc][grp]&&data[dc][grp][code])||{});
                                const accYtd = getYtdBranchVals(accMV);
                                summaryRows.push(['  รายบัญชี', code, accName, accGrp, ...accMV, ...accYtd, ...getGrandYtd(accYtd)]);
                            });
                        });
                    });

                    const grandMV = getMonthBranchVals((m, data) => mergeBranchMaps(Object.values(data).flatMap(grps => Object.values(grps).flatMap(codes => Object.values(codes)))));
                    const grandYtd = getYtdBranchVals(grandMV);
                    summaryRows.push(['รวมทั้งหมด','','','', ...grandMV, ...grandYtd, ...getGrandYtd(grandYtd)]);

                    const wsSummary = XLSX.utils.aoa_to_sheet(summaryRows);
                    wsSummary['!cols'] = [{wch:12},{wch:16},{wch:40},{wch:30},
                        ...allMonthData.flatMap(()=>sortedBranches.flatMap(()=>[{wch:16},{wch:16},{wch:16}])),
                        ...sortedBranches.flatMap(()=>[{wch:16},{wch:16},{wch:16}]),
                        {wch:16},{wch:16},{wch:16}];
                    applyFmt(wsSummary, numStartCol);
                    applyRedHeader(wsSummary, 0);
                    XLSX.utils.book_append_sheet(wb, wsSummary, 'สรุปทั้งปี');

                    XLSX.writeFile(wb, `CostCenter_Report_Full_Year.xlsx`);
                } catch (e) { setErrorWithAutoDismiss("ส่งออก Cost Center ไม่สำเร็จ: " + e.message);
                } finally { setIsProcessing(false); }
                }, 50);
            };

            const handleExportPnLExcel = () => {
                setIsProcessing(true);
                setTimeout(() => {
                try {
                    if (!window.XLSX) return;
                    const wb = XLSX.utils.book_new();
                    const keys = sortedBranches.concat(plCustomColumns.map(c => c.id));
                    const branchHeaders = [...sortedBranches, ...plCustomColumns.map(c => c.title)];

                    if (ytdMode && ytdCalculations && ytdCalculations.length > 0) {
                        // ── YTD MODE: แต่ละเดือน + YTD รวม ──
                        const monthLabels = ytdCalculations.map(m => m.label);
                        const header = ["รายการ", ...monthLabels.flatMap(l => branchHeaders.map(b => `${l} ${b}`)), ...branchHeaders.map(b => `YTD ${b}`)];
                        const wsData = [];
                        wsData.push(["รายงานงบกำไรขาดทุน (P&L Report) — YTD"]);
                        wsData.push([`ถึงเดือน: ${MONTHS[currentMonthIndex]}`]);
                        wsData.push([]);
                        wsData.push(header);

                        const exportNodeYtd = (item, depth = 0) => {
                            const ds = item.displayNegate ? -1 : 1;
                            const indent = "    ".repeat(depth);
                            const label = (item.type === 'subtotal' || item.type === 'profit') ? `= ${item.title}` : indent + item.title;
                            // ยอดรายเดือน
                            const monthVals = ytdCalculations.flatMap(({ results }) => {
                                const res = results.items[item.id] || { total: {} };
                                return keys.map(k => ds * (res.total[k] || 0));
                            });
                            // YTD sum
                            const ytdVals = keys.map(k => {
                                return roundTo2(ytdCalculations.reduce((s, { results }) => {
                                    const res = results.items[item.id] || { total: {} };
                                    return s + ds * (res.total[k] || 0);
                                }, 0));
                            });
                            wsData.push([label, ...monthVals, ...ytdVals]);
                            if (item.type !== 'subtotal' && item.type !== 'profit') {
                                if (item.children) item.children.forEach(c => exportNodeYtd(c, depth + 1));
                                if (item.lines) item.lines.forEach(c => exportNodeYtd(c, depth + 1));
                            }
                        };
                        plStructure.forEach(topic => {
                            exportNodeYtd(topic, 0);
                            if (topic.type !== 'subtotal') wsData.push([]);
                        });
                        // NET PROFIT
                        const profitTopic = plStructure.find(t => t.type === 'profit');
                        if (!profitTopic) {
                            const profitMonthVals = ytdCalculations.flatMap(({ results }) =>
                                keys.map(k => results.items['__profit']?.total[k] || 0)
                            );
                            const profitYtd = keys.map(k => roundTo2(ytdCalculations.reduce((s, { results }) => s + (results.items['__profit']?.total[k] || 0), 0)));
                            wsData.push(["กำไรสุทธิ (NET PROFIT)", ...profitMonthVals, ...profitYtd]);
                        }
                        const ws = XLSX.utils.aoa_to_sheet(wsData);
                        ws['!cols'] = [{ wch: 50 }, ...header.slice(1).map(() => ({ wch: 14 }))];
                        XLSX.utils.book_append_sheet(wb, ws, "P&L YTD");
                        XLSX.writeFile(wb, `PL_Report_YTD_${MONTHS[currentMonthIndex]}.xlsx`);

                    } else {
                        // ── SINGLE MONTH MODE ──
                        const wsData = [];
                        wsData.push(["รายงานงบกำไรขาดทุน (P&L Report)"]);
                        wsData.push(["ประจำเดือน: " + MONTHS[currentMonthIndex]]);
                        wsData.push([]);
                        wsData.push(["รายการ", ...branchHeaders]);

                        const exportNode = (item, depth = 0) => {
                            const ds = item.displayNegate ? -1 : 1;
                            const res = pnlCalculations.items[item.id] || { total: {} };
                            const indent = "    ".repeat(depth);
                            const label = (item.type === 'subtotal' || item.type === 'profit') ? `= ${item.title}` : indent + item.title;
                            wsData.push([label, ...keys.map(k => ds * (res.total[k] || 0))]);
                            if (item.type !== 'subtotal' && item.type !== 'profit') {
                                if (item.children) item.children.forEach(c => exportNode(c, depth + 1));
                                if (item.lines) item.lines.forEach(c => exportNode(c, depth + 1));
                            }
                        };
                        plStructure.forEach(topic => {
                            exportNode(topic, 0);
                            if (topic.type !== 'subtotal') wsData.push([]);
                        });
                        wsData.push(["กำไรสุทธิ (NET PROFIT)", ...keys.map(k => pnlCalculations.totals.profit[k] || 0)]);
                        const ws = XLSX.utils.aoa_to_sheet(wsData);
                        ws['!cols'] = [{ wch: 50 }, ...keys.map(() => ({ wch: 15 }))];
                        XLSX.utils.book_append_sheet(wb, ws, "P&L Report");
                        XLSX.writeFile(wb, `PL_Report_${MONTHS[currentMonthIndex]}.xlsx`);
                    }
                } catch (e) { setErrorWithAutoDismiss("ส่งออก P&L Excel ไม่สำเร็จ: " + e.message);
                } finally { setIsProcessing(false); }
                }, 50);
            };

            // --- Defensive Data Processing ---
            // --- Defensive Data Processing Optimized ---
            const processedData = useMemo(() => {
                const emptyRevTotals = {};
                const emptyExpTotals = {};
                branches.forEach(b => {
                    emptyRevTotals[b] = Array(12).fill(0);
                    emptyExpTotals[b] = Array(12).fill(0);
                });
                
                if (!pastedData) return { tb: [], revenue: { items: [], totals: emptyRevTotals, grand: Array(12).fill(0), branchWise: [] }, expenses: { items: [], totals: emptyExpTotals, grand: Array(12).fill(0), branchWise: [] }, allocation: [], missingMappings: [] };
                
                try {
                    // Pre-convert Mappings to a Map for O(1) lookup
                    const mappingMap = {};
                    mappings.forEach(m => { mappingMap[m.code] = m.groupName; });

                    const lines = pastedData.split('\n');
                    const tb = [];
                    const foundCodes = new Set();
                    const missingMappingsSet = new Set();
                    const missingMappings = [];
                    
                    for (let l = 0; l < lines.length; l++) {
                        const line = lines[l];
                        if (!line.trim()) continue;
                        const cols = line.split('\t');
                        if (cols.length < 2 || !cols[0]) continue;
                        
                        // 1. Combine all columns before data (Handle multi-column ERP)
                        const fullText = cols.slice(0, dataStartCol).join(' ').trim();
                        if (!fullText) continue;

                        // 2. Strict Branch Match (Sxxx only, from Settings)
                        const sortedBranches = [...branches].sort((a,b) => b.length - a.length);
                        let branch = "S000";
                        let matchedBranch = null;
                        for (const b of sortedBranches) {
                            const bRegex = new RegExp(`\\b${b.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'gi');
                            if (bRegex.test(fullText)) {
                                branch = b;
                                matchedBranch = b;
                                break;
                            }
                        }

                        // 3. Extract Account Code & Cleanup (Pattern: [AccountCode]-[DeptCode])
                        const codeMatch = fullText.match(/\b\d{3,10}(-\d{1,4})?\b/);
                        const accCode = codeMatch ? codeMatch[0] : "";
                        // deptCode must be exactly 3 digits (company standard)
                        const rawDept = accCode.includes('-') ? accCode.split('-')[1] : '';
                        const deptCode = rawDept.length === 3 ? rawDept : '';
                        
                        // 4. Clean Name (Remove Code, Dept, and ALL Branch Codes)
                        let accName = fullText;
                        if (accCode) accName = accName.replace(accCode, '').trim();
                        
                        // Strip ALL branch codes found in settings from the name
                        for (const b of branches) {
                            const bRegex = new RegExp(`\\b${b.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\b`, 'gi');
                            accName = accName.replace(bRegex, '').trim();
                        }
                        
                        // Remove isolated department/segment codes (3-4 digits, possibly with dash)
                        accName = accName.replace(/\b-?\s*\d{3,4}\b/g, ''); 
                        accName = accName.trim().replace(/^[\s-:.]+/, '').replace(/[\s-:.]+$/, '');

                        const originalAccName = accName;
                        if (useRepair) accName = repairThaiText(accName);
                        if (!accName) accName = fullText; // Fallback if name becomes empty

                        // Find Mapping (EXACT MATCH with full code)
                        const mappedGroupName = mappingMap[accCode];
                        const groupName = mappedGroupName || ""; // Leave blank if unmapped as requested

                        if (accCode && !mappedGroupName) {
                            if (!missingMappingsSet.has(accCode)) {
                                missingMappingsSet.add(accCode);
                                missingMappings.push({ code: accCode, tbName: accName });
                            }
                        }

                        const rawBalances = Array(12);
                        for (let i = 0; i < 12; i++) {
                            const v = cols[i + dataStartCol] || "0";
                            rawBalances[i] = parseFloat(String(v).replace(/,/g, '').trim()) || 0;
                        }

                        // Convert YTD to Monthly Movement
                        const balances = Array(12);
                        balances[0] = rawBalances[0];
                        for (let i = 1; i < 12; i++) {
                            balances[i] = rawBalances[i] - rawBalances[i-1];
                        }

                        tb.push({ accCode, branch, accName, originalAccName, groupName, balances, deptCode });
                    }

                    // Calculations
                    const revTotals = {};
                    const expTotals = {};
                    branches.forEach(b => {
                        revTotals[b] = Array(12).fill(0);
                        expTotals[b] = Array(12).fill(0);
                    });
                    
                    let revGrand = Array(12).fill(0);
                    let expGrand = Array(12).fill(0);
                    
                    const revItems = [];
                    const expItems = [];
                    
                    const revBranchWise = {};
                    const expBranchWise = {};
                    
                    const registerInBranchWise = (row, collection, totalsObj, grandArr) => {
                        if (!collection[row.accCode]) {
                            collection[row.accCode] = {
                                accCode: row.accCode,
                                accName: row.accName,
                                groupName: row.groupName,
                                branchValues: {},
                                totalBalances: Array(12).fill(0)
                            };
                            branches.forEach(b => collection[row.accCode].branchValues[b] = Array(12).fill(0));
                        }
                        const c = collection[row.accCode];
                        for (let i = 0; i < 12; i++) {
                            const v = row.balances[i];
                            if (branches.includes(row.branch)) {
                                c.branchValues[row.branch][i] += v;
                                totalsObj[row.branch][i] += v;
                            }
                            c.totalBalances[i] += v;
                            grandArr[i] += v;
                        }
                    };
                    
                    for (let i = 0; i < tb.length; i++) {
                        const row = tb[i];
                        const accCode = row.accCode;
                        
                        // Revenue Calculation
                        const isPrimaryRev = accCode.startsWith('4');
                        const isRevExcluded = revExclusions.includes(accCode);
                        if (isPrimaryRev && !isRevExcluded) {
                            revItems.push(row);
                            registerInBranchWise(row, revBranchWise, revTotals, revGrand);
                        }
                        
                        // Expense Calculation
                        const isPrimaryExp = accCode.startsWith('5') || accCode.startsWith('6');
                        const isAddedAsExp = incAsExp.includes(accCode);
                        const isExpExcluded = expExclusions.includes(accCode);
                        
                        if ((isPrimaryExp || isAddedAsExp) && !isExpExcluded) {
                            expItems.push(row);
                            registerInBranchWise(row, expBranchWise, expTotals, expGrand);
                        }
                    }

                    // Sort Items by Branch then by Account Code
                    const itemSorter = (a, b) => {
                        const branchComp = naturalSort(a.branch, b.branch);
                        if (branchComp !== 0) return branchComp;
                        return naturalSort(a.accCode, b.accCode);
                    };
                    revItems.sort(itemSorter);
                    expItems.sort(itemSorter);
                    
                    // Allocation (Using central expenses from S000)
                    const allocation = [];
                    const revTotalsCache = branches.map(b => revTotals[b]); // Cache for speed

                    for (let m = 0; m <= currentMonthIndex; m++) {
                        const monthlyAlloc = {};
                        let targetRevBase = 0;
                        for (let bIdx = 0; bIdx < branches.length; bIdx++) {
                            targetRevBase += revTotalsCache[bIdx][m];
                        }
                        if (targetRevBase === 0) targetRevBase = 1;
                        
                        for (let i = 0; i < expItems.length; i++) {
                            const exp = expItems[i];
                            if (exp.branch !== 'S000') continue;
                            
                            // Allocation Exclusion Check
                            if (allocExclusions.includes(exp.accCode)) continue;
                            
                            const amt = exp.balances[m];
                            if (amt === 0) continue;
                            
                            const key = `${exp.accCode}-${exp.groupName}`;
                            if (!monthlyAlloc[key]) {
                                monthlyAlloc[key] = { code: exp.accCode, name: exp.groupName || "ไม่ระบุชื่อ", monthIndex: m, total: 0, alloc: {} };
                                for (let j = 0; j < branches.length; j++) monthlyAlloc[key].alloc[branches[j]] = 0;
                            }
                            
                            const entry = monthlyAlloc[key];
                            // Last Branch Adjustment — ensures sum of alloc = total (no rounding error)
                            // Use last branch WITH revenue to avoid giving remainder to zero-revenue branches
                            let allocSum = 0;
                            for (let bIdx = 0; bIdx < branches.length - 1; bIdx++) {
                                const b = branches[bIdx];
                                const rev = revTotalsCache[bIdx][m];
                                const allocAmt = roundTo2((amt * rev) / targetRevBase);
                                entry.alloc[b] = roundTo2(entry.alloc[b] + allocAmt);
                                allocSum += allocAmt;
                            }
                            // Last branch with revenue gets remainder (not necessarily the last branch in array)
                            const branchesWithRev = branches.filter((b, i) => revTotalsCache[i][m] !== 0);
                            const lastB = branchesWithRev.length > 0
                                ? branchesWithRev[branchesWithRev.length - 1]
                                : branches[branches.length - 1];
                            entry.alloc[lastB] = roundTo2(entry.alloc[lastB] + roundTo2(amt - allocSum));
                            entry.total = roundTo2(entry.total + amt);
                            entry.tbName = exp.accName; // Preserve the (repaired) TB name
                        }
                        allocation.push(...Object.values(monthlyAlloc));
                    }
                    
                    // Sort branchWise by Account Code
                    const branchWiseSorter = (a, b) => naturalSort(a.accCode, b.accCode);
                    const sortedRevBranchWise = Object.values(revBranchWise).sort(branchWiseSorter);
                    const sortedExpBranchWise = Object.values(expBranchWise).sort(branchWiseSorter);

                    // Sort allocation by month then by account code
                    allocation.sort((a, b) => {
                        if (a.monthIndex !== b.monthIndex) return a.monthIndex - b.monthIndex;
                        return naturalSort(a.code, b.code);
                    });

                    return { 
                        tb, 
                        revenue: { items: revItems, totals: revTotals, grand: revGrand, branchWise: sortedRevBranchWise }, 
                        expenses: { items: expItems, totals: expTotals, grand: expGrand, branchWise: sortedExpBranchWise },
                        allocation,
                        missingMappings: missingMappings.sort((a,b) => naturalSort(a.code, b.code))
                    };
                } catch (e) {
                    console.error("Processing Error:", e);
                    setErrorWithAutoDismiss("ข้อผิดพลาดในการประมวลผลข้อมูล: " + e.message);
                    return { tb: [], revenue: { items: [], totals: emptyRevTotals, grand: Array(12).fill(0), branchWise: [] }, expenses: { items: [], totals: emptyExpTotals, grand: Array(12).fill(0), branchWise: [] }, allocation: [], missingMappings: [] };
                }
            }, [pastedData, branches, mappings, revExclusions, expExclusions, incAsExp, useRepair, currentMonthIndex]);

            // --- P&L Calculations ---
            const pnlCalculations = useMemo(() => {
                const keys = sortedBranches.concat(plCustomColumns.map(c => c.id));
                const results = { items: {}, topicTypeMapping: {}, totals: { revenue: {}, expense: {}, profit: {} } };
                
                // Initialize totals
                const initTotal = (obj) => { 
                    keys.forEach(k => obj[k] = 0); 
                    obj['GRAND_TOTAL'] = 0;
                };
                initTotal(results.totals.revenue);
                initTotal(results.totals.expense);
                initTotal(results.totals.profit);

                const visitedIds = new Set();
                const calculateRecursive = (item, type) => {
                    if (visitedIds.has(item.id)) return { direct: {}, allocated: {}, total: {} }; // cycle detected
                    visitedIds.add(item.id);
                    results.topicTypeMapping[item.id] = type;
                    const nodeResults = { direct: {}, allocated: {}, total: {} };
                    initTotal(nodeResults.direct);
                    initTotal(nodeResults.allocated);
                    initTotal(nodeResults.total);

                    // 1. Direct from Groups & Accounts
                    if ((item.groups && item.groups.length > 0) || (item.accounts && item.accounts.length > 0) || (item.accBranches && item.accBranches.length > 0)) {
                        const sourceBranchWise = (type === 'revenue' ? processedData.revenue.branchWise : processedData.expenses.branchWise);
                        // codes handled by accBranches — skip from groupName/account to avoid double-counting
                        const accBranchCodes = new Set((item.accBranches || []).map(e => e.code));
                        sourceBranchWise.forEach(bi => {
                            if (accBranchCodes.has(bi.accCode)) return; // handled by accBranches below
                            const matchGroup = item.groups && item.groups.includes(bi.groupName);
                            const matchAcc = item.accounts && item.accounts.includes(bi.accCode);
                            
                            if (matchGroup || matchAcc) {
                                sortedBranches.forEach(b => {
                                    // For expenses: skip S000 unless it's in allocExclusions (not allocated)
                                    if (type === 'expense' && b === 'S000' && !allocExclusions.includes(bi.accCode)) return;
                                    const raw = (bi.branchValues[b] ? bi.branchValues[b][currentMonthIndex] || 0 : 0);
                                    nodeResults.direct[b] += type === 'revenue' ? -raw : raw;
                                });
                            }
                        });

                        // accBranches: { code, branches[], exclude } — filter by specific branches
                        if (item.accBranches && item.accBranches.length > 0) {
                            item.accBranches.forEach(entry => {
                                const bi = sourceBranchWise.find(x => x.accCode === entry.code);
                                if (!bi) return;
                                let targetBranches;
                                if (entry.branches.length === 0) {
                                    targetBranches = sortedBranches; // ทุกสาขา
                                } else if (entry.exclude) {
                                    targetBranches = sortedBranches.filter(b => !entry.branches.includes(b)); // ยกเว้น
                                } else {
                                    targetBranches = entry.branches; // เฉพาะที่เลือก
                                }
                                targetBranches.forEach(b => {
                                    if (!sortedBranches.includes(b)) return;
                                    // Skip S000 for expenses unless in allocExclusions
                                    if (type === 'expense' && b === 'S000' && !allocExclusions.includes(entry.code)) return;
                                    const raw = (bi.branchValues[b] ? bi.branchValues[b][currentMonthIndex] || 0 : 0);
                                    nodeResults.direct[b] += type === 'revenue' ? -raw : raw;
                                });
                            });
                        }
                    }

                    // 2. Allocated from Groups (Only for Expenses)
                    if (type === 'expense') {

                        processedData.allocation.forEach(ai => {
                            if (ai.monthIndex !== currentMonthIndex) return;

                            // Match by groupName
                            const matchGroup = item.groups && item.groups.includes(ai.name);

                            // Match by accBranches code
                            const accEntry = !matchGroup && item.accBranches && item.accBranches.find(e => e.code === ai.code);

                            // Check if this ai.code has a specific accBranches override
                            const codeOverride = item.accBranches && item.accBranches.find(e => e.code === ai.code);

                            if (codeOverride) {
                                let targetBranches;
                                if (codeOverride.branches.length === 0) {
                                    targetBranches = sortedBranches;
                                } else if (codeOverride.exclude) {
                                    targetBranches = sortedBranches.filter(b => !codeOverride.branches.includes(b));
                                } else {
                                    targetBranches = codeOverride.branches;
                                }

                                targetBranches.forEach(b => {
                                    nodeResults.allocated[b] += (ai.alloc[b] || 0);
                                });
                            } else if (matchGroup) {
                                // No specific override — use all branches
                                sortedBranches.forEach(b => {
                                    nodeResults.allocated[b] += (ai.alloc[b] || 0);
                                });
                            } else if (accEntry) {
                                let targetBranches;
                                if (accEntry.branches.length === 0) {
                                    targetBranches = sortedBranches;
                                } else if (accEntry.exclude) {
                                    targetBranches = sortedBranches.filter(b => !accEntry.branches.includes(b));
                                } else {
                                    targetBranches = accEntry.branches;
                                }
                                targetBranches.forEach(b => {
                                    nodeResults.allocated[b] += (ai.alloc[b] || 0);
                                });
                            }
                        });
                    }

                    // 3. Children (Recursive support)
                    if (item.children && item.children.length > 0) {
                        item.children.forEach(child => {
                            const childRes = calculateRecursive(child, type);
                            sortedBranches.forEach(b => {
                                nodeResults.direct[b] += childRes.direct[b];
                                nodeResults.allocated[b] += childRes.allocated[b];
                            });
                        });
                    }
                    
                    // Legacy migration (one-time check if data was saved with 'lines')
                    if (item.lines && item.lines.length > 0) {
                        item.lines.forEach(line => {
                            const lineRes = calculateRecursive(line, type);
                            sortedBranches.forEach(b => {
                                nodeResults.direct[b] += lineRes.direct[b];
                                nodeResults.allocated[b] += lineRes.allocated[b];
                            });
                        });
                    }

                    // 4. Calculate Node Totals & Custom Columns
                    let branchSumDirect = 0;
                    let branchSumAlloc = 0;
                    sortedBranches.forEach(b => {
                        nodeResults.total[b] = roundTo2(nodeResults.direct[b] + nodeResults.allocated[b]);
                        branchSumDirect += nodeResults.direct[b];
                        branchSumAlloc += nodeResults.allocated[b];
                    });
                    nodeResults.direct['GRAND_TOTAL'] = roundTo2(branchSumDirect);
                    nodeResults.allocated['GRAND_TOTAL'] = roundTo2(branchSumAlloc);
                    nodeResults.total['GRAND_TOTAL'] = roundTo2(branchSumDirect + branchSumAlloc);

                    plCustomColumns.forEach(col => {
                        let dSum = 0, aSum = 0;
                        col.branches.forEach(b => {
                            dSum += nodeResults.direct[b];
                            aSum += nodeResults.allocated[b];
                        });
                        nodeResults.direct[col.id] = roundTo2(dSum);
                        nodeResults.allocated[col.id] = roundTo2(aSum);
                        nodeResults.total[col.id] = roundTo2(dSum + aSum);
                    });

                    results.items[item.id] = nodeResults;
                    return nodeResults;
                };

                plStructure.forEach(topic => {
                    if (topic.type === 'subtotal') return;
                    visitedIds.clear(); // reset per topic
                    const topicTotal = calculateRecursive(topic, topic.type);
                    keys.forEach(k => {
                        if (topic.type === 'revenue') results.totals.revenue[k] += topicTotal.total[k];
                        else results.totals.expense[k] += topicTotal.total[k];
                    });
                    if (topic.type === 'revenue') results.totals.revenue['GRAND_TOTAL'] += topicTotal.total['GRAND_TOTAL'];
                    else results.totals.expense['GRAND_TOTAL'] += topicTotal.total['GRAND_TOTAL'];
                });

                // Compute subtotal + profit rows
                const allKeys = keys.concat(['GRAND_TOTAL']);
                plCustomColumns.forEach(col => allKeys.push(col.id));
                plStructure.forEach(topic => {
                    if (topic.type !== 'subtotal' && topic.type !== 'profit') return;
                    const stResult = { total: {} };
                    allKeys.forEach(k => stResult.total[k] = 0);
                    (topic.sourceIds || []).forEach(entry => {
                        // support both old format (string) and new format ({id, sign})
                        const sid = typeof entry === 'string' ? entry : entry.id;
                        const sign = typeof entry === 'string' ? 1 : (entry.sign || 1);
                        const src = results.items[sid];
                        if (src) allKeys.forEach(k => stResult.total[k] = roundTo2(stResult.total[k] + sign * (src.total[k] || 0)));
                    });
                    results.items[topic.id] = stResult;
                });

                // Final Grand Totals
                const finalKeys = keys.concat(['GRAND_TOTAL']);
                finalKeys.forEach(k => {
                    results.totals.revenue[k] = roundTo2(results.totals.revenue[k]);
                    results.totals.expense[k] = roundTo2(results.totals.expense[k]);
                    results.totals.profit[k] = roundTo2(results.totals.revenue[k] - results.totals.expense[k]);
                });

                return results;
            }, [processedData, plStructure, plCustomColumns, sortedBranches, currentMonthIndex]);

            const deferredPlStructure = React.useDeferredValue(plStructure);
            const deferredProcessedData = React.useDeferredValue(processedData);

            // YTD calculations: compute totals for each month 0..currentMonthIndex
            const ytdCalculations = useMemo(() => {
                if (!ytdMode || activeTab !== 'pnl-report') return null;
                const months = [];
                for (let m = 0; m <= currentMonthIndex; m++) {
                    const keys = sortedBranches.concat(plCustomColumns.map(c => c.id));
                    const results = { items: {}, topicTypeMapping: {} };
                    const initTotal = (obj) => { keys.forEach(k => obj[k] = 0); obj['GRAND_TOTAL'] = 0; };

                    const calcRec = (item, type) => {
                        results.topicTypeMapping[item.id] = type;
                        const nr = { total: {} };
                        initTotal(nr.total);
                        const sourceBW = type === 'revenue' ? (processedData.revenue.branchWise || []) : (processedData.expenses.branchWise || []);
                        if ((item.groups && item.groups.length > 0) || (item.accounts && item.accounts.length > 0) || (item.accBranches && item.accBranches.length > 0)) {
                            const accBranchCodesYtd = new Set((item.accBranches || []).map(e => e.code));
                            sourceBW.forEach(bi => {
                                if (accBranchCodesYtd.has(bi.accCode)) return;
                                const match = (item.groups && item.groups.includes(bi.groupName)) || (item.accounts && item.accounts.includes(bi.accCode));
                                if (match) {
                                    sortedBranches.forEach(b => {
                                        if (type === 'expense' && b === 'S000' && !allocExclusions.includes(bi.accCode)) return;
                                        const raw = (bi.branchValues[b] ? bi.branchValues[b][m] || 0 : 0);
                                        nr.total[b] += type === 'revenue' ? -raw : raw;
                                    });
                                }
                            });
                            if (item.accBranches && item.accBranches.length > 0) {
                                item.accBranches.forEach(entry => {
                                    const bi = sourceBW.find(x => x.accCode === entry.code);
                                    if (!bi) return;
                                    let targetBranches;
                                    if (entry.branches.length === 0) {
                                        targetBranches = sortedBranches;
                                    } else if (entry.exclude) {
                                        targetBranches = sortedBranches.filter(b => !entry.branches.includes(b));
                                    } else {
                                        targetBranches = entry.branches;
                                    }
                                    targetBranches.forEach(b => {
                                        if (!sortedBranches.includes(b)) return;
                                        if (type === 'expense' && b === 'S000' && !allocExclusions.includes(entry.code)) return;
                                        const raw = (bi.branchValues[b] ? bi.branchValues[b][m] || 0 : 0);
                                        nr.total[b] += type === 'revenue' ? -raw : raw;
                                    });
                                });
                            }
                        }
                        if (type === 'expense') {
                            processedData.allocation.forEach(ai => {
                                if (ai.monthIndex !== m) return;
                                const matchGroup = item.groups && item.groups.includes(ai.name);
                                const codeOverrideYtd = item.accBranches && item.accBranches.find(e => e.code === ai.code);
                                const accEntryYtd = !matchGroup && !codeOverrideYtd && item.accBranches && item.accBranches.find(e => e.code === ai.code);
                                if (codeOverrideYtd) {
                                    let targetBranches;
                                    if (codeOverrideYtd.branches.length === 0) {
                                        targetBranches = sortedBranches;
                                    } else if (codeOverrideYtd.exclude) {
                                        targetBranches = sortedBranches.filter(b => !codeOverrideYtd.branches.includes(b));
                                    } else {
                                        targetBranches = codeOverrideYtd.branches;
                                    }
                                    targetBranches.forEach(b => { nr.total[b] += (ai.alloc[b] || 0); });
                                } else if (matchGroup) {
                                    sortedBranches.forEach(b => { nr.total[b] += (ai.alloc[b] || 0); });
                                } else if (accEntryYtd) {
                                    let targetBranches;
                                    if (accEntryYtd.branches.length === 0) {
                                        targetBranches = sortedBranches;
                                    } else if (accEntryYtd.exclude) {
                                        targetBranches = sortedBranches.filter(b => !accEntryYtd.branches.includes(b));
                                    } else {
                                        targetBranches = accEntryYtd.branches;
                                    }
                                    targetBranches.forEach(b => { nr.total[b] += (ai.alloc[b] || 0); });
                                }
                            });
                        }
                        const children = [...(item.children || []), ...(item.lines || [])];
                        children.forEach(child => {
                            const cr = calcRec(child, type);
                            sortedBranches.forEach(b => { nr.total[b] += cr.total[b]; });
                        });
                        let gt = 0;
                        sortedBranches.forEach(b => { nr.total[b] = roundTo2(nr.total[b]); gt += nr.total[b]; });
                        nr.total['GRAND_TOTAL'] = roundTo2(gt);
                        plCustomColumns.forEach(col => {
                            let s = 0; col.branches.forEach(b => { s += nr.total[b]; });
                            nr.total[col.id] = roundTo2(s);
                        });
                        results.items[item.id] = nr;
                        return nr;
                    };

                    plStructure.forEach(topic => { if (topic.type !== 'subtotal') calcRec(topic, topic.type); });

                    // subtotals + profit
                    const allKeys = keys.concat(['GRAND_TOTAL']);
                    plCustomColumns.forEach(col => { if (!allKeys.includes(col.id)) allKeys.push(col.id); });
                    plStructure.forEach(topic => {
                        if (topic.type !== 'subtotal' && topic.type !== 'profit') return;
                        const st = { total: {} };
                        allKeys.forEach(k => st.total[k] = 0);
                        (topic.sourceIds || []).forEach(entry => {
                            const sid = typeof entry === 'string' ? entry : entry.id;
                            const sign = typeof entry === 'string' ? 1 : (entry.sign || 1);
                            const src = results.items[sid];
                            if (src) allKeys.forEach(k => st.total[k] = roundTo2(st.total[k] + sign * (src.total[k] || 0)));
                        });
                        results.items[topic.id] = st;
                    });

                    months.push({ monthIndex: m, label: MONTHS[m], results });
                }
                return months;
            }, [ytdMode, activeTab, currentMonthIndex, processedData, plStructure, plCustomColumns, sortedBranches]);

            const handleMappingFileUpload = (e) => {

                        // 2. Parse + Sanitize rows
                        const incoming = [];

                        for (let i = 1; i < data.length; i++) {

                        // 3. Build preview with full item detail — ยังไม่ save
                        setMappings(prev => {
                            const existMap = {};

                            const merged = [...prev];
                            const addedItems = [];
                            const updatedItems = [];
                            incoming.forEach(item => {
                                if (existMap[item.code] !== undefined) {
                                    const old = prev[existMap[item.code]];
                                    updatedItems.push({ code: item.code, tbName: item.tbName, oldGroup: old.groupName, newGroup: item.groupName });
                                    merged[existMap[item.code]] = item;
                                } else {
                                    addedItems.push(item);
                                    merged.push(item);
                                }
                            });
                            setTimeout(() => setMappingPreview({ addedItems, updatedItems, skipped, merged, prev }), 0);
                            return prev; // ยังไม่บันทึก
                        });
                    } catch (err) {
                        setErrorWithAutoDismiss("Mapping Import Error: " + err.message);

                r.readAsArrayBuffer(f);
            };

            const isBranchInUse = (branchToCheck) => {
                if (plCustomColumns.some(c => c.branches.includes(branchToCheck))) return true;
                let inUse = false;
                const checkNode = (node) => {
                    if (node.accBranches && node.accBranches.some(ab => ab.branches && ab.branches.includes(branchToCheck))) inUse = true;
                    if (node.children) node.children.forEach(checkNode);
                    if (node.lines) node.lines.forEach(checkNode);
                };
                plStructure.forEach(checkNode);

            const isMappingInUse = (code, groupName) => {

                    if (node.children) node.children.forEach(checkNode);

            const filteredMappings = React.useMemo(() => {

            const handleSaveMappingEdit = (code) => {

            const confirmMappingImport = () => {

                showToast(`นำเข้าสำเร็จ! เพิ่มใหม่ ${mappingPreview.addedItems.length}, อัปเดต ${mappingPreview.updatedItems.length}${mappingPreview.skipped ? `, ข้ามแถวผิดรูปแบบ ${mappingPreview.skipped} แถว` : ''}`);
                setMappingPreview(null);
            };

            // --- Stable File Reader ---
            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                e.target.value = '';
                const doImport = () => {
                setIsProcessing(true);
                setError(null);
                
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const bytes = new Uint8Array(evt.target.result);
                        const isZip = bytes[0] === 0x50 && bytes[1] === 0x4B;
                        const isCFB = bytes[0] === 0xD0 && bytes[1] === 0xCF;
                        const isU16 = bytes[0] === 0xFF && bytes[1] === 0xFE;
                        const isBinary = isZip || isCFB;

                        let text = "";
                        if (isBinary) {
                            // .xlsx / .xls — SheetJS handles it, output UTF-8 via sheet_to_csv
                            const wb = XLSX.read(bytes, { type: 'array' });
                            if (wb.SheetNames.length > 0) {
                                const ws = wb.Sheets[wb.SheetNames[0]];
                                text = XLSX.utils.sheet_to_csv(ws, { FS: '\t' });
                            } else { throw new Error("ไฟล์ Excel ไม่มีแผ่นข้อมูล"); }
                        } else if (isU16) {
                            // UTF-16 LE — try SheetJS first, fallback to TextDecoder
                            try {
                                const wb = XLSX.read(bytes, { type: 'array' });
                                if (wb.SheetNames.length > 0) {
                                    text = XLSX.utils.sheet_to_csv(wb.Sheets[wb.SheetNames[0]], { FS: '\t' });
                                }
                            } catch(_) {}
                            if (!text.trim()) {
                                text = new TextDecoder("utf-16le").decode(bytes);
                                text = text.replace(/\0/g, '').replace(/^\uFEFF/, '');
                            }
                        } else {
                            // Plain text UTF-8 / TIS-620
                            text = new TextDecoder("utf-8").decode(bytes);
                            text = text.replace(/^\uFEFF/, '');
                            let sign = 0;
                            for (let i = 0; i < Math.min(bytes.length, 500); i++) if (bytes[i] > 160) sign++;
                            if (sign > 5) text = new TextDecoder("windows-874").decode(bytes);
                        }

                        if (text.trim()) {
                            setLocalPastedData(text);
                            setImportedAt(new Date());
                            // ตรวจหาสาขาใน TB ที่ยังไม่มีใน settings
                            const foundBranches = new Set();
                            const branchPattern = new RegExp('\\b(S\\d+(?:-\\d+)*)\\b', 'gi');
                            text.split('\n').forEach(line => {
                                const cols = line.split('\t');
                                if (!cols[0]) return;
                                const matches = cols[0].match(branchPattern);
                                if (matches) matches.forEach(b => foundBranches.add(b.toUpperCase()));
                            });
                            const currentBranches = new Set(branches.map(b => b.toUpperCase()));
                            const unknown = [...foundBranches].filter(b => !currentBranches.has(b)).sort();
                            if (unknown.length > 0) setNewBranchesFound(unknown);
                            // ไม่เด้งหน้า — รอให้ user กดปุ่มประมวลผลเอง
                        } else { throw new Error("ไม่พบข้อมูลที่อ่านได้ในไฟล์นี้"); }
                    } catch (err) {
                        setErrorWithAutoDismiss("อ่านไฟล์ไม่สำเร็จ: " + err.message);
                    } finally { setIsProcessing(false); }
                };
                reader.readAsArrayBuffer(file);
                }; // end doImport
                if (pastedData) {
                    showConfirm('Import ไฟล์ใหม่จะทับข้อมูล TB ที่มีอยู่ทั้งหมด แน่ใจไหมครับ?', doImport);
