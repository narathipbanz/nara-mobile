            // ---- Cost Center Tab Component (needs hooks) ----
            const CostCenterTab = ({ departments, processedData, currentMonthIndex, sortedBranches, handleExportCostCenter, allocExclusions }) => {
                const deptMap = {};
                departments.forEach(d => { deptMap[d.code] = d.name; });
                // fmtN / clsN → global
                const [expandedDepts, setExpandedDepts] = React.useState(new Set());
                const [ccDrillModal, setCcDrillModal] = React.useState(null);
                const [ccSearch, setCcSearch] = React.useState('');
                const [ccSortCol, setCcSortCol] = React.useState(null); // null | 'direct' | 'alloc' | 'total'
                const [ccSortDir, setCcSortDir] = React.useState('desc');
                const [ccFilterDept, setCcFilterDept] = React.useState('');
                const toggleDept = dc => setExpandedDepts(prev => { const n = new Set(prev); n.has(dc) ? n.delete(dc) : n.add(dc); return n; });

                const handleCcSort = (col) => {
                    if (ccSortCol === col) setCcSortDir(d => d === 'desc' ? 'asc' : 'desc');
                    else { setCcSortCol(col); setCcSortDir('desc'); }
                };
                const CcSortIcon = ({col}) => {
                    if (ccSortCol !== col) return <Icon name="chevrons-up-down" size={10} className="ml-1 opacity-30"/>;
                    return ccSortDir === 'desc' ? <Icon name="chevron-down" size={10} className="ml-1 text-cyan-400"/> : <Icon name="chevron-up" size={10} className="ml-1 text-cyan-400"/>;
                };

                // Build deptData from expenses.items (raw rows — each has correct deptCode + branch)
                // Direct = branch !== S000
                // Allocated = from processedData.allocation (S000 split) → no dept info → unalloc
                const deptData = {}; // deptCode -> { groups:{groupName->{direct,alloc,rows:[]}}, directTotal, allocTotal }
                const unalloc = { groups:{}, directTotal:0, allocTotal:0 };

                (processedData.expenses.items || []).forEach(row => {
                    // S000: only include if in allocExclusions (not pansuan) — others handled via allocation below
                    if (row.branch === 'S000' && !allocExclusions.includes(row.accCode)) return;
                    const amt = row.balances[currentMonthIndex] || 0;
                    if (amt === 0) return;
                    const dc = row.deptCode || '';
                    const grp = row.groupName || row.accCode;
                    const target = dc
                        ? (deptData[dc] = deptData[dc] || {groups:{}, directTotal:0, allocTotal:0})
                        : unalloc;
                    if (!target.groups[grp]) target.groups[grp] = {direct:0, alloc:0, rows:[]};
                    target.groups[grp].direct = roundTo2(target.groups[grp].direct + amt);
                    target.groups[grp].rows.push({ code: row.accCode, name: row.accName, groupName: row.groupName || grp, branch: row.branch, amt });
                    target.directTotal = roundTo2(target.directTotal + amt);
                });

                // Allocated from S000 pansuan — lookup deptCode from expenses.items by accCode
                // Build accCode -> deptCode map from expenses.items for fast lookup
                const accToDept = {};
                (processedData.expenses.items || []).forEach(row => {
                    if (row.deptCode) accToDept[row.accCode] = row.deptCode;
                });

                (processedData.allocation || []).filter(ai => ai.monthIndex === currentMonthIndex).forEach(ai => {
                    const amt = roundTo2(sortedBranches.reduce((s, b) => s + (ai.alloc[b] || 0), 0));
                    if (amt === 0) return;
                    const grp = ai.name || ai.code;
                    // lookup deptCode via accCode — try exact match first, then base code (without dept suffix)
                    const dc = accToDept[ai.code] || accToDept[ai.code.split('-')[0]] || '';
                    const target = dc
                        ? (deptData[dc] = deptData[dc] || {groups:{}, directTotal:0, allocTotal:0})
                        : unalloc;
                    if (!target.groups[grp]) target.groups[grp] = {direct:0, alloc:0, rows:[]};
                    target.groups[grp].alloc = roundTo2(target.groups[grp].alloc + amt);
                    target.allocTotal = roundTo2(target.allocTotal + amt);
                });

                const allDeptCodes = Object.keys(deptData).sort();
                const missingDepts = allDeptCodes.filter(dc => !deptMap[dc]);

                // Apply search + filter + sort to dept list
                const ccSearchLower = ccSearch.toLowerCase();
                const filteredDeptCodes = allDeptCodes.filter(dc => {
                    if (ccFilterDept && dc !== ccFilterDept) return false;
                    if (!ccSearch) return true;
                    const label = deptMap[dc] || dc;
                    if (label.toLowerCase().includes(ccSearchLower) || dc.includes(ccSearchLower)) return true;
                    // Also search group names inside dept
                    return Object.keys(deptData[dc].groups).some(grp => grp.toLowerCase().includes(ccSearchLower));
                });
                const showUnalloc = (unalloc.directTotal !== 0 || unalloc.allocTotal !== 0) &&
                    (!ccFilterDept || ccFilterDept === '__unalloc') &&
                    (!ccSearch || 'ไม่ระบุแผนก'.includes(ccSearchLower) || Object.keys(unalloc.groups).some(g => g.toLowerCase().includes(ccSearchLower)));

                const sortedDeptCodes = [...filteredDeptCodes].sort((a, b) => {
                    if (!ccSortCol) return a.localeCompare(b);
                    const aData = deptData[a], bData = deptData[b];
                    const aVal = ccSortCol === 'direct' ? aData.directTotal : ccSortCol === 'alloc' ? aData.allocTotal : roundTo2(aData.directTotal + aData.allocTotal);
                    const bVal = ccSortCol === 'direct' ? bData.directTotal : ccSortCol === 'alloc' ? bData.allocTotal : roundTo2(bData.directTotal + bData.allocTotal);
                    return ccSortDir === 'desc' ? bVal - aVal : aVal - bVal;
                });
                const hasFilter = ccSearch || ccFilterDept || ccSortCol;
                const grandDirect = roundTo2(allDeptCodes.reduce((s,dc) => s + deptData[dc].directTotal, 0) + unalloc.directTotal);
                const grandAlloc  = roundTo2(allDeptCodes.reduce((s,dc) => s + deptData[dc].allocTotal,  0) + unalloc.allocTotal);
                const grandTotal  = roundTo2(grandDirect + grandAlloc);

                const renderDeptRow = (dc, data, label) => {
                    const isExp = expandedDepts.has(dc);
                    const total = roundTo2(data.directTotal + data.allocTotal);
                    const groups = Object.entries(data.groups).sort((a,b) => a[0].localeCompare(b[0]));
                    return (
                        <React.Fragment key={dc}>
                            <tr className="bg-slate-900/80 cursor-pointer hover:bg-slate-800/80 transition-colors" onClick={() => toggleDept(dc)}>
                                <td className="px-8 py-5 border-l-4 border-indigo-500">
                                    <div className="flex items-center gap-3">
                                        <div className={`transition-transform duration-200 ${isExp ? 'rotate-90' : ''}`}><Icon name="chevron-right" size={14} className="text-indigo-400"/></div>
                                        <div>
                                            <div className="font-black text-white text-sm">{label}</div>
                                            {dc !== '__unalloc' && <div className="text-slate-500 text-[10px] font-mono">{dc}</div>}
                                        </div>
                                    </div>
                                </td>
                                <td className={`px-8 py-5 text-right font-mono font-black ${clsN(data.directTotal)}`}>{fmtN(data.directTotal)}</td>
                                <td className={`px-8 py-5 text-right font-mono font-black ${clsN(data.allocTotal)}`}>{fmtN(data.allocTotal)}</td>
                                <td className={`px-8 py-5 text-right font-mono font-black bg-indigo-500/5 ${total < 0 ? 'text-red-400' : 'text-indigo-300'}`}>{fmtN(total)}</td>
                            </tr>
                            {isExp && groups.map(([grp, vals]) => (
                                <tr key={grp} className="hover:bg-white/5 transition-colors border-b border-white/5">
                                    <td className="pl-20 pr-8 py-4 text-slate-300 text-xs font-bold">{grp}</td>
                                    <td className={`px-8 py-4 text-right font-mono text-xs cursor-pointer hover:underline ${clsN(vals.direct)}`}
                                        onClick={e => { e.stopPropagation(); vals.direct !== 0 && setCcDrillModal({deptCode: dc, groupName: grp, type:'direct'}); }}>
                                        {vals.direct !== 0 ? fmtN(vals.direct) : <span className="text-slate-700">-</span>}
                                    </td>
                                    <td className={`px-8 py-4 text-right font-mono text-xs cursor-pointer hover:underline ${clsN(vals.alloc)}`}
                                        onClick={e => { e.stopPropagation(); vals.alloc !== 0 && setCcDrillModal({deptCode: dc, groupName: grp, type:'alloc'}); }}>
                                        {vals.alloc !== 0 ? fmtN(vals.alloc) : <span className="text-slate-700">-</span>}
                                    </td>
                                    <td className={`px-8 py-4 text-right font-mono text-xs font-black bg-indigo-500/5 ${clsN(roundTo2(vals.direct+vals.alloc))}`}>{fmtN(roundTo2(vals.direct+vals.alloc))}</td>
                                </tr>
                            ))}
                        </React.Fragment>
                    );
                };

                const getDrillRows = (modal) => {
                    if (!modal) return [];
                    if (modal.type === 'direct') {
                        // Use rows stored per group during build — exact match deptCode+groupName
                        const targetData = modal.deptCode === '__unalloc' ? unalloc : deptData[modal.deptCode];
                        if (!targetData || !targetData.groups[modal.groupName]) return [];
                        // Aggregate by accCode+branch into per-accCode rows
                        const rowMap = {};
                        targetData.groups[modal.groupName].rows.forEach(r => {
                            if (!rowMap[r.code]) rowMap[r.code] = { code: r.code, name: r.name, branchVals: {}, total: 0 };
                            rowMap[r.code].branchVals[r.branch] = roundTo2((rowMap[r.code].branchVals[r.branch] || 0) + r.amt);
                            rowMap[r.code].total = roundTo2(rowMap[r.code].total + r.amt);
                        });
                        return Object.values(rowMap).filter(r => r.total !== 0).sort((a,b) => a.code.localeCompare(b.code));
                    } else {
                        // Build accCode -> accName map for display
                        const accToName = {};
                        (processedData.expenses.items || []).forEach(r => { if (!accToName[r.accCode]) accToName[r.accCode] = r.accName; });
                        return (processedData.allocation || [])
                            .filter(ai => {
                                if (ai.monthIndex !== currentMonthIndex) return false;
                                if ((ai.name || ai.code) !== modal.groupName) return false;
                                const dc = accToDept[ai.code] || accToDept[ai.code.split('-')[0]] || '';
                                if (modal.deptCode === '__unalloc') return dc === '';
                                return dc === modal.deptCode;
                            })
                            .map(ai => {
                                const branchVals = {};
                                sortedBranches.forEach(b => { branchVals[b] = ai.alloc[b] || 0; });
                                return {
                                    code: ai.code,
                                    name: accToName[ai.code] || accToName[ai.code.split('-')[0]] || ai.tbName || ai.name,
                                    groupName: ai.name,
                                    branchVals,
                                    total: roundTo2(Object.values(branchVals).reduce((s,v)=>s+v,0))
                                };
                            }).filter(r => r.total !== 0);
                    }
                };

                return (
                    <div className="space-y-8 animate-in">
                        {missingDepts.length > 0 && (
                            <div className="glass rounded-[2rem] p-8 border border-orange-500/30 bg-orange-500/[0.03] flex items-start gap-6">
                                <div className="p-3 bg-orange-500/20 rounded-2xl text-orange-400 shrink-0"><Icon name="alert-triangle" size={22}/></div>
                                <div>
                                    <p className="text-sm font-black text-white mb-1">พบรหัสแผนกที่ยังไม่ได้ตั้งชื่อ {missingDepts.length} รายการ</p>
                                    <p className="text-xs text-slate-400 font-bold mb-2">กรุณาไปเพิ่มในหน้าตั้งค่า: <span className="text-orange-300 font-mono">{missingDepts.join(', ')}</span></p>
                                </div>
                            </div>
                        )}
                        <div className="glass rounded-[3rem] overflow-hidden shadow-2xl">
                            <div className="px-10 py-8 border-b border-white/5 bg-white/5 flex flex-col gap-4">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h3 className="text-2xl font-black text-white uppercase tracking-tight font-display">รายงานต้นทุนต่อแผนก (Cost Center)</h3>
                                        <p className="text-slate-500 text-xs font-bold mt-1">ประจำเดือน: {MONTHS[currentMonthIndex]} · คลิก [▶] ขยายดูหมวดบัญชี · คลิกตัวเลขเพื่อดูรายละเอียด</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className="bg-cyan-500/10 text-cyan-400 px-4 py-2 rounded-full text-[10px] font-black border border-cyan-500/20">{sortedDeptCodes.length + (showUnalloc ? 1 : 0)} แผนก</span>
                                        <button onClick={handleExportCostCenter} className="bg-emerald-500 text-slate-900 px-6 py-3 rounded-2xl font-black text-xs hover:-translate-y-1 transition-all flex items-center gap-2">
                                            <Icon name="file-spreadsheet" size={14}/> EXPORT EXCEL
                                        </button>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-3">
                                    <div className="relative flex-1 min-w-[220px]">
                                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" size={14}/>
                                        <SearchInput value={ccSearch} onChange={e=>setCcSearch(e.target.value)} className="w-full bg-[#0d1321] border border-white/10 rounded-2xl pl-12 pr-4 py-3 text-xs font-bold outline-none focus:ring-2 focus:ring-cyan-500/50 text-white" placeholder="ค้นหาชื่อแผนก หรือหมวดบัญชี..."/>
                                    </div>
                                    <select value={ccFilterDept} onChange={e=>setCcFilterDept(e.target.value)} className="bg-[#0d1321] border border-white/10 rounded-2xl px-4 py-3 text-xs font-black text-slate-300 outline-none cursor-pointer focus:ring-2 focus:ring-cyan-500/50">
                                        <option value="">ทุกแผนก</option>
                                        {allDeptCodes.map(dc => <option key={dc} value={dc}>{deptMap[dc] ? dc+' - '+deptMap[dc] : dc}</option>)}
                                        {(unalloc.directTotal !== 0 || unalloc.allocTotal !== 0) && <option value="__unalloc">ไม่ระบุแผนก</option>}
                                    </select>
                                    {hasFilter && (
                                        <button onClick={()=>{setCcSearch('');setCcFilterDept('');setCcSortCol(null);setCcSortDir('desc');}} className="px-4 py-2 bg-white/5 rounded-xl text-[10px] font-black text-slate-400 hover:text-white flex items-center gap-1 border border-white/10 transition-all">
                                            <Icon name="x" size={10}/> ล้างตัวกรอง
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div style={{overflow:"auto",maxHeight:"calc(100vh - 240px)"}}>
                                <table className="w-full text-sm" style={{borderCollapse:"separate",borderSpacing:0}}>
                                    <thead className="bg-[#0d1321] text-slate-500 text-[10px] font-black uppercase tracking-widest sticky top-0 z-10">
                                        <tr>
                                            <th className="px-8 py-5 text-left min-w-[300px]">แผนก / หมวดบัญชี</th>
                                            <th className="px-8 py-5 text-right min-w-[150px] text-emerald-400 cursor-pointer hover:text-emerald-300 select-none" onClick={()=>handleCcSort('direct')}><span className="flex items-center justify-end">ทางตรง (Direct)<CcSortIcon col="direct"/></span></th>
                                            <th className="px-8 py-5 text-right min-w-[150px] text-orange-400 cursor-pointer hover:text-orange-300 select-none" onClick={()=>handleCcSort('alloc')}><span className="flex items-center justify-end">ปันส่วน (Alloc)<CcSortIcon col="alloc"/></span></th>
                                            <th className="px-8 py-5 text-right min-w-[150px] text-indigo-400 bg-indigo-500/10 cursor-pointer hover:text-indigo-300 select-none" onClick={()=>handleCcSort('total')}><span className="flex items-center justify-end">รวม<CcSortIcon col="total"/></span></th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {sortedDeptCodes.length === 0 && !showUnalloc ? (
                                            <tr><td colSpan={4} className="py-24"><div className="flex flex-col items-center justify-center text-center animate-in fade-in zoom-in-95 duration-300"><div className="w-20 h-20 bg-[#0d1321] rounded-full flex items-center justify-center mb-5 border border-white/5 shadow-inner"><Icon name="search-x" size={32} className="text-slate-500"/></div><h3 className="text-lg font-black text-white mb-2 tracking-wide">ไม่พบรายการที่ตรงกับเงื่อนไข</h3><p className="text-xs text-slate-400 font-bold max-w-sm mb-6 leading-relaxed">ลองเปลี่ยนคำค้นหา หรือล้างตัวกรองเพื่อดูข้อมูลทั้งหมด</p><button onClick={()=>setCcSearch('')} className="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 hover:bg-indigo-500 hover:text-white px-6 py-3 rounded-xl font-black transition-all flex items-center gap-2"><Icon name="refresh-ccw" size={16}/> ล้างตัวกรองและดูทั้งหมด</button></div></td></tr>
                                        ) : (<>
                                            {sortedDeptCodes.map(dc => renderDeptRow(dc, deptData[dc], deptMap[dc] || dc))}
                                            {showUnalloc && renderDeptRow('__unalloc', unalloc, 'ไม่ระบุแผนก')}
                                        </>)}
                                    </tbody>
                                    <tfoot className="bg-slate-900/90 border-t-2 border-white/10" style={{position:"sticky",bottom:0,zIndex:20}}>
                                        <tr>
                                            <td className="px-8 py-5 font-black text-white uppercase tracking-widest text-xs">รวมทั้งหมด</td>
                                            <td className={`px-8 py-5 text-right font-mono font-black ${clsN(grandDirect)}`}>{fmtN(grandDirect)}</td>
                                            <td className={`px-8 py-5 text-right font-mono font-black ${clsN(grandAlloc)}`}>{fmtN(grandAlloc)}</td>
                                            <td className={`px-8 py-5 text-right font-mono font-black bg-indigo-500/10 ${grandTotal < 0 ? 'text-red-400' : 'text-indigo-300'}`}>{fmtN(grandTotal)}</td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                        </div>
                        {ccDrillModal && <CcDrillPanel key={JSON.stringify(ccDrillModal)} modal={ccDrillModal} onClose={setCcDrillModal} deptMap={deptMap} getDrillRows={getDrillRows} sortedBranches={sortedBranches} currentMonthIndex={currentMonthIndex} MONTHS={MONTHS} fmtN={fmtN} clsN={clsN} />}
                    </div>
                );
            };

            const CcDrillPanel = ({ modal, onClose, deptMap, getDrillRows, sortedBranches, currentMonthIndex, MONTHS, fmtN, clsN }) => {
                const [isClosing, setIsClosing] = React.useState(false);
                const rows = getDrillRows(modal);
                const dLabel = modal.deptCode === '__unalloc' ? 'ไม่ระบุแผนก' : (deptMap[modal.deptCode] || modal.deptCode);
                const handleClose = React.useCallback(() => {
                    setIsClosing(true);
                    setTimeout(() => onClose(null), 240);
                }, [onClose]);
                React.useEffect(() => {
                    const handler = (e) => { if (e.key === 'Escape') handleClose(); };
                    document.addEventListener('keydown', handler);
                    return () => document.removeEventListener('keydown', handler);
                }, [handleClose]);
                return (
                    <div className={`fixed inset-0 z-50 flex flex-col bg-[#080c14] overflow-hidden ${isClosing ? 'panel-closing' : 'panel-slide'}`}>
                        <div className="flex items-center justify-between px-10 py-5 border-b border-white/10 bg-indigo-500/10 flex-shrink-0">
                            <div>
                                <p className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-1">{dLabel} · {modal.type === 'direct' ? 'ต้นทุนทางตรง' : 'ต้นทุนปันส่วน'} · {MONTHS[currentMonthIndex]}</p>
                                <h2 className="text-2xl font-black text-white">{modal.groupName}</h2>
                            </div>
                            <button onClick={handleClose} className="p-4 hover:bg-white/10 rounded-2xl transition-all text-slate-400 hover:text-white flex items-center gap-2 border border-white/10">
                                <Icon name="x" size={20}/><span className="text-sm font-black">ปิด</span>
                            </button>
                        </div>
                        <div className="flex-1 overflow-auto">
                            {rows.length === 0 ? (
                                <div className="flex items-center justify-center h-full text-slate-500 font-bold">ไม่พบรายการ</div>
                            ) : (
                                <table className="w-full text-sm">
                                    <thead className="bg-[#161d2b] text-slate-400 font-black uppercase tracking-widest sticky top-0 z-10">
                                        <tr>
                                            <th className="px-8 py-5 text-left border-b border-white/10" style={{minWidth:'140px'}}>รหัสบัญชี</th>
                                            <th className="px-8 py-5 text-left border-b border-white/10" style={{minWidth:'260px'}}>ชื่อบัญชี</th>
                                            <th className="px-8 py-5 text-left border-b border-white/10" style={{minWidth:'180px'}}>กลุ่มบัญชี</th>
                                            {sortedBranches.filter(b => b !== 'S000').map(b => <th key={b} className="px-8 py-5 text-right border-b border-white/10" style={{minWidth:'140px'}}>{b}</th>)}
                                            <th className="px-8 py-5 text-right bg-indigo-500/10 text-indigo-400 border-b border-indigo-500/20" style={{minWidth:'150px'}}>รวม</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {rows.map((row, i) => (
                                            <tr key={i} className="hover:bg-white/5 transition-colors">
                                                <td className="px-8 py-5 font-mono font-black text-slate-300">{row.code}</td>
                                                <td className="px-8 py-5 font-bold text-white">{row.name}</td>
                                                <td className="px-8 py-5"><span className="bg-indigo-500/10 text-indigo-300 px-3 py-1 rounded-full text-xs font-bold">{row.groupName || '-'}</span></td>
                                                {sortedBranches.filter(b => b !== 'S000').map(b => (
                                                    <td key={b} className={`px-8 py-5 text-right font-mono ${clsN(row.branchVals[b] || 0)}`}>{row.branchVals[b] ? fmtN(row.branchVals[b]) : <span className="text-slate-700">-</span>}</td>
                                                ))}
                                                <td className={`px-8 py-5 text-right font-mono font-black bg-indigo-500/5 ${clsN(row.total)}`}>{fmtN(row.total)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                );
            };
            // ---- End CostCenterTab ----

            // ---- TB View Tab Component ----
            const TbViewTab = ({ processedData, currentMonthIndex, sortedBranches, PAGE_SIZE, handleExportRevenueExcel, MONTHS, roundTo2 }) => {
                const [search, setSearch] = React.useState('');
                const [sortCol, setSortCol] = React.useState(null);
                const [sortDir, setSortDir] = React.useState('desc');
                const [filterBranch, setFilterBranch] = React.useState('');
                const [filterGroup, setFilterGroup] = React.useState('');
                const [page, setPage] = React.useState(1);

                const allGroups = [...new Set((processedData.revenue.items||[]).map(r => r.groupName).filter(Boolean))].sort();
                const allBranches = [...new Set((processedData.revenue.items||[]).map(r => r.branch))].sort();

                const handleSort = (col) => {
                    if (sortCol === col) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
                    else { setSortCol(col); setSortDir('desc'); }
                    setPage(1);
                };

                const filtered = (processedData.revenue.items||[]).filter(r => {
                    const s = search.toLowerCase();
                    const matchSearch = !search || r.accCode.toLowerCase().includes(s) || r.accName.toLowerCase().includes(s) || r.groupName.toLowerCase().includes(s) || r.branch.toLowerCase().includes(s);
                    const matchBranch = !filterBranch || r.branch === filterBranch;
                    const matchGroup = !filterGroup || r.groupName === filterGroup;
                    return matchSearch && matchBranch && matchGroup;
                });

                const sorted = [...filtered].sort((a, b) => {
                    if (sortCol === null) return 0;
                    if (typeof sortCol === 'number') {
                        const aVal = a.balances[sortCol]||0, bVal = b.balances[sortCol]||0;
                        return sortDir === 'desc' ? bVal - aVal : aVal - bVal;
                    }
                    return sortDir === 'desc' ? b.branch.localeCompare(a.branch) : a.branch.localeCompare(b.branch);
                });

                const sliced = sorted.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
                // fmtN → global
                const hasFilter = search || filterBranch || filterGroup || sortCol !== null;

                const SortIcon = ({col}) => {
                    if (sortCol !== col) return <Icon name="chevrons-up-down" size={10} className="ml-1 opacity-30"/>;
                    return sortDir === 'desc' ? <Icon name="chevron-down" size={10} className="ml-1 text-emerald-400"/> : <Icon name="chevron-up" size={10} className="ml-1 text-emerald-400"/>;
                };

                return (
                    <div className="glass rounded-[3.5rem] overflow-hidden shadow-2xl">
                        <div className="px-10 py-8 border-b border-white/5 bg-white/5 flex flex-col gap-4">
                            <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                <h3 className="text-xl font-black text-white uppercase tracking-tight font-display shrink-0">สรุปฐานรายได้</h3>
                                <div className="flex items-center gap-4 shrink-0">
                                    <button onClick={handleExportRevenueExcel} disabled={!pastedData} className={`text-[10px] font-black text-emerald-400 hover:text-white flex items-center gap-2 transition-colors uppercase tracking-widest ${!pastedData ? 'opacity-40 cursor-not-allowed' : ''}`}>
                                        <Icon name="file-spreadsheet" size={14}/> EXPORT EXCEL
                                    </button>
                                    <span className="bg-emerald-500/10 text-emerald-400 px-5 py-2 rounded-full text-[10px] font-black border border-emerald-500/20">{filtered.length} จาก {processedData.revenue.items.length} รายการ</span>
                                </div>
                            </div>
                            <div className="flex flex-wrap gap-3">

                React.useEffect(() => {
                    confirmRef.current?.focus();
                    const handler = (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            confirmModal.onOk();
                            setConfirmModal(null);
                        }
                        if (e.key === 'Escape') {
                            e.preventDefault();
                            setConfirmModal(null);
                        }
                        // Tab trap — วน focus ระหว่าง cancel และ confirm
                        if (e.key === 'Tab') {
                            const els = [cancelRef.current, confirmRef.current].filter(Boolean);
                            const idx = els.indexOf(document.activeElement);
                            e.preventDefault();
                            const next = e.shiftKey ? (idx - 1 + els.length) % els.length : (idx + 1) % els.length;
                            els[next]?.focus();
                        }
                    };
                    document.addEventListener('keydown', handler);
                    return () => document.removeEventListener('keydown', handler);
                }, []);

                            <div style={{display:'flex',alignItems:'flex-start',gap:16,marginBottom:24}}>
                                <div style={{padding:10,borderRadius:14,background:'var(--red-l)',color:'var(--red)',flexShrink:0}}>
                                    <Icon name="alert-triangle" size={20}/>
                                </div>
                                <div>
                                    <div style={{fontSize:15,fontWeight:800,color:'#ffffff',marginBottom:6}}>ยืนยันการดำเนินการ</div>
                                    <div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.8)',lineHeight:1.6}}>{confirmModal.msg}</div>
                                </div>
                            </div>
                            <div style={{display:'flex',gap:10,justifyContent:'flex-end'}}>
                                <button ref={cancelRef} onClick={()=>setConfirmModal(null)}
                                    className="text-white"
                                    style={{padding:'10px 22px',borderRadius:14,border:'1px solid var(--border)',background:'var(--surface2)',color:'#ffffff !important',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                                    ยกเลิก (ESC)
                                </button>
                                <button ref={confirmRef} onClick={()=>{confirmModal.onOk();setConfirmModal(null);}}
                                    style={{padding:'10px 22px',borderRadius:14,border:'none',background:'var(--red)',color:'#fff',fontSize:13,fontWeight:800,cursor:'pointer',boxShadow:'0 4px 16px rgba(239,68,68,0.35)'}}>
                                    ยืนยัน (Enter)
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- UI Components ---
            // ----------------------------------------------------------------
            // PIN Modal
            // ----------------------------------------------------------------
            const PinModal = React.memo(({ show, action, settingsPin, onSuccess, onClose, onChangePin }) => {
                const [localPin, setLocalPin] = React.useState('');
                const [localNewPin, setLocalNewPin] = React.useState('');
                const [error, setError] = React.useState(false);
                const [isClosing, setIsClosing] = React.useState(false);
                const modalRef = React.useRef(null);

                React.useEffect(() => {
                    if (show) { setLocalPin(''); setLocalNewPin(''); setError(false); setIsClosing(false); }
                }, [show]);

                // Tab trap
                React.useEffect(() => {
                    if (!show) return;
                    const trapTab = (e) => {
                        if (e.key !== 'Tab' || !modalRef.current) return;
                        const focusable = modalRef.current.querySelectorAll('input, button, select, textarea, [tabindex]:not([tabindex="-1"])');
                        const els = Array.from(focusable);
                        if (!els.length) return;
                        const first = els[0], last = els[els.length - 1];
                        if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
                        else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
                    };
                    document.addEventListener('keydown', trapTab);
                    return () => document.removeEventListener('keydown', trapTab);
                }, [show]);

                const handleClose = React.useCallback(() => {
                    setIsClosing(true);
                    setTimeout(() => onClose(), 220);
                }, [onClose]);

                if (!show) return null;

                const handleSubmit = () => {
                    if (action === 'unlock') {
                        if (localPin === settingsPin) {
                            onSuccess();
                            setLocalPin('');
                            setError(false);
                        } else {
                            setError(true);
                            setLocalPin('');
                        }
                    } else if (action === 'change') {
                        if (localPin === settingsPin) {
                            if (localNewPin.length >= 4) {
                                onChangePin(localNewPin);
                                setLocalPin(''); setLocalNewPin(''); setError(false);
                            } else { setError(true); }
                        } else { setError(true); setLocalPin(''); }
                    }
                };

                return (
                    <div className={`fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm ${isClosing ? 'backdrop-hiding' : ''}`}
                        style={{animation: isClosing ? undefined : 'backdropShow 0.22s ease forwards'}}>
                        <div ref={modalRef} className={`glass rounded-[2rem] p-10 w-full max-w-sm space-y-6 border border-white/10 ${isClosing ? 'modal-closing' : 'modal-spring'}`}
                            onClick={e => e.stopPropagation()}>
                            <div className="text-center">
                                <div className="flex justify-center mb-4 text-indigo-400"><Icon name="lock" size={40}/></div>
                                <h2 className="text-xl font-black text-white uppercase tracking-widest">
                                    {action === 'change' ? 'เปลี่ยน PIN' : 'ใส่ PIN เพื่อเข้าตั้งค่า'}
                                </h2>
                                <p className="text-slate-500 text-xs mt-2">เฉพาะผู้จัดทำเท่านั้น</p>
                            </div>
                            <div className="space-y-3">
                                <input
                                    type="password"
                                    value={localPin}
                                    onChange={e => { setLocalPin(e.target.value); setError(false); }}
                                    onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                                    placeholder={action === 'change' ? 'PIN ปัจจุบัน' : 'ใส่ PIN...'}
                                    className={`w-full bg-[#0d1321] border ${error ? 'border-red-500' : 'border-white/10'} rounded-2xl px-6 py-4 text-center text-xl font-black tracking-widest outline-none focus:border-indigo-500 transition-colors text-white`}
                                    autoFocus
                                />
                                {action === 'change' && (
                                    <input
                                        type="password"
                                        value={localNewPin}
                                        onChange={e => { setLocalNewPin(e.target.value); setError(false); }}
                                        onKeyDown={e => e.key === 'Enter' && handleSubmit()}
                                        placeholder="PIN ใหม่ (อย่างน้อย 4 ตัว)"
                                        className="w-full bg-[#0d1321] border border-white/10 rounded-2xl px-6 py-4 text-center text-xl font-black tracking-widest outline-none focus:border-indigo-500 transition-colors text-white"
                                    />
                                )}
                                {error && <p className="text-red-400 text-xs text-center font-black">PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง</p>}
                            </div>
                            <div className="flex gap-3">
                                <button onClick={handleSubmit}
                                    className="flex-1 bg-indigo-500 text-white py-4 rounded-2xl font-black text-sm hover:bg-indigo-400 transition-all">
                                    ยืนยัน
                                </button>
                                <button onClick={handleClose}
                                    className="flex-1 bg-white/5 text-slate-400 py-4 rounded-2xl font-black text-sm hover:text-white transition-all">
                                    ยกเลิก
                                </button>
                            </div>
                        </div>
                    </div>
                );
            });

            // ----------------------------------------------------------------
            // Drill-Down Modal: collect accounts/groups for an item
            // ----------------------------------------------------------------
            const getDrillData = (item) => {
                if (!item || item.type === 'subtotal' || item.type === 'profit') return [];
                const itemType = pnlCalculations.topicTypeMapping[item.id];
                const sourceBW = itemType === 'revenue'
                    ? (processedData.revenue.branchWise || [])
                    : (processedData.expenses.branchWise || []);
                const isRev = itemType === 'revenue';

                // rowMap: accCode -> { direct:{}, allocated:{}, ... }
                const rowMap = {};

                const getOrCreate = (accCode, accName, groupName) => {
                    if (!rowMap[accCode]) {
                        const direct = {}, allocated = {};
                        sortedBranches.forEach(b => { direct[b] = 0; allocated[b] = 0; });
                        direct['GRAND_TOTAL'] = 0; allocated['GRAND_TOTAL'] = 0;
                        rowMap[accCode] = { accCode, accName, groupName, direct, allocated, allocDetails: [] };
                    }
                    return rowMap[accCode];
                };

                // --- Direct from groups/accounts ---
                const collectDirect = (node) => {
                    const groups = node.groups || [];
                    const accounts = node.accounts || [];
                    const accBranchCodes = new Set((node.accBranches || []).map(e => e.code));

                    sourceBW.forEach(bi => {
                        if (accBranchCodes.has(bi.accCode)) return;
                        const match = groups.includes(bi.groupName) || accounts.includes(bi.accCode);
                        if (!match) return;
                        const row = getOrCreate(bi.accCode, bi.accName, bi.groupName);
                        sortedBranches.forEach(b => {
                            // Skip S000 for expenses unless in allocExclusions
                            if (!isRev && b === 'S000' && !allocExclusions.includes(bi.accCode)) return;
                            const raw = bi.branchValues[b] ? (bi.branchValues[b][currentMonthIndex] || 0) : 0;
                            row.direct[b] += isRev ? -raw : raw;
                        });
                    });

                    // accBranches direct
                    (node.accBranches || []).forEach(entry => {
                        const bi = sourceBW.find(x => x.accCode === entry.code);
                        if (!bi) return;
                        let tb;
                        if (entry.branches.length === 0) tb = sortedBranches;
                        else if (entry.exclude) tb = sortedBranches.filter(b => !entry.branches.includes(b));
                        else tb = entry.branches;
                        const row = getOrCreate(entry.code, bi.accName, bi.groupName);
                        sortedBranches.forEach(b => {
                            if (!isRev && b === 'S000' && !allocExclusions.includes(entry.code)) return;
                            const raw = tb.includes(b) ? (bi.branchValues[b] ? bi.branchValues[b][currentMonthIndex] || 0 : 0) : 0;
                            row.direct[b] += isRev ? -raw : raw;
                        });
                    });

                    if (node.children) node.children.forEach(collectDirect);
                    if (node.lines) node.lines.forEach(collectDirect);
                };
                collectDirect(item);

                // --- Allocated (expense only) ---
                if (!isRev) {
                    const thisMonthAlloc = processedData.allocation.filter(a => a.monthIndex === currentMonthIndex);
                    const itemGroups = item.groups || [];
                    const accBranchMap = {};
                    (item.accBranches || []).forEach(e => accBranchMap[e.code] = e);

                    thisMonthAlloc.forEach(ai => {
                        const matchGroup = itemGroups.includes(ai.name) && !accBranchMap[ai.code];
                        const accEntry = accBranchMap[ai.code];
                        if (!matchGroup && !accEntry) return;

                        let tb;
                        if (accEntry) {
                            if (accEntry.branches.length === 0) tb = sortedBranches;
                            else if (accEntry.exclude) tb = sortedBranches.filter(b => !accEntry.branches.includes(b));
                            else tb = accEntry.branches;
                        } else {
                            tb = sortedBranches;
                        }

                        // Find accName from branchWise
                        const bi = sourceBW.find(x => x.accCode === ai.code);
                        const row = getOrCreate(ai.code, bi ? bi.accName : (ai.tbName || ai.name), ai.name);
                        sortedBranches.forEach(b => {
                            const val = tb.includes(b) ? (ai.alloc[b] || 0) : 0;
                            row.allocated[b] += val;
                        });
                        if (ai.alloc && Object.values(ai.alloc).some(v => v !== 0)) {
                            row.allocDetails.push({ code: ai.code, name: ai.name, alloc: ai.alloc });
                        }
                    });
                }

                // Build final rows: direct[b] + allocated[b]
                const rows = Object.values(rowMap).map(r => {
                    const branchVals = {};
                    sortedBranches.forEach(b => { branchVals[b] = r.direct[b] + r.allocated[b]; });
                    const total = sortedBranches.reduce((s, b) => s + branchVals[b], 0);
                    const hasAlloc = sortedBranches.some(b => r.allocated[b] !== 0);
                    return { ...r, branchVals, total, hasAlloc };
                });

                return rows.sort((a, b) => naturalSort(a.accCode, b.accCode));
            };

            const DrillDetailModal = () => {
                if (!drillDetailModal) return null;
                const { row } = drillDetailModal;
                const [isClosing, setIsClosing] = React.useState(false);
                const handleClose = React.useCallback(() => {
                    setIsClosing(true);
                    setTimeout(() => setDrillDetailModal(null), 220);
                }, []);
                return (
                    <div className={`fixed inset-0 z-[60] flex items-start justify-center bg-black/80 backdrop-blur-sm py-8 px-4 ${isClosing ? 'backdrop-hiding' : ''}`}
                        onClick={e => { if (e.target === e.currentTarget) handleClose(); }}>
                        <div className={`glass rounded-[2rem] w-full max-w-3xl shadow-2xl border border-white/10 flex flex-col overflow-hidden ${isClosing ? 'modal-closing' : 'modal-spring'}`}
                            style={{maxHeight:'calc(100vh - 4rem)'}}>
                            {/* Sticky header */}
                            <div className="flex items-center justify-between px-8 py-5 border-b border-white/10 bg-indigo-500/10 rounded-t-[2rem] flex-shrink-0">
                                <div>
                                    <p className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mb-1">รายละเอียด · {MONTHS[currentMonthIndex]}</p>
                                    <h3 className="text-xl font-black text-white">{row.accCode} — {row.accName}</h3>
                                </div>
                                <button onClick={handleClose} className="p-3 hover:bg-white/10 rounded-2xl transition-all text-slate-400 hover:text-white flex items-center gap-2 border border-white/10">
                                    <Icon name="x" size={20} /><span className="text-sm font-black">ปิด (ESC)</span>
                                </button>
                            </div>
                            <div className="p-8 space-y-6 overflow-y-auto flex-1">
                                {/* Summary */}
                                <div className="grid grid-cols-3 gap-4">
                                    <div className="bg-[#0d1321] rounded-2xl p-4 border border-white/5">
                                        <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-2">ต้นทุนทางตรง</p>
                                        <p className="text-lg font-black text-white font-mono">
                                            {sortedBranches.reduce((s,b) => s + (row.direct[b]||0), 0).toLocaleString(undefined,{minimumFractionDigits:2})}
                                        </p>
                                    </div>
                                    <div className="bg-[#0d1321] rounded-2xl p-4 border border-orange-500/20">
                                        <p className="text-[9px] font-black text-orange-400 uppercase tracking-widest mb-2">ปันส่วนจาก S000</p>
                                        <p className="text-lg font-black text-orange-300 font-mono">
                                            {sortedBranches.reduce((s,b) => s + (row.allocated[b]||0), 0).toLocaleString(undefined,{minimumFractionDigits:2})}
                                        </p>
                                    </div>
                                    <div className="bg-indigo-500/10 rounded-2xl p-4 border border-indigo-500/20">
                                        <p className="text-[9px] font-black text-indigo-400 uppercase tracking-widest mb-2">รวมทั้งหมด</p>
                                        <p className="text-lg font-black text-indigo-300 font-mono">
                                            {sortedBranches.reduce((s,b) => s + (row.direct[b]||0) + (row.allocated[b]||0), 0).toLocaleString(undefined,{minimumFractionDigits:2})}
                                        </p>
                                    </div>
                                </div>
                                {/* Branch breakdown */}
                                <div className="overflow-x-auto">
                                    <table className="w-full text-xs">
                                        <thead className="bg-[#161d2b] text-slate-500 font-black uppercase tracking-widest">
                                            <tr>
                                                <th className="px-4 py-3 text-left">สาขา</th>
                                                <th className="px-4 py-3 text-right">ต้นทุนทางตรง</th>
                                                <th className="px-4 py-3 text-right text-orange-400">ปันส่วน</th>
                                                <th className="px-4 py-3 text-right text-indigo-400">รวม</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {sortedBranches.filter(b => (row.direct[b]||0) !== 0 || (row.allocated[b]||0) !== 0).map(b => (
                                                <tr key={b} className="hover:bg-white/5">
                                                    <td className="px-4 py-3 font-black text-slate-300">{b}</td>
                                                    <td className="px-4 py-3 text-right font-mono text-slate-300">{(row.direct[b]||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                                                    <td className="px-4 py-3 text-right font-mono text-orange-300">{(row.allocated[b]||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                                                    <td className="px-4 py-3 text-right font-mono font-black text-indigo-300">{((row.direct[b]||0)+(row.allocated[b]||0)).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                {/* Allocation source */}
                                {row.allocDetails && row.allocDetails.length > 0 && (
                                    <div className="bg-orange-500/5 rounded-2xl p-4 border border-orange-500/10">
                                        <p className="text-[9px] font-black text-orange-400 uppercase tracking-widest mb-3">ที่มาของการปันส่วน</p>
                                        <div className="space-y-1">
                                            {row.allocDetails.map((d,i) => (
                                                <div key={i} className="flex items-center justify-between text-xs">
                                                    <span className="font-mono text-orange-300">{d.code}</span>
                                                    <span className="text-slate-400">{d.name}</span>
                                                    <span className="font-mono text-white">{Math.abs(Object.values(d.alloc).reduce((s,v)=>s+v,0)).toLocaleString(undefined,{minimumFractionDigits:2})}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

            const DrillModal = () => {
                if (!drillModal) return null;
                const { item } = drillModal;
                const rows = getDrillData(item);
                const res = pnlCalculations.items[item.id] || { total: {} };
                const ds = item.displayNegate ? -1 : 1;
                const [isClosing, setIsClosing] = React.useState(false);

                const handleClose = React.useCallback(() => {
                    setIsClosing(true);
                    setTimeout(() => setDrillModal(null), 240);
                }, []);

                // Override ESC to use handleClose
                React.useEffect(() => {
                    const handler = (e) => { if (e.key === 'Escape') handleClose(); };
                    document.addEventListener('keydown', handler);
                    return () => document.removeEventListener('keydown', handler);
                }, [handleClose]);

                return (
                    <div className={`fixed inset-0 z-50 flex flex-col bg-[#080c14] overflow-hidden ${isClosing ? 'panel-closing' : 'panel-slide'}`}>
                        {/* Header */}
                        <div className="flex items-center justify-between px-10 py-5 border-b border-white/10 bg-indigo-500/10 flex-shrink-0">
                            <div>
                                <p className="text-xs font-black text-indigo-400 uppercase tracking-widest mb-1">รายละเอียดรายการ · {MONTHS[currentMonthIndex]}</p>
                                <h2 className="text-3xl font-black text-white">{item.title}</h2>
                            </div>
                            <button onClick={handleClose} className="p-4 hover:bg-white/10 rounded-2xl transition-all text-slate-400 hover:text-white flex items-center gap-2 border border-white/10">
                                <Icon name="x" size={22} /><span className="text-sm font-black">ปิด (ESC)</span>
                            </button>
                        </div>

                        {/* Summary bar */}
                        <div className="grid grid-cols-4 gap-px bg-white/5 flex-shrink-0">
                            <div className="bg-[#0d1321] px-10 py-5">
                                <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-2">ยอดรวมทั้งหมด</p>
                                <p className="text-2xl font-black text-indigo-400 font-mono">{(res.total['GRAND_TOTAL'] || 0).toLocaleString(undefined, {minimumFractionDigits:2})}</p>
                            </div>
                            <div className="bg-[#0d1321] px-10 py-5">
                                <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-2">จำนวนรหัสบัญชี</p>
                                <p className="text-2xl font-black text-white">{rows.length} รายการ</p>
                            </div>
                            <div className="bg-[#0d1321] px-10 py-5">
                                <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-2">จำนวนสาขา</p>
                                <p className="text-2xl font-black text-white">{sortedBranches.length} สาขา</p>
                            </div>
                            <div className="bg-[#0d1321] px-10 py-5">
                                <p className="text-xs font-black text-slate-500 uppercase tracking-widest mb-2">ประเภท</p>
                                <p className="text-2xl font-black text-emerald-400 uppercase">{pnlCalculations.topicTypeMapping[item.id] || '-'}</p>
                            </div>
                        </div>

                        {/* Table — fills remaining height */}
                        <div className="flex-1 overflow-auto">
                            {rows.length === 0 ? (
                                <div className="flex items-center justify-center h-full text-slate-500 text-xl font-bold">ไม่พบรายการบัญชีที่ผูกไว้กับรายการนี้</div>
                            ) : (
                                <table className="w-full text-sm" style={{borderCollapse:'separate', borderSpacing:0}}>
                                    <thead className="bg-[#161d2b] text-slate-400 font-black uppercase tracking-widest sticky top-0 z-20">
                                        <tr>
                                            <th className="px-8 py-5 text-left sticky left-0 bg-[#161d2b] z-30 border-b border-white/10" style={{minWidth:'140px'}}>รหัสบัญชี</th>
                                            <th className="px-8 py-5 text-left sticky left-[140px] bg-[#161d2b] z-30 border-b border-white/10 shadow-[4px_0_8px_rgba(0,0,0,0.5)]" style={{minWidth:'280px'}}>ชื่อบัญชี</th>
                                            <th className="px-8 py-5 text-left border-b border-white/10" style={{minWidth:'200px'}}>กลุ่มบัญชี</th>
                                            {sortedBranches.map(b => (
                                                <th key={b} className="px-8 py-5 text-right border-b border-white/10" style={{minWidth:'150px'}}>{b}</th>
                                            ))}
                                            <th className="px-8 py-5 text-right bg-indigo-500/10 text-indigo-400 border-b border-indigo-500/20" style={{minWidth:'160px'}}>รวม</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-white/5">
                                        {rows.map((row, i) => (
                                            <tr key={i} className={`hover:bg-white/5 transition-colors ${row.hasAlloc ? 'cursor-pointer' : ''}`} onClick={() => row.hasAlloc && setDrillDetailModal({ row })}>
                                                <td className="px-8 py-5 font-mono font-black text-slate-300 sticky left-0 bg-[#080c14] z-10 text-base">
                                                    {row.accCode}
                                                    {row.hasAlloc && <span className="ml-2 text-[9px] bg-orange-500/20 text-orange-400 px-2 py-0.5 rounded-full font-black cursor-pointer">ALLOC</span>}
                                                </td>
                                                <td className="px-8 py-5 font-bold text-white sticky left-[140px] bg-[#080c14] z-10 shadow-[4px_0_8px_rgba(0,0,0,0.5)] text-base">{row.accName}</td>
                                                <td className="px-8 py-5">
                                                    <span className="bg-indigo-500/10 text-indigo-300 px-4 py-1.5 rounded-full text-xs font-bold">{row.groupName}</span>
                                                    {row.branchFilter && <span className="ml-2 bg-emerald-500/10 text-emerald-300 px-3 py-1 rounded-full text-[10px] font-bold">{row.branchFilter}</span>}
                                                </td>
                                                {sortedBranches.map(b => (
                                                    <td key={b} className={`px-8 py-5 text-right font-mono text-base ${(ds*(row.branchVals[b] || 0)) !== 0 ? 'text-white font-bold' : 'text-slate-400'}`}>
                                                        {(ds*(row.branchVals[b] || 0)).toLocaleString(undefined, {minimumFractionDigits:2})}
                                                    </td>
                                                ))}
                                                <td className="px-8 py-5 text-right font-mono font-black text-indigo-300 bg-indigo-500/5 text-base">
                                                    {(ds*row.total).toLocaleString(undefined, {minimumFractionDigits:2})}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                    <tfoot className="sticky bottom-0 z-20 bg-[#161d2b] border-t-2 border-indigo-500/40">
                                        <tr>
                                            <td colSpan={3} className="px-8 py-5 font-black text-indigo-400 uppercase tracking-widest text-base sticky left-0 bg-[#161d2b] z-10">รวมทั้งหมด</td>
                                            {sortedBranches.map(b => (
                                                <td key={b} className="px-8 py-5 text-right font-mono font-black text-white text-base">
                                                    {(ds*(res.total[b] || 0)).toLocaleString(undefined, {minimumFractionDigits:2})}
                                                </td>
                                            ))}
